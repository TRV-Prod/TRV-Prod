  const closeBtn=dv('plan-modal-close');closeBtn.textContent='✕';
  closeBtn.addEventListener('click',()=>overlay.remove());
  const btnWrap=dv('');btnWrap.style.cssText='display:flex;gap:6px;flex-shrink:0;margin-left:10px;align-items:flex-start';
  btnWrap.appendChild(printBtn);btnWrap.appendChild(exportBtn);btnWrap.appendChild(closeBtn);
  hdr.appendChild(hdrInfo);hdr.appendChild(btnWrap);
  modal.appendChild(hdr);

  // ── Filter toggle bar ──
  let showOnlyPending=false;
  const filterBar=dv('');filterBar.style.cssText='display:flex;align-items:center;gap:10px;padding:6px 20px;background:#f8f9fb;border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--text2)';
  const toggleWrap=dv('');toggleWrap.style.cssText='display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none';
  const toggleCb=el('input');toggleCb.type='checkbox';toggleCb.id='pdm-pending-toggle';toggleCb.style.cursor='pointer';
  const toggleLbl=el('label');toggleLbl.htmlFor='pdm-pending-toggle';toggleLbl.textContent='Arata doar operatii cu timp ramas > 0';toggleLbl.style.cursor='pointer';
  toggleWrap.appendChild(toggleCb);toggleWrap.appendChild(toggleLbl);
  filterBar.appendChild(toggleWrap);
  modal.appendChild(filterBar);

  // ── Body ──
  const body=dv('plan-modal-body');

  // Summary bar
  const realBar=dv('pdm-real-bar');
  const pctEl=sp('pdm-real-pct',pctDisplay);pctEl.style.cssText=`color:${pctColor};font-size:42px;font-weight:900;font-family:Arial,monospace;line-height:1`;
  realBar.appendChild(pctEl);
  const infoWrap=dv('pdm-real-info');
  const addStat=(label,val,bold=false)=>{
    const d=dv('');d.style.marginBottom='5px';
    const lbl=sp('pdm-real-label',label);d.appendChild(lbl);
    const v=sp('pdm-real-val',' '+val);
    if(bold){v.style.cssText='font-size:15px;font-weight:800;color:var(--text)';} 
    d.appendChild(v);
    infoWrap.appendChild(d);
  };

  // Placeholders — set immediately from execTime, updated after opGroups are built
  const remStatD=dv('');remStatD.style.marginBottom='5px';
  remStatD.appendChild(sp('pdm-real-label',`Timp ramas (${fmtN(effectiveQty)} buc de produs, eficienta ${S.eficientaPlan}%):`));
  const remVal=sp('pdm-real-val');
  remVal.textContent=' '+(fullyOnHand?'0 min':fmtMin(execTime.total/eff));
  remVal.style.cssText='font-size:15px;font-weight:800;color:#7c3aed';
  remStatD.appendChild(remVal);infoWrap.appendChild(remStatD);

  const totStatD=dv('');totStatD.style.marginBottom='5px';
  totStatD.appendChild(sp('pdm-real-label','Timp total (fara stoc):'));
  const totVal=sp('pdm-real-val');
  totVal.textContent=' '+fmtMin(totalExecTime.total/eff);
  totVal.style.cssText='font-size:15px;font-weight:800;color:var(--text)';
  totStatD.appendChild(totVal);infoWrap.appendChild(totStatD);

  // On Hand only (not WIP)
  const ohStatD=dv('');
  ohStatD.appendChild(sp('pdm-real-label','On Hand:'));
  const ohN=Math.max(0,stockFP.onHand);
  const ohVal=sp('pdm-real-val');
  ohVal.textContent=' '+fmtN(ohN)+' buc'+(fullyOnHand?' ✓':'');
  ohVal.style.cssText=`font-size:15px;font-weight:800;color:${fullyOnHand?'#16a34a':ohN>0?'#d97706':'var(--text3)'}`;
  ohStatD.appendChild(ohVal);infoWrap.appendChild(ohStatD);
  realBar.appendChild(infoWrap);
  const progWrap=dv('');progWrap.style.cssText='width:130px;display:flex;flex-direction:column;gap:4px;align-self:center;flex-shrink:0';
  const progBg=dv('');progBg.style.cssText='height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden';
  const progFill=dv('');progFill.style.cssText=`height:100%;border-radius:6px;background:${pctColor};width:${Math.min(100,pct)}%;transition:width .6s`;
  progBg.appendChild(progFill);progWrap.appendChild(progBg);
  const progLbl=sp('','');progLbl.style.cssText='font-size:9px;color:var(--text3);text-align:center';
  progLbl.id='pdm-prog-lbl';progLbl.textContent=pctDisplay+' realizat';progWrap.appendChild(progLbl);
  realBar.appendChild(progWrap);
  body.appendChild(realBar);

  if(!S.bowIdx){
    const info=dv('');info.style.cssText='padding:20px;text-align:center;color:var(--text3);font-size:12px';
    info.textContent='Incarca fisierul BOW pentru detalii.';
    body.appendChild(info);modal.appendChild(body);overlay.appendChild(modal);document.body.appendChild(overlay);return;
  }

  // ── Build op list from BOW using calcExecTime.byWC (guaranteed correct, same as Structura) ──
  // Step 1: Collect all unique ops (opNoNum→{opNo,wcName,wcType}) and per-WC component stock info
  const opMeta=new Map(); // opNoNum → {opNo,wcName,wcType,seq,compStocks:[{matNo,onHand,totalWIP,wipByWC,needing}]}
  const seenOps=new Set();
  const gatherOps=(matNo)=>{
    const key=`${itemNo}__${matNo}`;
    if(seenOps.has(key))return;seenOps.add(key);
    const rawOps=S.bowIdx?.get(key)||[];
    const st=S.stockIdx?.get(matNo)||{onHand:0,totalWIP:0,wipByWC:{}};
    const needing=matNo===itemNo?effectiveQty:Math.max(0,needs?.get(matNo)?.net??needs?.get(matNo)?.needed??0);
    for(const op of rawOps){
      const opNoNum=parseFloat(String(op['Operation no']||'0').replace(',','.'))||0;
      const wcName=str(op['Ope name']||op['Ope descr']||'?');
      const wcType=S.wcSetupIdx?.[wcName]?.wcType||'';
      const seq=parseFloat(String(op['Ope seq']||'0').replace(',','.'))||0;
      if(!opMeta.has(opNoNum)){
        opMeta.set(opNoNum,{opNo:str(op['Operation no']||''),opNoNum,wcName,wcType,seq,compStocks:[]});
      }
      const m=opMeta.get(opNoNum);
      // Add component stock info for sub-row display (deduplicate by matNo per op group)
      if(!m.compStocks.find(cs=>cs.matNo===matNo)){
        m.compStocks.push({
          matNo,needing,
          onHand:st.onHand,totalWIP:Math.max(0,st.totalWIP),wipByWC:st.wipByWC||{}
        });
      }
    }
    // Recurse into BOM children
    const bomRows=S.bomIdx?.get(key)||[];
    for(const row of bomRows){const cm=str(row['Material no']);if(cm)gatherOps(cm);}
  };
  gatherOps(itemNo);

  // Step 2: Sort by WC type order, then by opNoNum
  const TYPE_ORDER={'1 Initial Op':0,'2 Intermediary Op':1,'3 Final Op':2,'3 Final Op ':2};
  const sortedGroups=[...opMeta.values()].sort((a,b)=>{
    const ta=TYPE_ORDER[(a.wcType||'').trim()]??99;
    const tb=TYPE_ORDER[(b.wcType||'').trim()]??99;
    if(ta!==tb)return ta-tb;
    return a.opNoNum-b.opNoNum;
  });

  // Step 3: Compute group times from execTime.byWC and totalExecTime.byWC (same as Structura)
  sortedGroups.forEach(g=>{
    const rem=execTime.byWC.get(g.wcName)||{runMin:0,setupMin:0};
    const tot=totalExecTime.byWC.get(g.wcName)||{runMin:0,setupMin:0};
    g.sumRem=(rem.runMin+rem.setupMin)/eff;
    g.sumTotal=(tot.runMin+tot.setupMin)/eff;
  });

  // Recompute pct using authoritative calcExecTime values (matches Structura)
  let pctFinal=fullyOnHand?100:totalExecTime.total>0?Math.min(99.99,Math.max(0,(1-execTime.total/totalExecTime.total)*100)):0;
  if(pctFinal>=100&&!fullyOnHand)pctFinal=99.99;
  const pctFinalDisplay=pctFinal===100?'100%':pctFinal.toFixed(2)+'%';
  const pctFinalColor=pctFinal===100?'#16a34a':pctFinal>=50?'#ca8a04':pctFinal>0?'#ea580c':'#dc2626';

  // Update summary bar with authoritative values from calcExecTime (same as Structura)
  remVal.textContent=' '+fmtMin(execTime.total/eff);
  totVal.textContent=' '+fmtMin(totalExecTime.total/eff);
  // Update pct display
  const pctEl2=document.querySelector('.pdm-real-pct');
  if(pctEl2){pctEl2.textContent=pctFinalDisplay;pctEl2.style.color=pctFinalColor;}
  const progFill2=document.querySelector('#plan-detail-overlay .pdm-bar-fill');
  if(progFill2){progFill2.style.background=pctFinalColor;progFill2.style.width=Math.min(100,pctFinal)+'%';}
  const progLbl2=document.getElementById('pdm-prog-lbl');
  if(progLbl2) progLbl2.textContent=pctFinalDisplay+' realizat';

  // ── WIP cascade logic ──
  // Count WIP in Final Op workcenters at FP level
  let wipInFinal=0;
  for(const [poCol,wipQty] of Object.entries(stockFP.wipByWC||{})){
    if(!wipQty||wipQty<=0)continue;
    const wcN=wcLabel(poCol);
    const wcMeta=S.wcSetupIdx?.[wcN];
    if(wcMeta&&wcMeta.wcType&&wcMeta.wcType.includes('Final'))wipInFinal+=wipQty;
  }
  const cascadeFinalized=wipInFinal>=effectiveQty&&effectiveQty>0;

  if(sortedGroups.length>0){
    if(cascadeFinalized){
      const banner=dv('');
      banner.style.cssText='margin-bottom:10px;padding:8px 12px;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;font-size:11px;color:#15803d;font-weight:600';
      banner.textContent=`✓ ${fmtN(wipInFinal)} buc WIP in operatii finale — operatiile initiale si intermediare sunt considerate finalizate`;
      body.appendChild(banner);
    }
    body.appendChild(sp('pdm-section-title','Operatii (sortate dupa Operation no ↑ · click pentru detalii)'));

    const tbl=el('table','pdm-wc-table');tbl.style.width='100%';
    const thead=el('thead');const hr=el('tr');
    ['','Op no','Workcenter','Total','Ramas','% Real','Progres'].forEach(h=>{
      const th=el('th');th.textContent=h;hr.appendChild(th);});
    thead.appendChild(hr);tbl.appendChild(thead);

    const TYPE_LABELS={'1 Initial Op':'Operatii Initiale','2 Intermediary Op':'Operatii Intermediare','3 Final Op':'Operatii Finale','3 Final Op ':'Operatii Finale'};
    let lastType=null;

    for(const grp of sortedGroups){
      // WC Type separator
      const typeKey=(grp.wcType||'').trim();
      if(grp.wcType!==lastType){
        lastType=grp.wcType;
        const sepTbody=el('tbody');
        const sepTr=el('tr');
        const sepTd=el('td');sepTd.colSpan=7;
        sepTd.style.cssText='background:#f1f5f9;padding:5px 10px;font-size:9.5px;font-weight:800;color:#475569;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border)';
        const typeLbl=TYPE_LABELS[typeKey]||(typeKey||'Alte operatii');
        sepTd.textContent=typeLbl;
        const isPreFinal=typeKey.includes('Initial')||typeKey.includes('Intermediary');
        if(cascadeFinalized&&isPreFinal){
          const badge=sp('');badge.style.cssText='margin-left:8px;background:#dcfce7;color:#15803d;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700';
          badge.textContent='✓ Acoperit de WIP final';sepTd.appendChild(badge);
        }
        sepTr.appendChild(sepTd);sepTbody.appendChild(sepTr);tbl.appendChild(sepTbody);
      }
      const isPreFinalOp=typeKey.includes('Initial')||typeKey.includes('Intermediary');
      const effectiveDone=grp.sumRem<=0.01||(cascadeFinalized&&isPreFinalOp);
      const rawDonePct=grp.sumTotal>0?(1-grp.sumRem/grp.sumTotal)*100:100;
      const donePctFinal=effectiveDone?100:Math.max(0,Math.round(rawDonePct*100)/100);
      const donePctDisplay=donePctFinal===100?'100%':donePctFinal.toFixed(2)+'%';
      const done=donePctFinal>=100;
      const c=done?'#16a34a':donePctFinal>=50?'#ca8a04':donePctFinal>0?'#ea580c':'#dc2626';


      // Group header row
      const grpId='grp-'+grp.opNoNum;
      const tbody=el('tbody');tbody.className='pdm-op-group-body';
      tbody.setAttribute('data-grp',grpId);tbody.setAttribute('data-rem',grp.sumRem.toFixed(4));

      const tr=el('tr','pdm-op-row');if(done)tr.style.background='#f0fdf4';
      const toggle=sp('pdm-op-toggle','▶');
      const tdTog=el('td');tdTog.style.width='16px';tdTog.appendChild(toggle);tr.appendChild(tdTog);

      const tdOp=el('td');tdOp.style.cssText='font-family:Arial,monospace;font-size:11px;color:var(--text3)';tdOp.textContent=grp.opNo;tr.appendChild(tdOp);
      const tdWc=el('td');tdWc.style.fontWeight='700';
      if(done){const tick=sp('','✓ ');tick.style.color='#16a34a';tdWc.appendChild(tick);}
      tdWc.appendChild(document.createTextNode(grp.wcName));tr.appendChild(tdWc);
      const tdTot=el('td');tdTot.appendChild(sp('pdm-num',fmtMin(grp.sumTotal)));tr.appendChild(tdTot);
      const tdRem=el('td');
      if(done){tdRem.appendChild(sp('pdm-done','Finalizat'));}
      else tdRem.appendChild(sp('pdm-num rem',fmtMin(grp.sumRem)));
      tr.appendChild(tdRem);
      const tdPct=el('td');tdPct.appendChild(sp('pdm-num',donePctDisplay));tdPct.lastChild.style.cssText=`color:${c};font-weight:700`;tr.appendChild(tdPct);
      // Bar
      const tdBar=el('td','pdm-bar-cell');
      const barBg=dv('pdm-bar-bg');const barFill=dv('');
      barFill.style.cssText=`height:100%;border-radius:5px;background:${c};width:${Math.min(100,donePctFinal)}%`;
      barBg.appendChild(barFill);tdBar.appendChild(barBg);tr.appendChild(tdBar);

      // Sub-rows (components) from compStocks
      const subTbody=el('tbody','pdm-sub-tbody');subTbody.id='sub-'+grpId;
      for(const comp of (grp.compStocks||[])){
        const sr=el('tr','pdm-sub-row');
        const compDone=comp.needing<=0;
        if(compDone)sr.style.background='#f0fdf4';
        sr.appendChild(el('td'));sr.appendChild(el('td'));
        // Mat code
        const tdC=el('td');tdC.appendChild(sp('pdm-sub-matno',comp.matNo===itemNo?'(FP) '+comp.matNo:comp.matNo));sr.appendChild(tdC);
        // Total (no per-component total — group total covers it)
        const tdST=el('td');tdST.textContent='—';sr.appendChild(tdST);
        // Status
        const tdSR=el('td');
        if(compDone)tdSR.appendChild(sp('pdm-done','Acoperit'));
        else tdSR.appendChild(sp('pdm-num rem',fmtN(comp.needing)+' buc'));
        sr.appendChild(tdSR);
        // On Hand / WIP
        const tdSQ=el('td');tdSQ.colSpan=2;
        const stockDetail=dv('');stockDetail.style.cssText='font-size:10.5px;display:flex;flex-wrap:wrap;gap:6px';
        const oh=Math.max(0,comp.onHand);
        const wip=comp.totalWIP;
        if(oh>0){const ohBadge=sp('stk-badge stk-oh',`📦 On Hand: ${fmtN(oh)}`);stockDetail.appendChild(ohBadge);}
        if(wip>0){
          const wipBadge=sp('stk-badge stk-wip',`🔄 WIP: ${fmtN(wip)}`);
          stockDetail.appendChild(wipBadge);
          const wipEntries=Object.entries(comp.wipByWC||{}).filter(([,q])=>q>0);
          if(wipEntries.length>0){
            const wcDetail=sp('','');wcDetail.style.cssText='font-size:9.5px;color:var(--text3);display:block;margin-top:2px;width:100%';
            wcDetail.textContent='  '+wipEntries.map(([wc,q])=>`${wcLabel(wc)}: ${fmtN(q)}`).join(' · ');
            stockDetail.appendChild(wcDetail);
          }
        }
        if(!compDone&&!fullyOnHand){
          const needBadge=sp('','');needBadge.style.cssText='font-size:10px;color:#dc2626;font-weight:600';
          needBadge.textContent=`⚠ Mai trebuie: ${fmtN(comp.needing)} buc`;
          stockDetail.appendChild(needBadge);
        }
        tdSQ.appendChild(stockDetail);sr.appendChild(tdSQ);
        subTbody.appendChild(sr);
      }

      // Toggle collapse/expand
      tr.addEventListener('click',()=>{
        const open=subTbody.classList.toggle('open');
        toggle.classList.toggle('open',open);
      });

      tbody.appendChild(tr);
      tbl.appendChild(tbody);
      tbl.appendChild(subTbody);
    }
    body.appendChild(tbl);

    // Wire filter toggle
    toggleCb.addEventListener('change',()=>{
      showOnlyPending=toggleCb.checked;
      tbl.querySelectorAll('tbody.pdm-op-group-body').forEach(tb=>{
        const grpId=tb.getAttribute('data-grp');
        const grpRem=parseFloat(tb.getAttribute('data-rem')||'0');
        tb.style.display=showOnlyPending&&grpRem<=0?'none':'table-row-group';
        const subTb=document.getElementById('sub-'+grpId);
        if(subTb&&showOnlyPending&&grpRem<=0)subTb.style.display='none';
      });
    });
  } else {
    const info=dv('');info.style.cssText='padding:14px;text-align:center;color:var(--text3);font-size:12px';
    info.textContent='Nu exista operatii BOW pentru acest produs.';body.appendChild(info);
  }

  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // ── Wire export button ──
  exportBtn.addEventListener('click',()=>exportPlanDetail(itemNo,plan,sortedGroups,pctDisplay,eff));
  }catch(err){console.error('showPlanDetail error:',err);alert('Eroare la deschidere detaliu: '+err.message);}
}

function exportPlanDetail(itemNo, plan, sortedGroups, pctDisplay, eff){
  const rows=[];
  const first=plan.entries[0]||{};
  const price=getSalesPrice(itemNo,first);
  const qty=plan.totalQty;

  // Header info rows
  rows.push({'Cod produs':itemNo,'Denumire':first.itemName||'','Pret EUR/buc':price,
    'Cant. planificata':qty,'Eficienta %':S.eficientaPlan,'% Realizare':pctDisplay});
  rows.push({}); // blank row

  // Op groups
  rows.push({'Cod produs':'Op no','Denumire':'Workcenter','Pret EUR/buc':'Total (min)',
    'Cant. planificata':'Ramas (min)','Eficienta %':'% Realizat','% Realizare':'Status'});

  for(const grp of sortedGroups){
    const rawDonePct=grp.sumTotal>0?(1-grp.sumRem/grp.sumTotal)*100:100;
    const donePct=rawDonePct>=100?100:Math.round(rawDonePct*100)/100;
    const status=donePct>=100?'Finalizat':'In progres';

    rows.push({
      'Cod produs':grp.opNo,
      'Denumire':grp.wcName,
      'Pret EUR/buc':+grp.sumTotal.toFixed(2),
      'Cant. planificata':+grp.sumRem.toFixed(2),
      'Eficienta %':donePct+'%',
      '% Realizare':status,
    });

    // Sub-rows from compStocks
    for(const comp of (grp.compStocks||[])){
      const oh=Math.max(0,comp.onHand);
      const wip=comp.totalWIP;
      rows.push({
        'Cod produs':'  '+comp.matNo,
        'Denumire':comp.matNo===itemNo?'(FP)':'',
        'Pret EUR/buc':'',
        'Cant. planificata':'',
        'Eficienta %':'On Hand: '+oh+' · WIP: '+wip,
        '% Realizare':comp.needing<=0?'Acoperit':'Necesar: '+Math.round(comp.needing)+' buc',
      });
    }
    rows.push({}); // blank between groups
  }

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:28},{wch:14},{wch:16},{wch:14},{wch:18}];
  // Rename headers to Romanian
  if(ws.A3){ws.A3.v='Op no';ws.B3.v='Workcenter';ws.C3.v='Total (min)';ws.D3.v='Ramas (min)';ws.E3.v='% Realizat';ws.F3.v='Status';}
  XLSX.utils.book_append_sheet(wb,ws,'Detaliu '+itemNo.substring(0,20));
  XLSX.writeFile(wb,`Detaliu_${itemNo}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ═══════════════════════════════════════════════════════════════
   RAPORT SUBCOMPONENTE PLAN
   For each FP in plan, collect all BOM components with:
   needed qty, on hand, WIP, net, workcenter operations
═══════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════
   DISPOZITII DE LUCRU — component-centric aggregation
   One row per unique component (matNo), summed across all FPs in plan.
   Shows: total needed, OnHand, WIP breakdown, qty to process at WC, exec time.
═══════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════
   DISPOZITII DE LUCRU
   One row per (FP × component × WC operation).
   Shows qty to process, WIP at that WC, WIP at preceding ops.
═══════════════════════════════════════════════════════════════ */
function buildDispozitiiData(){
  // Returns array of rows: {itemNo,prio,matNo,matName,matType,wcName,opNo,opSeq,
  //   totalNec,onHand,wipAtWC,wipBefore,dePrelucrat,execTimeMin}
  const rows=[];
  if(!S.planData.size||!S.bomIdx) return rows;
  const eff=(S.eficientaPlan||100)/100;

  const sortedPlan=[...S.planData.entries()].sort((a,b)=>{
    const pa=S.planPrio[a[0]]||'',pb=S.planPrio[b[0]]||'';
    if(!pa&&!pb)return a[0].localeCompare(b[0]);
    if(!pa)return 1;if(!pb)return -1;
    const na=parseFloat(pa),nb=parseFloat(pb);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;
    return pa.localeCompare(pb);
  });

  const processComp=(itemNo,prio,matNo,matName,matType,unitsNeeded)=>{
    const rawOps=S.bowIdx?.get(`${itemNo}__${matNo}`)||[];
    if(!rawOps.length) return;
    const ops=rawOps.map(op=>({
      seq:parseFloat(String(op['Ope seq']||'0').replace(',','.'))||0,
      opNoNum:parseFloat(String(op['Operation no']||'0').replace(',','.'))||0,
      opNo:str(op['Operation no']||''),
      wcName:str(op['Ope name']||op['Ope descr']||'?'),
      runT:parseFloat(String(op['Run time']||'0').replace(',','.'))||0,
      setupT:parseFloat(String(op['Setup time']||'0').replace(',','.'))||0,
    })).sort((a,b)=>a.seq-b.seq);
    const stock=S.stockIdx?.get(matNo)||{onHand:0,wipByWC:{}};
    const onHand=Math.max(0,stock.onHand);
    const wipByWC=stock.wipByWC||{};
    // Build wipAtIdx: opIdx → qty of WIP at that op stage
    const wipAtIdx=new Map();
    for(const [poCol,wipQty] of Object.entries(wipByWC)){
      if(!wipQty||wipQty<=0)continue;
      const wcNamePO=wcLabel(poCol).toLowerCase();
      let bestIdx=-1;
      for(let i=ops.length-1;i>=0;i--){if(ops[i].wcName.toLowerCase()===wcNamePO){bestIdx=i;break;}}
      if(bestIdx<0)continue;
      wipAtIdx.set(bestIdx,(wipAtIdx.get(bestIdx)||0)+wipQty);
    }
    for(let i=0;i<ops.length;i++){
      const op=ops[i];
      let alreadyDone=onHand;
      let wipBefore=0,wipAtWC=wipAtIdx.get(i)||0;
      for(const [seqIdx,wq] of wipAtIdx){
        if(seqIdx>i)alreadyDone+=wq;
        if(seqIdx<i)wipBefore+=wq;
      }
      const dePrelucrat=Math.max(0,unitsNeeded-alreadyDone);
      const execTimeMin=dePrelucrat>0?(dePrelucrat*op.runT+op.setupT)/eff:0;
      const totalMin=unitsNeeded>0?(unitsNeeded*op.runT+op.setupT)/eff:0;
      rows.push({
        itemNo,prio,matNo,matName,matType,
        wcName:op.wcName,opNo:op.opNo,opSeq:op.seq,opNoNum:op.opNoNum,
        totalNec:unitsNeeded,onHand,
        wipAtWC,wipBefore,wipTotal:Math.max(0,stock.totalWIP||0),
        dePrelucrat,execTimeMin,totalMin,
        wipByWC,
      });
    }
  };

  for(const [itemNo,plan] of sortedPlan){
    const prio=S.planPrio[itemNo]||'';
    const planQ=plan.totalQty;
    const stockFP=S.stockIdx?.get(itemNo)||{onHand:0};
    const effectiveQty=Math.max(0,planQ-Math.max(0,stockFP.onHand));
    if(effectiveQty<=0)continue;
    // Process FP's own ops
    const stFP=S.stockIdx?.get(itemNo)||{};
    processComp(itemNo,prio,itemNo,stFP.name||itemNo,stFP.type||'M',planQ); // use full planQ for FP own ops
    // Process BOM children
    const walkBOM=(compNo,parentQty,vis)=>{
      const key=`${itemNo}__${compNo}`;
      const bomRows=S.bomIdx?.get(key)||[];
      for(const row of bomRows){
        const matNo=str(row['Material no']);if(!matNo)continue;
        const unQty=parseFloat(row['Material qty'])||1;
        const neededQty=parentQty*unQty;
        const st=S.stockIdx?.get(matNo)||{onHand:0,type:'',name:''};
        if(st.type!=='P')processComp(itemNo,prio,matNo,st.name||'',st.type||'',neededQty);
        if(!vis.has(matNo)&&(S.bomIdx?.get(`${itemNo}__${matNo}`)||[]).length>0)
          walkBOM(matNo,neededQty,new Set([...vis,matNo]));
      }
    };
    walkBOM(itemNo,effectiveQty,new Set([itemNo]));
  }
  return rows;
}

        else if(colId==='matName'){td.textContent=r.matName;td.title=r.matName;}
        else if(colId==='matType'){const cls=r.matType==='M'?'stk-type-m':r.matType==='P'?'stk-type-b':'stk-type-d';if(r.matType)td.appendChild(sp(cls,r.matType));}
        else if(colId==='wcName'){const s=sp('');s.style.cssText='font-weight:700;font-size:12px';if(done){const tk=sp('','✓ ');tk.style.color='#16a34a';td.appendChild(tk);}td.appendChild(s);s.textContent=r.wcName;}
        else if(colId==='opNo'){td.style.cssText+='font-family:Arial,monospace;color:var(--text3)';td.textContent=r.opNo;}
        else if(colId==='totalNec'){const s=sp('pdm-num',fmtN(r.totalNec));s.style.cssText='display:block;text-align:right';td.appendChild(s);}
        else if(colId==='onHand'){const s=sp('pdm-num',fmtN(r.onHand));s.style.cssText=`display:block;text-align:right;color:${r.onHand<0?'#dc2626':r.onHand>0?'#15803d':'var(--text3)'}`;td.appendChild(s);}
        else if(colId==='wipAtWC'){
          if(r.wipAtWC>0){const s=sp('stk-badge stk-wip',`🔄 ${fmtN(r.wipAtWC)}`);td.appendChild(s);}
          else{td.style.color='var(--text4)';td.textContent='—';}
        }
        else if(colId==='wipBefore'){
          if(r.wipBefore>0){const s=sp('pdm-num',fmtN(r.wipBefore));s.style.cssText='display:block;text-align:right;color:#d97706;font-weight:600';td.appendChild(s);}
          else{td.style.color='var(--text4)';td.textContent='—';}
        }
        else if(colId==='dePrelucrat'){const s=sp('pdm-num',fmtN(r.dePrelucrat));s.style.cssText=`display:block;text-align:right;font-weight:800;color:${r.dePrelucrat>0?'#dc2626':'#15803d'}`;td.appendChild(s);}
        else if(colId==='execTimeMin'){
          if(r.execTimeMin>0.01){const s=sp('pdm-num',fmtMin(r.execTimeMin));s.style.cssText='display:block;text-align:right;font-weight:700;color:#7c3aed';td.appendChild(s);}
          else{const s=sp('pdm-done',done?'✓':'—');td.appendChild(s);}
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    if(!rows.length){const tr=el('tr');const td=el('td');td.colSpan=vc.length;td.style.cssText='text-align:center;padding:24px;color:var(--text3);font-size:12px';td.textContent='Niciun rezultat.';tr.appendChild(td);tbody.appendChild(tr);}
    tbl.appendChild(tbody);tableWrap.appendChild(tbl);
  }
  rebuild();
}

function buildVerificareStocuriData(){
  const byMat=new Map(); // matNo → {matNo,matName,matType,onHand,totalWIP,wipByWC,fpList,necPlan}
  if(!S.planData.size||!S.bomIdx) return byMat;

  const sortedPlan=[...S.planData.entries()].sort((a,b)=>{
    const pa=S.planPrio[a[0]]||'',pb=S.planPrio[b[0]]||'';
    if(!pa&&!pb)return a[0].localeCompare(b[0]);
    if(!pa)return 1;if(!pb)return -1;
    const na=parseFloat(pa),nb=parseFloat(pb);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;
    return pa.localeCompare(pb);
  });

  for(const [itemNo,plan] of sortedPlan){
    const planQ=plan.totalQty;
    const stockFP=S.stockIdx?.get(itemNo)||{onHand:0};
    const effectiveQty=Math.max(0,planQ-Math.max(0,stockFP.onHand));
    if(effectiveQty<=0)continue;

    const walkBOM=(compNo,parentQty,vis)=>{
      const key=`${itemNo}__${compNo}`;
      const rows=S.bomIdx?.get(key)||[];
      for(const row of rows){
        const matNo=str(row['Material no']);if(!matNo)continue;
        const unQty=parseFloat(row['Material qty'])||1;
        const contribution=parentQty*unQty;
        const st=S.stockIdx?.get(matNo)||{onHand:0,totalWIP:0,wipByWC:{}};
        if(!byMat.has(matNo)){
          byMat.set(matNo,{matNo,matName:st.name||'',matType:st.type||'',
            onHand:st.onHand,totalWIP:Math.max(0,st.totalWIP),wipByWC:st.wipByWC||{},
            fpList:[],necPlan:0});
        }
        const m=byMat.get(matNo);
        m.necPlan+=contribution;
        if(!m.fpList.includes(itemNo))m.fpList.push(itemNo);
        if(!vis.has(matNo)){
          const childRows=S.bomIdx?.get(`${itemNo}__${matNo}`)||[];
          if(childRows.length>0)walkBOM(matNo,contribution,new Set([...vis,matNo]));
        }
      }
    };
    walkBOM(itemNo,effectiveQty,new Set([itemNo]));
  }
  return byMat;
}

  const allData=buildVerificareStocuriData();

  // Collect all FPs and types for dropdowns
  const allFPs=[...new Set([...allData.values()].flatMap(m=>m.fpList))].sort();
  const allTypes=[...new Set([...allData.values()].map(m=>m.matType).filter(Boolean))].sort();

  // ── Toolbar ──
  const tb=dv('sub-rep-toolbar');

  // FP dropdown
  const fpSel=el('select','stk-sel');
  const fpAll=el('option');fpAll.value='all';fpAll.textContent='Toate prod. finale';fpSel.appendChild(fpAll);
  allFPs.forEach(fp=>{const o=el('option');o.value=fp;o.textContent=fp;if(f.fpFilter===fp)o.selected=true;fpSel.appendChild(o);});
  fpSel.value=f.fpFilter||'all';
  fpSel.addEventListener('change',e=>{f.fpFilter=e.target.value;rebuild();});
  tb.appendChild(fpSel);

  // Type dropdown
  const tipSel=el('select','stk-sel');
  const tipAll=el('option');tipAll.value='all';tipAll.textContent='Toate tipurile';tipSel.appendChild(tipAll);
  allTypes.forEach(t=>{const o=el('option');o.value=t;o.textContent=t;if(f.tipFilter===t)o.selected=true;tipSel.appendChild(o);});
  tipSel.value=f.tipFilter||'all';
  tipSel.addEventListener('change',e=>{f.tipFilter=e.target.value;rebuild();});
  tb.appendChild(tipSel);

  // Column picker
  const colBtn=el('button','tbtn');colBtn.textContent='⚙ Coloane';
  colBtn.addEventListener('click',e=>{
    e.stopPropagation();
    const ex=document.getElementById('vs-col-picker');if(ex){ex.remove();return;}
    const picker=dv('ob-col-picker');picker.id='vs-col-picker';
    f.colOrder.forEach(cid=>{
      const item=dv('ob-col-item');const cb=el('input');cb.type='checkbox';cb.checked=f.visibleCols.has(cid);
      cb.addEventListener('change',()=>{if(cb.checked)f.visibleCols.add(cid);else f.visibleCols.delete(cid);rebuild();});
      item.appendChild(cb);item.appendChild(document.createTextNode(LABELS[cid]||cid));picker.appendChild(item);
    });
    document.body.appendChild(picker);
    const r2=colBtn.getBoundingClientRect();picker.style.cssText+=`;top:${r2.bottom+2}px;left:${r2.left}px`;
    setTimeout(()=>document.addEventListener('click',function h(e){if(!picker.contains(e.target)){picker.remove();document.removeEventListener('click',h);};}),50);
  });
  tb.appendChild(colBtn);

  // Print / PDF
  const printBtn=el('button','tbtn');printBtn.textContent='🖨 Printeaza / PDF';
  printBtn.addEventListener('click',()=>printVerificareStocuri(allData,f,LABELS));
  tb.appendChild(printBtn);

  // Export Excel
  const expBtn=el('button','tbtn');expBtn.textContent='⬇ Export Excel';
  expBtn.addEventListener('click',()=>{
    const rows=getFilteredRows();
    if(!rows.length){alert('Nicio data de exportat.');return;}
    const out=rows.map(([matNo,m])=>{
      const inp=S.stocVerifInputs[matNo]||{cantFizica:'',obs:''};
      const cantF=inp.cantFizica===''?'':parseFloat(inp.cantFizica)||0;
      const diff=cantF===''?'':cantF-m.onHand;
      const wipStr=Object.entries(m.wipByWC||{}).filter(([,v])=>v>0).map(([wc,v])=>`${wcLabel(wc)}: ${fmtN(v)}`).join('; ');
      return{'Cod Material':matNo,'Denumire':m.matName,'Tip':m.matType,'Prod. Finale':m.fpList.join(', '),
        'Nec. Plan':+m.necPlan.toFixed(2),'On Hand':+m.onHand.toFixed(2),'WIP Total':+m.totalWIP.toFixed(2),'WIP Detaliu':wipStr,
        'Cant. Fizica':cantF,'Diferenta':diff,'Observatii':inp.obs||''};
    });
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(out);
    ws['!cols']=[{wch:20},{wch:28},{wch:8},{wch:30},{wch:12},{wch:12},{wch:12},{wch:30},{wch:12},{wch:12},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws,'Verificare Stocuri');
    XLSX.writeFile(wb,`Verificare_Stocuri_${new Date().toISOString().slice(0,10)}.xlsx`);
  });
  tb.appendChild(expBtn);
  tb.appendChild(mkZoomCtrl('rapoarte'));
  container.appendChild(tb);

  // Count bar
  const countBar=dv('');countBar.id='vs-count-bar';
  countBar.style.cssText='padding:5px 14px;background:#fefce8;border-bottom:1px solid #fcd34d;font-size:11px;color:#92400e;font-weight:600;flex-shrink:0';
  container.appendChild(countBar);

  // Zoom + table
  const zoomArea=dv('');zoomArea.id='zoom-area-rapoarte';
  zoomArea.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column';
  zoomArea.style.zoom=(S.zoom.rapoarte/100).toString();
  const tableWrap=dv('sub-rep-wrap');tableWrap.style.cssText='flex:1;overflow:auto';
  zoomArea.appendChild(tableWrap);container.appendChild(zoomArea);

  function getFilteredRows(){
    const cf=f.colFilters||{};
    return [...allData.entries()].filter(([matNo,m])=>{
      if(f.fpFilter!=='all'&&!m.fpList.includes(f.fpFilter))return false;
      if(f.tipFilter!=='all'&&m.matType!==f.tipFilter)return false;
      if(cf.matNo&&!matNo.toLowerCase().includes(cf.matNo.toLowerCase()))return false;
      if(cf.matName&&!m.matName.toLowerCase().includes(cf.matName.toLowerCase()))return false;
      if(cf.fps&&!m.fpList.join(',').toLowerCase().includes(cf.fps.toLowerCase()))return false;
      if(cf.necPlan){const n=parseFloat(cf.necPlan);if(!isNaN(n)&&Math.abs(m.necPlan-n)>0.01)return false;}
      if(cf.onHand){const n=parseFloat(cf.onHand);if(!isNaN(n)&&Math.abs(m.onHand-n)>0.01)return false;}
      const inp=S.stocVerifInputs[matNo]||{};
      if(cf.cantFizica&&!(inp.cantFizica||'').toString().includes(cf.cantFizica))return false;
      if(cf.obs&&!(inp.obs||'').toLowerCase().includes(cf.obs.toLowerCase()))return false;
      return true;
    });
  }

  function rebuild(){buildTable();updateCount();}
  function updateCount(){
    const rows=getFilteredRows();
    const cb=document.getElementById('vs-count-bar');
    if(cb)cb.textContent=`${rows.length.toLocaleString()} componente · Nec. total: ${fmtN(rows.reduce((s,[,m])=>s+m.necPlan,0))} buc`;
  }

  function buildTable(){
    tableWrap.innerHTML='';
    const vc=f.colOrder.filter(c=>f.visibleCols.has(c));
    const rows=getFilteredRows();
    const tbl=el('table','sub-rep-table');tbl.style.tableLayout='fixed';
    const thead=el('thead');
    // Header
    const hr=el('tr');let dragSrc=null;
    vc.forEach(colId=>{
      const w=f.colWidths[colId]||120;
      const th=el('th');th.style.width=w+'px';
      const inner=dv('sub-rep-th-inner');
      inner.appendChild(sp('',LABELS[colId]||colId));
      const rh=el('div','plan-col-rh');
      rh.addEventListener('mousedown',e=>{
        e.stopPropagation();e.preventDefault();rh.classList.add('dragging');
        const sx=e.clientX,sw=f.colWidths[colId]||w;
        const mm=ev=>{const nw=Math.max(40,sw+(ev.clientX-sx));f.colWidths[colId]=nw;th.style.width=nw+'px';tbl.querySelectorAll(`td:nth-child(${vc.indexOf(colId)+1})`).forEach(t=>t.style.width=nw+'px');};
        const mu=()=>{rh.classList.remove('dragging');document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
        document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
      });
      inner.appendChild(rh);th.appendChild(inner);
      th.setAttribute('draggable','true');
      th.addEventListener('dragstart',e=>{dragSrc=colId;e.dataTransfer.effectAllowed='move';});
      th.addEventListener('dragover',e=>{e.preventDefault();th.classList.add('plan-drag-over');});
      th.addEventListener('dragleave',()=>th.classList.remove('plan-drag-over'));
      th.addEventListener('drop',e=>{
        e.preventDefault();th.classList.remove('plan-drag-over');
        if(!dragSrc||dragSrc===colId)return;
        const o=f.colOrder;const fi=o.indexOf(dragSrc),ti=o.indexOf(colId);
        if(fi<0||ti<0)return;o.splice(fi,1);o.splice(ti,0,dragSrc);buildTable();
      });
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    // Filter row
    const fr=el('tr');
    vc.forEach(colId=>{
      const th=el('th');th.style.cssText='background:#fff;border-bottom:1px solid var(--border);padding:2px 4px';
      th.style.width=(f.colWidths[colId]||120)+'px';
      if(TEXT_FILTER.has(colId)&&colId!=='cantFizica'&&colId!=='obs'){
        const inp=el('input','sub-rep-col-filter');inp.placeholder='...';inp.value=f.colFilters[colId]||'';
        inp.setAttribute('data-vs-filter',colId);
        inp.addEventListener('input',e2=>{
          const col=e2.target.getAttribute('data-vs-filter');
          const ss=e2.target.selectionStart,se2=e2.target.selectionEnd;
          f.colFilters[col]=e2.target.value;
          buildTable();updateCount();
          const r=tableWrap.querySelector(`input[data-vs-filter="${col}"]`);
          if(r){r.focus();try{r.setSelectionRange(ss,se2);}catch(_){}}
        });
        th.appendChild(inp);
      }
      fr.appendChild(th);
    });
    thead.appendChild(fr);tbl.appendChild(thead);
    // Body
    const tbody=el('tbody');
    for(const [matNo,m] of rows){
      const inp=S.stocVerifInputs[matNo]||(S.stocVerifInputs[matNo]={cantFizica:'',obs:''});
      const cantF=inp.cantFizica===''?null:parseFloat(inp.cantFizica);
      const diff=cantF===null?null:cantF-m.onHand;
      const tr=el('tr');
      vc.forEach(colId=>{
        const td=el('td');td.style.width=(f.colWidths[colId]||120)+'px';
        td.style.cssText+='overflow:hidden;padding:4px 8px;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2);vertical-align:middle;font-size:12px';
        if(colId==='matNo'){td.appendChild(sp('stk-code',matNo));}
        else if(colId==='matName'){td.textContent=m.matName;td.title=m.matName;}
        else if(colId==='fps'){
          const wrap2=dv('');wrap2.style.cssText='display:flex;flex-wrap:wrap;gap:3px';
          m.fpList.slice(0,3).forEach(fp=>{const p=sp('stk-fp-pill',fp);if(f.fpFilter===fp)p.style.background='#dbeafe';wrap2.appendChild(p);});
          if(m.fpList.length>3)wrap2.appendChild(sp('stk-fp-more',`+${m.fpList.length-3}`));
          td.appendChild(wrap2);
        }
        else if(colId==='matType'){const cls=m.matType==='M'?'stk-type-m':m.matType==='P'?'stk-type-b':'stk-type-d';if(m.matType)td.appendChild(sp(cls,m.matType));}
        else if(colId==='necPlan'){const s=sp('pdm-num',fmtN(m.necPlan));s.style.cssText='display:block;text-align:right;font-weight:600';td.appendChild(s);}
        else if(colId==='onHand'){const s=sp('pdm-num',fmtN(m.onHand));s.style.cssText=`display:block;text-align:right;color:${m.onHand<0?'#dc2626':m.onHand>0?'#15803d':'var(--text3)'}`;td.appendChild(s);}
        else if(colId==='wip'){
          if(m.totalWIP>0){
            const wrap2=dv('');wrap2.style.cssText='display:flex;flex-wrap:wrap;gap:2px';
            const entries=Object.entries(m.wipByWC||{}).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
            entries.slice(0,3).forEach(([wc,v])=>wrap2.appendChild(sp('stk-wip-pill',`${wcLabel(wc)}: ${fmtN(v)}`)));
            if(entries.length>3)wrap2.appendChild(sp('stk-fp-more',`+${entries.length-3}`));
            td.appendChild(wrap2);
          }else{td.style.color='var(--text4)';td.textContent='—';}
        }
        else if(colId==='cantFizica'){
          td.style.overflow='visible';td.style.padding='2px 4px';
          const inpF=el('input','vs-inp');inpF.type='number';inpF.min='0';inpF.step='0.01';
          inpF.value=inp.cantFizica||'';inpF.placeholder='0';
          inpF.addEventListener('input',e=>{inp.cantFizica=e.target.value;saveStocVerifInputs();
            // update diff cell inline
            const diffTd=tr.querySelector('[data-diff]');
            if(diffTd){const cf=e.target.value===''?null:parseFloat(e.target.value);renderDiffCell(diffTd,cf,m.onHand);}
          });
          td.appendChild(inpF);
        }
        else if(colId==='diff'){
          td.setAttribute('data-diff','1');
          renderDiffCell(td,cantF,m.onHand);
        }
        else if(colId==='obs'){
          td.style.overflow='visible';td.style.padding='2px 4px';
          const ta=el('textarea','vs-obs');ta.value=inp.obs||'';ta.placeholder='Observatii...';ta.rows=1;
          ta.addEventListener('input',e=>{inp.obs=e.target.value;ta.rows=Math.max(1,e.target.value.split('\n').length);saveStocVerifInputs();});
          td.appendChild(ta);
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    if(!rows.length){
      const tr2=el('tr');const td2=el('td');td2.colSpan=vc.length;
      td2.style.cssText='text-align:center;padding:24px;color:var(--text3);font-size:12px';
      td2.textContent='Niciun component corespunde filtrelor.';tr2.appendChild(td2);tbody.appendChild(tr2);
    }
    tbl.appendChild(tbody);tableWrap.appendChild(tbl);
  }

  function renderDiffCell(td,cantF,onHand){
    td.innerHTML='';
    if(cantF===null||cantF===undefined){td.textContent='—';td.style.color='var(--text4)';return;}
    const diff=cantF-onHand;
    const s=sp(diff>0?'vs-diff-pos':diff<0?'vs-diff-neg':'vs-diff-zero',(diff>0?'+':'')+fmtN(diff));
    td.appendChild(s);
  }

  rebuild();
}

function printVerificareStocuri(allData,f,LABELS){
  const filteredFn=()=>{
    return [...allData.entries()].filter(([matNo,m])=>{
      if(f.fpFilter!=='all'&&!m.fpList.includes(f.fpFilter))return false;
      if(f.tipFilter!=='all'&&m.matType!==f.tipFilter)return false;
      const cf=f.colFilters||{};
      if(cf.matNo&&!matNo.toLowerCase().includes(cf.matNo.toLowerCase()))return false;
      if(cf.matName&&!m.matName.toLowerCase().includes(cf.matName.toLowerCase()))return false;
      return true;
    });
  };
  const rows=filteredFn();
  const vc=f.colOrder.filter(c=>f.visibleCols.has(c));
  const printWin=window.open('','_blank','width=1100,height=800');
  if(!printWin){alert('Permite popup-urile pentru printare.');return;}

  const hdrRow=vc.map(c=>`<th>${LABELS[c]||c}</th>`).join('');
  const bodyRows=rows.map(([matNo,m])=>{
    const inp=S.stocVerifInputs[matNo]||{cantFizica:'',obs:''};
    const cantF=inp.cantFizica===''?null:parseFloat(inp.cantFizica);
    const diff=cantF===null?'—':cantF-m.onHand;
    const diffCls=typeof diff==='number'?diff>0?'red':diff<0?'green':'':'';
    const wipStr=Object.entries(m.wipByWC||{}).filter(([,v])=>v>0).map(([wc,v])=>`${wcLabel(wc)}: ${fmtN(v)}`).join('; ');
    const vals={matNo:`<b>${matNo}</b>`,matName:m.matName,fps:m.fpList.join(', '),matType:m.matType,
      necPlan:fmtN(m.necPlan),onHand:fmtN(m.onHand),wip:wipStr||'—',
      cantFizica:cantF===null?'':fmtN(cantF),
      diff:typeof diff==='number'?`<span class="${diffCls}">${diff>0?'+':''}${fmtN(diff)}</span>`:'—',
      obs:inp.obs||''};
    return '<tr>'+vc.map(c=>`<td>${vals[c]??''}</td>`).join('')+'</tr>';
  }).join('');

  const title=f.fpFilter&&f.fpFilter!=='all'?`Verificare Stocuri — ${f.fpFilter}`:'Verificare Stocuri Produse Planificate';
  printWin.document.write(`<!DOCTYPE html><html lang="ro"><head><meta charset="UTF-8"/><title>${title}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:10pt;padding:15px}
h2{font-size:13pt;margin-bottom:4px}p.sub{font-size:9pt;color:#666;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:9pt}
th{background:#f0f0f0;border:1px solid #999;padding:4px 6px;font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-align:left}
td{border:1px solid #ccc;padding:3px 6px;vertical-align:top}
tr:nth-child(even) td{background:#f9f9f9}
.red{color:#dc2626;font-weight:700}.green{color:#15803d;font-weight:700}
@media print{@page{size:landscape;margin:10mm}}
</style></head><body>
<h2>${title}</h2>
<p class="sub">Data: ${new Date().toLocaleDateString('ro-RO')} · ${rows.length} componente · Filtru FP: ${f.fpFilter==='all'?'Toate':f.fpFilter} · Tip: ${f.tipFilter==='all'?'Toate':f.tipFilter}</p>
<table><thead><tr>${hdrRow}</tr></thead><tbody>${bodyRows}</tbody></table>
</body></html>`);
  printWin.document.close();
  setTimeout(()=>{printWin.focus();printWin.print();},400);
}


/* ═══════════════════════════════════════════════════════════════
   PROGRAMARE WORKCENTER
═══════════════════════════════════════════════════════════════ */
function buildPwcData(eff){
  const byKey=new Map();
  if(!S.planData.size||!S.bomIdx||!S.bowIdx) return[];
  const sortedPlan=[...S.planData.entries()].sort((a,b)=>{
    const pa=S.planPrio[a[0]]||'',pb=S.planPrio[b[0]]||'';
    if(!pa&&!pb)return a[0].localeCompare(b[0]);
    if(!pa)return 1;if(!pb)return -1;
    const na=parseFloat(pa),nb=parseFloat(pb);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;
    return pa.localeCompare(pb);
  });
  const processComp=(itemNo,prio,matNo,unitsNeeded)=>{
    const rawOps=S.bowIdx?.get(`${itemNo}__${matNo}`)||[];if(!rawOps.length)return;
    const ops=rawOps.map(op=>({
      seq:parseFloat(String(op['Ope seq']||'0').replace(',','.'))||0,
      opNoNum:parseFloat(String(op['Operation no']||'0').replace(',','.'))||0,
      opNo:str(op['Operation no']||''),
      wcName:str(op['Ope name']||op['Ope descr']||'?'),
      runT:parseFloat(String(op['Run time']||'0').replace(',','.'))||0,
      setupT:parseFloat(String(op['Setup time']||'0').replace(',','.'))||0,
    })).sort((a,b)=>a.seq-b.seq);
    const stock=S.stockIdx?.get(matNo)||{onHand:0,wipByWC:{}};
    const onHand=Math.max(0,stock.onHand);
    const wipByWC=stock.wipByWC||{};
    const wipAtIdx=new Map();
    for(const [poCol,wipQty] of Object.entries(wipByWC)){
      if(!wipQty||wipQty<=0)continue;
      const wcNamePO=wcLabel(poCol).toLowerCase();
      let bestIdx=-1;
      for(let i=ops.length-1;i>=0;i--){if(ops[i].wcName.toLowerCase()===wcNamePO){bestIdx=i;break;}}
      if(bestIdx<0)continue;
      wipAtIdx.set(bestIdx,(wipAtIdx.get(bestIdx)||0)+wipQty);
    }
    const st=S.stockIdx?.get(matNo)||{onHand:0,name:'',type:''};
    for(let i=0;i<ops.length;i++){
      const op=ops[i];
      let alreadyDone=onHand;let wipBefore=0;const wipAtWC=wipAtIdx.get(i)||0;
      for(const [seqIdx,wq] of wipAtIdx){if(seqIdx>i)alreadyDone+=wq;if(seqIdx<i)wipBefore+=wq;}
      const dePrelucrat=Math.max(0,unitsNeeded-alreadyDone);
      const runMin=dePrelucrat>0?(dePrelucrat*op.runT)/eff:0;
      const setupMin=dePrelucrat>0?op.setupT/eff:0;
      const wcMeta=S.wcSetupIdx?.[op.wcName];
      const wcGroup=wcMeta?.wcGroup||'';
      const key=`${matNo}||${op.wcName}`;
      if(!byKey.has(key)){byKey.set(key,{prio,matNo,matName:st.name||'',matType:st.type||'',wcName:op.wcName,wcGroup,opNo:op.opNo,opNoNum:op.opNoNum,opSeq:op.seq,totalNec:0,onHand:st.onHand,wipAtWC:0,wipBefore:0,dePrelucrat:0,runT:op.runT,setupT:op.setupT,runMin:0,setupMin:0,execTimeMin:0,fps:[],fpDetails:[]});}
      const row=byKey.get(key);
      row.totalNec+=unitsNeeded;row.wipAtWC=wipAtWC;row.wipBefore=wipBefore;row.dePrelucrat+=dePrelucrat;row.runMin+=runMin;row.setupMin+=setupMin;row.execTimeMin+=runMin+setupMin;
      if(!row.fps.includes(itemNo)){row.fps.push(itemNo);row.fpDetails.push({itemNo,prio,qty:unitsNeeded,dePrelucrat,execTimeMin:runMin+setupMin});}
      else{const fd=row.fpDetails.find(f=>f.itemNo===itemNo);if(fd){fd.qty+=unitsNeeded;fd.dePrelucrat+=dePrelucrat;fd.execTimeMin+=runMin+setupMin;}}
      const cp=parseFloat(prio),rp=parseFloat(row.prio);
      if(!row.prio||(prio&&(!isNaN(cp)&&!isNaN(rp)?cp<rp:prio<row.prio)))row.prio=prio;
    }
  };
  for(const [itemNo,plan] of sortedPlan){
    const prio=S.planPrio[itemNo]||'';
    const planQ=plan.totalQty;
    const stockFP=S.stockIdx?.get(itemNo)||{onHand:0};
    const effectiveQty=Math.max(0,planQ-Math.max(0,stockFP.onHand));
    if(effectiveQty<=0)continue;
    processComp(itemNo,prio,itemNo,planQ);
    const walkBOM=(compNo,parentQty,vis)=>{
      const key=`${itemNo}__${compNo}`;
      const bomRows=S.bomIdx?.get(key)||[];
      for(const row of bomRows){
        const matNo=str(row['Material no']);if(!matNo)continue;
        const unQty=parseFloat(row['Material qty'])||1;
        const neededQty=parentQty*unQty;
        const st2=S.stockIdx?.get(matNo)||{type:''};
        if(st2.type!=='P')processComp(itemNo,prio,matNo,neededQty);
        if(!vis.has(matNo)&&(S.bomIdx?.get(`${itemNo}__${matNo}`)||[]).length>0)walkBOM(matNo,neededQty,new Set([...vis,matNo]));
      }
    };
    walkBOM(itemNo,effectiveQty,new Set([itemNo]));
  }
  return [...byKey.values()].sort((a,b)=>{
    const pa=a.prio||'',pb=b.prio||'';
    if(!pa&&!pb)return a.matNo.localeCompare(b.matNo);
    if(!pa)return 1;if(!pb)return -1;
    const na=parseFloat(pa),nb=parseFloat(pb);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;
    return pa.localeCompare(pb)||a.matNo.localeCompare(b.matNo);
  });
}

function getWcGroups(){
  if(!S.wcSetupIdx)return[];
  const groups=new Map();
  for(const [wcName,d] of Object.entries(S.wcSetupIdx)){
    const g=d.wcGroup||d.wcType||'';if(!g)continue;
    if(!groups.has(g))groups.set(g,{label:g.replace(/^\d+ /,''),wcGroup:g,wcs:[],totalTeam:0});
    const grp=groups.get(g);grp.wcs.push(wcName);grp.totalTeam+=d.prodTeam||0;
  }
  return [...groups.values()].sort((a,b)=>a.wcGroup.localeCompare(b.wcGroup));
}

function renderPwcTab(){
  const page=dv('pwc-page');
  const ps=S.pwcState;
  if(!S.planData.size){page.appendChild(mkEmpty('Programare Workcenter','Adaugati produse in Planificare.'));return page;}
  if(!S.bomIdx||!S.bowIdx){page.appendChild(mkEmpty('Programare Workcenter','Incarcati fisierele BOM si BOW.'));return page;}

  const groups=getWcGroups();
  if(!ps.selectedGroup&&groups.length>0)ps.selectedGroup=groups[0].wcGroup;
  if(!ps.scheduled)ps.scheduled=[];

  // ── Toolbar ──
  const tb=dv('pwc-toolbar');
  tb.appendChild(sp('','Workcenter Group:'));
  const grpSel=el('select','stk-sel');grpSel.style.minWidth='180px';
  const optAll=el('option');optAll.value='';optAll.textContent='Toate tipurile';grpSel.appendChild(optAll);
  groups.forEach(g=>{const o=el('option');o.value=g.wcGroup;o.textContent=g.label+` (${g.totalTeam} echipe · ${(g.totalTeam*8).toFixed(0)}h)`;if(ps.selectedGroup===g.wcGroup)o.selected=true;grpSel.appendChild(o);});
  grpSel.addEventListener('change',e=>{ps.selectedGroup=e.target.value;ps.scheduled=[];rebuild();});
  tb.appendChild(grpSel);
  tb.appendChild(sp('','Eficienta:'));
  const effInp=el('input','plan-eff-inp');effInp.type='number';effInp.min='1';effInp.max='100';effInp.step='1';effInp.value=String(ps.eff||100);effInp.style.width='60px';
  effInp.addEventListener('input',e=>{ps.eff=Math.min(100,Math.max(1,parseInt(e.target.value)||100));rebuild();});
  tb.appendChild(effInp);tb.appendChild(sp('','%'));
  const printBtn=el('button','tbtn');printBtn.textContent='🖨 Printeaza';
  printBtn.addEventListener('click',()=>window.print());
  tb.appendChild(printBtn);
  const exportBtn=el('button','tbtn');exportBtn.textContent='⬇ Export Excel';
  exportBtn.addEventListener('click',()=>exportPwcPlan());
  tb.appendChild(exportBtn);
  page.appendChild(tb);

  const body=dv('pwc-body');
  page.appendChild(body);

  function rebuild(){
    body.innerHTML='';
    const eff=(ps.eff||100)/100;
    const allData=buildPwcData(eff);
    const curGroup=groups.find(g=>g.wcGroup===ps.selectedGroup)||null;
    const grpData=ps.selectedGroup?allData.filter(r=>r.wcGroup===ps.selectedGroup&&r.dePrelucrat>0):allData.filter(r=>r.dePrelucrat>0);
    const availH=curGroup?curGroup.totalTeam*8:0;
    const availMin=availH*60;

    // Compute WIP for the selected group (sum of WIP across all WCs in the group)
    const grpWcNames=curGroup?curGroup.wcs:[];
    // For each component, sum WIP from all WCs in the group
    const getWipForGroup=(matNo)=>{
      const st=S.stockIdx?.get(matNo)||{wipByWC:{}};
      let total=0;
      for(const [poCol,wipQty] of Object.entries(st.wipByWC||{})){
        if(!wipQty||wipQty<=0)continue;
        const wc=wcLabel(poCol);
        if(!ps.selectedGroup||grpWcNames.some(g=>g.toLowerCase()===wc.toLowerCase()))total+=wipQty;
      }
      return total;
    };

    // Track selected cards for multi-select
    if(!ps.selected)ps.selected=new Set();

    // ── Left: source cards panel (20%) ──
    const cardsPanel=dv('pwc-cards-panel');

    // Cards toolbar: select all / add selected
    const cardsTb=dv('');cardsTb.style.cssText='display:flex;gap:4px;padding:5px 6px;background:#fff;border-bottom:1px solid var(--border2);flex-shrink:0;flex-wrap:wrap';
    const availCards=grpData.filter(r=>!ps.scheduled.includes(`${r.matNo}||${r.wcName}`));
    const addAllBtn=el('button','tbtn');addAllBtn.style.cssText='font-size:10px;height:24px;padding:0 8px';
    addAllBtn.textContent='+ Adauga toate';
    addAllBtn.addEventListener('click',()=>{
      availCards.forEach(r=>{const k=`${r.matNo}||${r.wcName}`;if(!ps.scheduled.includes(k))ps.scheduled.push(k);});
      ps.selected=new Set();rebuild();
    });
    const addSelBtn=el('button','tbtn');addSelBtn.style.cssText='font-size:10px;height:24px;padding:0 8px';
    addSelBtn.textContent='+ Selectate';
    addSelBtn.addEventListener('click',()=>{
      ps.selected.forEach(k=>{if(!ps.scheduled.includes(k))ps.scheduled.push(k);});
      ps.selected=new Set();rebuild();
    });
    const rmAllBtn=el('button','tbtn');rmAllBtn.style.cssText='font-size:10px;height:24px;padding:0 8px;color:#dc2626';
    rmAllBtn.textContent='✕ Elimina toate';
    rmAllBtn.addEventListener('click',()=>{ps.scheduled=[];ps.selected=new Set();rebuild();});
    cardsTb.appendChild(addAllBtn);cardsTb.appendChild(addSelBtn);cardsTb.appendChild(rmAllBtn);
    cardsPanel.appendChild(cardsTb);

    const cardsTitle=dv('pwc-cards-title');
    cardsTitle.textContent=`${availCards.length} componente de prelucrat`;
    cardsPanel.appendChild(cardsTitle);

    const cardsScroll=dv('pwc-cards-scroll');
    availCards.forEach(r=>{
      const key=`${r.matNo}||${r.wcName}`;
      const isSel=ps.selected.has(key);
      const card=dv(`pwc-comp-card${isSel?' selected':''}`);
      if(isSel)card.style.cssText='border-color:var(--accent);background:#dbeafe;box-shadow:0 0 0 2px #bfdbfe';
      card.setAttribute('draggable','true');
      card.title=`${r.matNo} · ${r.wcName}\nDe prelucrat: ${fmtN(r.dePrelucrat)} buc\nTimp: ${fmtMin(r.execTimeMin)}\nProduse finale: ${r.fps.join(', ')}`;
      // Click = toggle select; drag = add to plan
      card.addEventListener('click',e=>{
        e.stopPropagation();
        if(ps.selected.has(key))ps.selected.delete(key);else ps.selected.add(key);
        rebuild();
      });
      card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',key);e.dataTransfer.effectAllowed='copy';});
      const codeEl=dv('pwc-card-code');codeEl.textContent=r.matNo;card.appendChild(codeEl);
      const fpEl=dv('pwc-card-fp');fpEl.textContent=r.fps.slice(0,2).join(', ')+(r.fps.length>2?` +${r.fps.length-2}`:'');card.appendChild(fpEl);
      const qtyEl=dv('pwc-card-qty');qtyEl.textContent=fmtN(r.dePrelucrat)+' buc';card.appendChild(qtyEl);
      const timeEl=dv('pwc-card-time');timeEl.textContent=fmtMin(r.execTimeMin)+' ('+r.wcName+')';card.appendChild(timeEl);
      cardsScroll.appendChild(card);
    });
    cardsPanel.appendChild(cardsScroll);
    body.appendChild(cardsPanel);

    // ── Right: plan panel (80%) ──
    const planPanel=dv('pwc-plan-panel');
    // Header with title, progress bar, and stats
    const planHdr=dv('pwc-plan-header');
    const planTitle=dv('pwc-plan-title');
    planTitle.textContent=`Plan de lucru zilnic — ${curGroup?curGroup.label:'Toate grupurile'}`;
    planHdr.appendChild(planTitle);

    // Progress bar
    const schedKeys=ps.scheduled.filter(k=>grpData.find(r=>`${r.matNo}||${r.wcName}`===k));
    ps.scheduled=schedKeys;
    const schedMin=schedKeys.reduce((s,k)=>{const r=grpData.find(r=>`${r.matNo}||${r.wcName}`===k);return s+(r?.execTimeMin||0);},0);
    const pct=availMin>0?Math.min(100,schedMin/availMin*100):0;
    const barColor=pct<=80?'#16a34a':pct<=100?'#d97706':'#dc2626';
    if(availMin>0){
      const progWrap=dv('pwc-prog-wrap');
      const progFill=dv('pwc-prog-fill');progFill.style.cssText=`width:${pct.toFixed(1)}%;background:${barColor}`;
      const progLbl=dv('pwc-prog-lbl');progLbl.textContent=`${pct.toFixed(0)}% · ${fmtMin(schedMin)}/${fmtMin(availMin)}`;
      progWrap.appendChild(progFill);progWrap.appendChild(progLbl);
      planHdr.appendChild(progWrap);
    }
    const metaEl=dv('pwc-plan-meta');
    metaEl.textContent=`${schedKeys.length} componente · ${fmtMin(schedMin)} programat${availMin>0?' · Ramas: '+fmtMin(Math.max(0,availMin-schedMin)):''}`;
    planHdr.appendChild(metaEl);
    planPanel.appendChild(planHdr);

    // Drop zone
    const dropZone=dv('pwc-drop-zone');
    const hint=dv('pwc-drop-hint');
    hint.innerHTML='<div style="font-size:32px">↖</div><div>Trage casete din stânga pentru a programa componente</div>';
    if(schedKeys.length>0)hint.classList.add('hidden');
    dropZone.appendChild(hint);
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
    dropZone.addEventListener('dragleave',e=>{if(!dropZone.contains(e.relatedTarget))dropZone.classList.remove('drag-over');});
    dropZone.addEventListener('drop',e=>{
      e.preventDefault();dropZone.classList.remove('drag-over');
      const key=e.dataTransfer.getData('text/plain');
      if(key&&!ps.scheduled.includes(key)){ps.scheduled.push(key);rebuild();}
    });

    // Plan table (if items scheduled)
    if(schedKeys.length>0){
      const tableWrap=dv('pwc-plan-table-wrap');
      const tbl=el('table','pwc-plan-table');
      const thead=el('thead');const hr=el('tr');
      ['','Prio','Componenta','Denumire','Prod. Finale','Cant. nec.','On Hand','WIP Grup','De executat','Timp exec.'].forEach(h=>{
        const th=el('th');th.textContent=h;hr.appendChild(th);
      });
      thead.appendChild(hr);tbl.appendChild(thead);
      const tbody=el('tbody');
      // Sort scheduled by prio
      const schedSorted=[...schedKeys].sort((a,b)=>{
        const ra=grpData.find(r=>`${r.matNo}||${r.wcName}`===a);
        const rb=grpData.find(r=>`${r.matNo}||${r.wcName}`===b);
        const pa=ra?.prio||'',pb=rb?.prio||'';
        if(!pa&&!pb)return 0;if(!pa)return 1;if(!pb)return -1;
        const na=parseFloat(pa),nb=parseFloat(pb);
        if(!isNaN(na)&&!isNaN(nb))return na-nb;
        return pa.localeCompare(pb);
      });
      schedSorted.forEach((key,idx2)=>{
        const r=grpData.find(r=>`${r.matNo}||${r.wcName}`===key);if(!r)return;
        // Single aggregated row per component (quantities already summed across all FPs)
        const tr=el('tr');
        const tdR=el('td');tdR.style.width='28px';
        const removeBtn=el('button','pwc-remove-row');removeBtn.title='Scoate din plan';
        removeBtn.textContent='🗑';removeBtn.style.cssText='font-size:13px;background:none;border:none;cursor:pointer;color:#dc2626;padding:0 2px';
        removeBtn.addEventListener('click',()=>{ps.scheduled=ps.scheduled.filter(k=>k!==key);rebuild();});
        tdR.appendChild(removeBtn);tr.appendChild(tdR);
        const tdPrio=el('td');const pS=sp('');pS.style.cssText='font-weight:800;font-family:Arial,monospace;color:#92400e';pS.textContent=r.prio;tdPrio.appendChild(pS);tr.appendChild(tdPrio);
        const tdMat=el('td');tdMat.appendChild(sp('stk-code',r.matNo));tr.appendChild(tdMat);
        const tdNm=el('td');tdNm.style.cssText='max-width:200px;overflow:hidden;text-overflow:ellipsis';tdNm.textContent=r.matName;tr.appendChild(tdNm);
        // FPs as pills (for info)
        const tdFP=el('td');const fpW=dv('');fpW.style.cssText='display:flex;flex-wrap:wrap;gap:2px';
        r.fps.slice(0,3).forEach(fp=>fpW.appendChild(sp('stk-fp-pill',fp)));
        if(r.fps.length>3)fpW.appendChild(sp('stk-fp-more',`+${r.fps.length-3}`));
        tdFP.appendChild(fpW);tr.appendChild(tdFP);
        const num=(v,col)=>{const td2=el('td');const s=sp('pdm-num',fmtN(v));if(col)s.style.color=col;s.style.cssText=(s.style.cssText||'')+'display:block;text-align:right';td2.appendChild(s);return td2;};
        tr.appendChild(num(r.totalNec));
        tr.appendChild(num(r.onHand,r.onHand<0?'#dc2626':r.onHand>0?'#15803d':'var(--text3)'));
        const wipGrp=getWipForGroup(r.matNo);
        tr.appendChild(num(wipGrp,wipGrp>0?'#d97706':'var(--text3)'));
        tr.appendChild(num(r.dePrelucrat,r.dePrelucrat>0?'#dc2626':'#15803d'));
        const tdT=el('td');const tS=sp('pdm-num',fmtMin(r.execTimeMin));tS.style.cssText='font-weight:700;color:#7c3aed;display:block;text-align:right';tdT.appendChild(tS);tr.appendChild(tdT);
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);tableWrap.appendChild(tbl);
      dropZone.appendChild(tableWrap);
    }
    planPanel.appendChild(dropZone);
    body.appendChild(planPanel);

    function exportPwcPlan(){
      const rows=[];
      schedSorted?.forEach(key=>{
        const r=grpData.find(r=>`${r.matNo}||${r.wcName}`===key);if(!r)return;
        rows.push({'Prio':r.prio,'Componenta':r.matNo,'Denumire':r.matName,
          'Produse Finale':r.fps.join(', '),'Cant. nec.':+r.totalNec.toFixed(2),
          'On Hand':+r.onHand.toFixed(2),'WIP Grup':+getWipForGroup(r.matNo).toFixed(2),
          'De executat':+r.dePrelucrat.toFixed(2),
          'Run (min)':+r.runMin.toFixed(2),'Setup (min)':+r.setupMin.toFixed(2),
          'Timp exec. (min)':+r.execTimeMin.toFixed(2),'Workcenter':r.wcName});
      });
      if(!rows.length){alert('Nu exista date.');return;}
      const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb,ws,'Plan WC');
      XLSX.writeFile(wb,`Plan_WC_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
    exportBtn.onclick=exportPwcPlan;
  }

  rebuild();
  return page;
}


function mkEmpty(h,p,showLeg){
  const w=dv('empty');
  w.appendChild(sp('empty-ico','⬡'));w.appendChild(sp('empty-h',h));
  if(p){const pe=el('p','empty-p');pe.textContent=p;w.appendChild(pe);}
  if(showLeg){
    const leg=dv('leg');
    [[dv('leg-make'),'MAKE – fabricat intern'],[dv('leg-buy'),'BUY – achizitionat'],[dv('leg-op'),'Operatii BOW']].forEach(([icon,text])=>{
      const li=dv('leg-item');li.appendChild(icon);li.appendChild(document.createTextNode(' '+text));leg.appendChild(li);
    });
    w.appendChild(leg);
  }
  return w;
}

autoLoad();
</script>
</body>
