async function loadUsersTable(container){
  container.innerHTML='<div style="padding:14px;color:var(--text3);font-size:12px">Se incarca...</div>';
  try{
    const{users}=await sbGetUsers();
    container.innerHTML='';
    const tbl=el('table','users-table');
    const thead=el('thead');const hr=el('tr');
    ['Username','Rol','Creat','Actiuni'].forEach(h=>{const th=el('th');th.textContent=h;hr.appendChild(th);});
    thead.appendChild(hr);tbl.appendChild(thead);
    const tbody=el('tbody');
    for(const u of users){
      const tr=el('tr');
      const tdU=el('td');tdU.textContent=u.username;
      const tdR=el('td');tdR.appendChild(sp(u.role==='admin'?'role-admin':'role-user',u.role==='admin'?'ADMIN':'USER'));
      const tdC=el('td');tdC.textContent=u.createdAt?new Date(u.createdAt).toLocaleDateString('ro-RO'):'—';
      const tdA=el('td');
      const cp=el('button','user-action-btn');cp.textContent='🔑 Schimba parola';
      cp.addEventListener('click',async()=>{const np=prompt(`Parola noua pentru ${u.username}:`);if(!np)return;try{await sbChangePassword(u.username,np);alert('Parola schimbata!');}catch(e){alert(e.message);}});
      tdA.appendChild(cp);
      if(u.username!==S.session?.username){
        const dl=el('button','user-action-btn del');dl.textContent='✕ Sterge';
        dl.addEventListener('click',async()=>{if(!confirm(`Stergi ${u.username}?`))return;try{await sbDeleteUser(u.username);loadUsersTable(container);}catch(e){alert(e.message);}});
        tdA.appendChild(dl);
      }
      tr.appendChild(tdU);tr.appendChild(tdR);tr.appendChild(tdC);tr.appendChild(tdA);tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);container.appendChild(tbl);
  }catch(e){container.innerHTML=`<div style="padding:14px;color:#dc2626;font-size:12px">Eroare: ${e.message}</div>`;}
}

function render(){
  const root=document.getElementById('app');
  root.innerHTML='';

  // ── No session → show auth screen ──
  if(!S.session){
    root.appendChild(S.authScreen==='setup'?renderSetup():renderLogin());
    if(S.loading){
      const ov=dv('loading-overlay');
      const inner=dv('loading-overlay-inner');
      inner.appendChild(el('div','spin'));
      const lm=sp('loading-text',S.loadMsg);lm.id='load-msg';
      inner.appendChild(lm);ov.appendChild(inner);root.appendChild(ov);
    }
    return;
  }

  const app=el('div');
  app.style.cssText='display:flex;flex-direction:column;height:100dvh;height:100vh;overflow:hidden;position:relative';

  // HEADER
  const hdr=dv('hdr');

  const logo=dv('hdr-logo');
  logo.appendChild(sp('logo-mark','⬡'));
  logo.appendChild(sp('logo-text','PRODUCTION PLANNING SUITE'));
  const mobBtn=dv('mob-menu-btn');mobBtn.textContent='☰';mobBtn.title='Meniu';
  mobBtn.style.display='none';
  mobBtn.addEventListener('click',()=>{
    const sbar=document.querySelector('.sbar');
    const ov=document.getElementById('sbar-overlay');
    const isOpen=sbar?.classList.contains('open');
    if(sbar)sbar.classList.toggle('open',!isOpen);
    if(ov)ov.classList.toggle('show',!isOpen);
    document.body.style.overflow=isOpen?'':'hidden';
  });
  logo.appendChild(mobBtn);
  hdr.appendChild(logo);

  // Nav tabs
  const tabs=[
    {id:'fisiere',label:'Fisiere',dot:true},
    {id:'structura',label:'Structura'},
    {id:'stocuri',label:'Stocuri'},
    {id:'orderbook',label:'Order Book'},
    {id:'rapoarte',label:'Rapoarte'},
    {id:'planificare',label:'Planificare'},
    {id:'pwc',label:'Programare WC'},
    {id:'scanner',label:'📷 Scanner'},
  ];
  if(S.session.role==='admin') tabs.push({id:'utilizatori',label:'Utilizatori'});

  const nav=dv('hdr-nav');
  tabs.forEach(t=>{
    const tab=el('div',`nav-tab${S.tab===t.id?' active':''}`);
    if(t.dot){tab.appendChild(el('div',S.bomData&&S.bowData?'dot-ok':'dot-no'));}
    tab.appendChild(document.createTextNode(t.label));
    tab.addEventListener('click',()=>{S.tab=t.id;render();});
    nav.appendChild(tab);
  });
  hdr.appendChild(nav);

  // User info + sync + logout in header
  const hr=dv('hdr-user');
  if(S.sbCfg){
    const syncBtn=el('button','hdr-sync-btn');syncBtn.id='hdr-sync-btn';
    syncBtn.textContent='↻ Sync';syncBtn.title='Sincronizeaza cu GitHub';
    syncBtn.addEventListener('click',async()=>{
      syncBtn.textContent='↻ ...';syncBtn.disabled=true;
      try{
        S.loading=true;S.loadMsg='Se sincronizeaza...';render();await yieldFrame();
        await sbLoadAllData();
        S.loading=false;render();
      }catch(e){
        S.loading=false;render();
        // Show toast instead of alert
        const t=dv('');
        t.style.cssText='position:fixed;bottom:20px;right:20px;background:#dc2626;color:#fff;padding:10px 16px;border-radius:6px;font-size:12px;z-index:9999;max-width:320px;box-shadow:0 4px 12px rgba(0,0,0,.3)';
        t.textContent='Sync error: '+e.message+' — Reconfigureaza GitHub din pagina de login.';
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),6000);
      }
    });
    hr.appendChild(syncBtn);
  }
  hr.appendChild(sp('hdr-username',S.session.username));
  hr.appendChild(sp('hdr-role',S.session.role==='admin'?'ADMIN':'USER'));
  const logoutBtn=el('button','hdr-logout');logoutBtn.textContent='Iesire';
  logoutBtn.addEventListener('click',()=>{clearSession();S.session=null;S.authScreen='login';render();});
  hr.appendChild(logoutBtn);
  hdr.appendChild(hr);
  app.appendChild(hdr);

  // BODY
  const body=dv('body');
  const sbarOverlay=dv('sbar-overlay');sbarOverlay.id='sbar-overlay';
  sbarOverlay.addEventListener('click',()=>{
    const sbar=document.querySelector('.sbar');
    if(sbar)sbar.classList.remove('open');
    sbarOverlay.classList.remove('show');
    document.body.style.overflow='';
  });
  body.appendChild(sbarOverlay);

  if(S.tab==='fisiere')       body.appendChild(renderFisiereTab());
  else if(S.tab==='structura'){body.classList.add('has-structura');body.appendChild(renderSidebar());body.appendChild(renderStructura());}
  else if(S.tab==='stocuri')  body.appendChild(renderStocuriTab());
  else if(S.tab==='orderbook')body.appendChild(renderOrderBook());
  else if(S.tab==='rapoarte') body.appendChild(renderRapoarte());
  else if(S.tab==='planificare')body.appendChild(renderPlanificare());
  else if(S.tab==='pwc')body.appendChild(renderPwcTab());
  else if(S.tab==='scanner')body.appendChild(renderScanner());
  else if(S.tab==='utilizatori'&&S.session.role==='admin')body.appendChild(renderUsersTab());
  else{const c=dv('cnt');c.style.flex='1';c.appendChild(mkEmpty('Modul in constructie',''));body.appendChild(c);}

  app.appendChild(body);
  root.appendChild(app);
  if(S.loading){
    const ov=dv('loading-overlay');
    const inner=dv('loading-overlay-inner');
    inner.appendChild(el('div','spin'));
    const lm=sp('loading-text',S.loadMsg);lm.id='load-msg';
    inner.appendChild(lm);ov.appendChild(inner);app.appendChild(ov);
  }
}

function renderFisiereTab(){
  const page=dv('files-page');
  page.style.overflow='hidden';page.style.display='flex';page.style.flexDirection='column';

  // Header bar with zoom
  const hhBar=dv('');hhBar.style.cssText='display:flex;align-items:flex-start;justify-content:space-between;padding:20px 32px 0;flex-shrink:0';
  const hh=dv('');
  hh.appendChild(dv('files-page-title','Managementul fisierelor'));
  hh.appendChild(dv('files-page-sub','Incarcati fisierele Excel zilnic. Aplicatia retine ultimele versiuni intre sesiuni, in stocarea locala a browserului.'));
  hhBar.appendChild(hh);
  hhBar.appendChild(mkZoomCtrl('fisiere'));
  page.appendChild(hhBar);

  // Zoom area — CSS zoom scales px-based card contents
  const zoomArea=dv('');zoomArea.id='zoom-area-fisiere';
  zoomArea.style.cssText='flex:1;overflow-y:auto;padding:16px 32px 40px';
  zoomArea.style.zoom=(S.zoom.fisiere/100).toString();

  const cards=dv('file-cards');
  [{key:'bom',icon:'📋',title:'TRV-Product structure – BOM',desc:'Structura materiala a produselor (componente, cantitati, tip MAKE/BUY)'},
   {key:'bow',icon:'⚙',title:'TRV-Product structure – BOW',desc:'Operatiile de productie asociate fiecarei componente (operatii, timpi)'},
   {key:'po',icon:'📊',title:'Planning Overview',desc:'Stocuri On Hand, WIP per workcenter, comenzi deschise'},
   {key:'ob',icon:'📦',title:'Open Order Lines',desc:'Comenzi deschise: Entry/Confirm/Request dt, cantitati, clienti, preturi'},
   {key:'wcs',icon:'🔧',title:'Workcenter Setup',desc:'Workcenter Type (Initial/Intermediary/Final Op), numarul de echipe (Prod Team) pentru calculul capacitatii'},
   {key:'intransit',icon:'🚚',title:'In Transit',desc:'Produse finite expediate, neinca receptionate de client. Se scad din stocul On Hand al produselor finale.'}]
  .forEach(fc=>{
    const loaded=fc.key==='bom'?!!S.bomData:fc.key==='bow'?!!S.bowData:fc.key==='po'?!!S.poData:fc.key==='wcs'?!!S.wcSetupData:fc.key==='intransit'?!!S.inTransitData:!!S.obData;
    const meta=fc.key==='wcs'?{rows:S.wcSetupData?.length||0,ts:S.wcSetupData?._ts}:fc.key==='intransit'?{rows:S.inTransitData?.length||0,ts:S.inTransitData?._ts}:(S.meta[fc.key]||{rows:0,ts:null});
    const card=dv(`file-card${loaded?' loaded':''}`);
    const fch=dv('fc-header');
    fch.appendChild(sp('fc-icon',fc.icon));
    const fci=dv('fc-info');
    fci.appendChild(dv('fc-title',fc.title));fci.appendChild(dv('fc-desc',fc.desc));
    fch.appendChild(fci);fch.appendChild(sp(`fc-badge ${loaded?'ok':'no'}`,loaded?'INCARCAT':'LIPSA'));
    card.appendChild(fch);
      if(loaded&&meta.rows>0){
      const fcs=dv('fc-stats');
      const sv=dv('fc-stat');sv.appendChild(dv('fc-stat-val',meta.rows.toLocaleString()));sv.appendChild(dv('fc-stat-lbl','randuri'));fcs.appendChild(sv);
      if(fc.key==='bom'&&S.fps.length>0){const sp2=dv('fc-stat');sp2.appendChild(dv('fc-stat-val',S.fps.length.toLocaleString()));sp2.appendChild(dv('fc-stat-lbl','produse finite'));fcs.appendChild(sp2);}
      if(fc.key==='po'&&S.stockIdx){const sp3=dv('fc-stat');sp3.appendChild(dv('fc-stat-val',S.stockIdx.size.toLocaleString()));sp3.appendChild(dv('fc-stat-lbl','materiale in stoc'));fcs.appendChild(sp3);}
      card.appendChild(fcs);
    }
    const ua=dv('fc-upload-area');
    const tsEl=dv(`fc-timestamp${loaded?' ok':''}`);
    tsEl.appendChild(sp('',loaded?'🕐 ':'○ '));
    if(loaded&&meta.ts){const d=new Date(meta.ts);tsEl.appendChild(document.createTextNode(`Ultima incarcare: ${d.toLocaleDateString('ro-RO')} ${d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}`))}
    else tsEl.appendChild(document.createTextNode('Niciodată incarcat'));
    ua.appendChild(tsEl);
    const inp=el('input');inp.type='file';inp.accept='.xlsx,.xls';inp.style.display='none';
    const lbl=el('label',`upbtn${loaded?' ok':''}`);
    lbl.appendChild(inp);lbl.appendChild(document.createTextNode(loaded?'↻ Reincarcare fisier':'+ Incarca fisier'));
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      lbl.innerHTML='';lbl.appendChild(el('span','spin-sm'));lbl.appendChild(document.createTextNode(' Se proceseaza...'));
      try{
        // Parse XLSX → rows on upload (one-time cost)
        const buf=await readFileAsBuffer(file);
        const rows=parseBuffer(new Uint8Array(buf));
        const ts=Date.now();
        if(fc.key==='bom')applyBom(rows,ts);else if(fc.key==='bow')applyBow(rows,ts);else if(fc.key==='po')applyPo(rows,ts);else if(fc.key==='wcs'){applyWcSetup(rows,ts);rows._ts=ts;}else if(fc.key==='intransit'){applyInTransit(rows,ts);rows._ts=ts;}else applyOb(rows,ts);
        if(fc.key==='wcs'||fc.key==='intransit'){await dbSave(fc.key,{rows,ts});}else{await dbSave(fc.key,{rows,ts});}
        if(S.sbCfg&&S.session?.role==='admin'){
          lbl.innerHTML='';lbl.appendChild(el('span','spin-sm'));lbl.appendChild(document.createTextNode(' Sincronizare Supabase...'));
          try{await sbSaveData(fc.key,rows,ts);}catch(e){console.warn('Supabase sync:',e);}
        }
      }catch(err){console.error(err);}
      render();
    });
    ua.appendChild(lbl);card.appendChild(ua);cards.appendChild(card);
  });
  zoomArea.appendChild(cards);
  page.appendChild(zoomArea);
  return page;
}

function renderPList(container){
  container.innerHTML='';
  const q=(S.q||'').toLowerCase();
  const filtered=S.fps.filter(f=>!q||f.code.toLowerCase().includes(q)||f.name.toLowerCase().includes(q)).slice(0,300);
  for(const fp of filtered){
    const item=dv(`pitem${S.selFP===fp.code?' on':''}`);
    item.appendChild(dv('pitem-code',fp.code));
    if(fp.name||fp.drawing)item.appendChild(dv('pitem-name',fp.name||fp.drawing));
    item.addEventListener('click',()=>{
      S.selFP=fp.code;S.exp=new Set();S.expOps=new Set();
      // Close sidebar on mobile
      const sbar=document.querySelector('.sbar');
      const ov=document.getElementById('sbar-overlay');
      if(sbar)sbar.classList.remove('open');
      if(ov)ov.classList.remove('show');
      document.body.style.overflow='';
      render();
    });
    container.appendChild(item);
  }
  if(!filtered.length){const e=dv('');e.style.cssText='padding:14px;font-size:12px;color:var(--text3);text-align:center';e.textContent='Niciun produs gasit';container.appendChild(e);}
  const total=S.fps.filter(f=>!q||f.code.toLowerCase().includes(q)||f.name.toLowerCase().includes(q)).length;
  if(total>300){const m=dv('');m.style.cssText='padding:5px 13px;font-size:10px;color:var(--text4);font-family:var(--mono)';m.textContent=`Primele 300 din ${total} — rafinati cautarea`;container.appendChild(m);}
}

/* ── Column definitions (mutable order & widths live in S.stockFilter) ── */
const COL_DEFS={
  fp:  {label:'Final Product',  sortable:true,  numeric:false},
  code:{label:'Cod material',   sortable:true,  numeric:false},
  name:{label:'Denumire',       sortable:true,  numeric:false},
  type:{label:'Tip',            sortable:true,  numeric:false},
  oh:  {label:'On Hand',        sortable:true,  numeric:true},
  mo:  {label:'On MO',          sortable:true,  numeric:true},
  wip: {label:'Total WIP',      sortable:true,  numeric:true},
  wc:  {label:'WIP / Workcenter',sortable:false, numeric:false},
};

function getFilteredStock(){
  const f=S.stockFilter;
  const q=(f.q||'').toLowerCase();
  const cf=f.colFilters||{};
  return [...S.stockIdx.entries()].filter(([code,st])=>{
    if(q){
      const inFP=[...(st.fps||[])].some(fp=>fp.toLowerCase().includes(q));
      if(!code.toLowerCase().includes(q)&&!st.name.toLowerCase().includes(q)&&!inFP)return false;
    }
    if(f.type!=='all'&&st.type!==f.type)return false;
    if(f.onlyWip&&st.totalWIP<=0)return false;
    if(f.onlyZero&&st.onHand>0)return false;
    if(f.onlyNeg&&st.onHand>=0)return false;
    // Per-column filters
    if(cf.fp){const v=cf.fp.toLowerCase();if(![...(st.fps||[])].some(fp=>fp.toLowerCase().includes(v)))return false;}
    if(cf.code&&!code.toLowerCase().includes(cf.code.toLowerCase()))return false;
    if(cf.name&&!(st.name||'').toLowerCase().includes(cf.name.toLowerCase()))return false;
    if(cf.type&&!(st.type||'').toLowerCase().includes(cf.type.toLowerCase()))return false;
    if(cf.oh){const n=parseFloat(cf.oh);if(!isNaN(n)&&st.onHand!==n)return false;}
    if(cf.wip){const n=parseFloat(cf.wip);if(!isNaN(n)&&st.totalWIP!==n)return false;}
    if(cf.mo){const n=parseFloat(cf.mo);if(!isNaN(n)&&st.onMO!==n)return false;}
    if(cf.wc){const v=cf.wc.toLowerCase();const wcs=Object.keys(st.wipByWC||{}).map(wcLabel);if(!wcs.some(w=>w.toLowerCase().includes(v)))return false;}
    return true;
  }).sort((a,b)=>{
    const col=f.sortCol,dir=f.sortDir;
    if(col==='code')return dir*a[0].localeCompare(b[0]);
    if(col==='name')return dir*(a[1].name||'').localeCompare(b[1].name||'');
    if(col==='fp')return dir*([...(a[1].fps||[])].sort()[0]||'').localeCompare([...(b[1].fps||[])].sort()[0]||'');
    if(col==='oh')return dir*(a[1].onHand-b[1].onHand);
    if(col==='wip')return dir*(a[1].totalWIP-b[1].totalWIP);
    if(col==='mo')return dir*(a[1].onMO-b[1].onMO);
    return 0;
  });
}

function buildTable(wrap){
  wrap.innerHTML='';
  _buildStkFull(wrap);
}

function _rebuildStkBody(wrap){
  const tbl=wrap.querySelector('.stk-table');
  if(!tbl){buildTable(wrap);return;}
  const old=tbl.querySelector('tbody');
  const nb=_buildStkTbody();
  if(old)tbl.replaceChild(nb,old);else tbl.appendChild(nb);
  _updateStkNote(wrap);
}

function _buildStkTbody(){
  const f=S.stockFilter;
  const visCols=f.colOrder.filter(c=>f.visibleCols.has(c));
  const colWidths=f.colWidths;
  const rows=getFilteredStock().slice(0,1000);
  const tbody=el('tbody');
  for(const [code,st] of rows){
    const hasWip=st.totalWIP>0;
    const tr2=el('tr');
    visCols.forEach(colId=>{
      const td=el('td');
      td.setAttribute('data-col',colId);
      td.style.width=(colWidths[colId]||120)+'px';
      td.style.overflow='hidden';td.style.textOverflow='ellipsis';
      if(colId==='fp'){
        const fpArr=[...(st.fps||[])].sort();
        if(fpArr.length>0){
          const wrap2=dv('stk-wip-pills');wrap2.style.cssText='gap:3px;flex-wrap:wrap';
          fpArr.slice(0,3).forEach(fp=>wrap2.appendChild(sp('stk-fp-pill',fp)));
          if(fpArr.length>3){const m=sp('stk-fp-more',`+${fpArr.length-3}`);m.title=fpArr.slice(3).join(', ');wrap2.appendChild(m);}
          td.appendChild(wrap2);
        } else td.textContent='—';
      } else if(colId==='code'){
        td.appendChild(sp('stk-code',code));
      } else if(colId==='name'){
        const nm=sp('stk-name',st.name||'—');nm.title=st.name||'';td.appendChild(nm);
      } else if(colId==='type'){
        const cls=st.type==='M'?'stk-type-m':st.type==='P'?'stk-type-b':'stk-type-d';
        td.appendChild(sp(cls,st.type||'—'));
      } else if(colId==='oh'){
        const s2=sp(`stk-num${st.onHand>0?' pos':st.onHand<0?' neg':' zero'}`,fmtN(st.onHand));
        s2.style.cssText='display:block;text-align:right';td.appendChild(s2);
      } else if(colId==='mo'){
        const s2=sp(`stk-num${st.onMO>0?' pos':st.onMO<0?' neg':' zero'}`,fmtN(st.onMO));
        s2.style.cssText='display:block;text-align:right';td.appendChild(s2);
      } else if(colId==='wip'){
        const s2=sp(`stk-num${st.totalWIP>0?' pos':st.totalWIP<0?' neg':' zero'}`,fmtN(st.totalWIP));
        s2.style.cssText='display:block;text-align:right';
        if(st.totalWIP>0) s2.style.fontSize='125%';
        td.appendChild(s2);
      } else if(colId==='wc'){
        if(st.totalWIP>0&&Object.keys(st.wipByWC).length>0){
          const ps=dv('stk-wip-pills');
          for(const[wc,qty] of Object.entries(st.wipByWC))ps.appendChild(sp('stk-wip-pill',`${wcLabel(wc)}: ${fmtN(qty)}`));
          td.appendChild(ps);
        }
      }
      tr2.appendChild(td);
    });
    tbody.appendChild(tr2);
  }
  return tbody;
}

function _updateStkNote(wrap){
  const existing=wrap.querySelector('.stk-note');
  if(existing)existing.remove();
  if(getFilteredStock().length>1000){
    const note=dv('stk-note');note.style.cssText='padding:8px 16px;font-size:10px;font-family:var(--mono);color:var(--text3)';
    note.textContent=`Afisare primele 1000 din ${getFilteredStock().length.toLocaleString()} — rafinati cautarea.`;

function _buildStkFull(wrap){
  const f=S.stockFilter;
  const visCols=f.colOrder.filter(c=>f.visibleCols.has(c));
  const colWidths=f.colWidths;

  const tbl=el('table','stk-table');
  tbl.style.tableLayout='fixed';
  tbl.style.width='max-content';
  tbl.style.minWidth='100%';

  /* ── THEAD ── */
  const thead=el('thead');
  const tr=el('tr');
  let dragSrc=null;

  visCols.forEach((colId)=>{
    const def=COL_DEFS[colId];
    const w=colWidths[colId]||120;
    const isSorted=f.sortCol===colId;
    const th=el('th');
    th.style.width=w+'px';
    th.setAttribute('data-col',colId);

    const inner=dv('th-inner');
    const lbl=el('span','th-label');
    lbl.textContent=def.label+(isSorted?(f.sortDir===1?' ↑':' ↓'):'');
    if(isSorted)lbl.style.color='var(--accent)';
    inner.appendChild(lbl);

    /* resize handle */
    const rh=el('div','col-resize');
    rh.addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();
      const startX=e.clientX,startW=colWidths[colId]||w;
      const onMove=ev=>{
        const newW=Math.max(50,startW+(ev.clientX-startX));
        S.stockFilter.colWidths[colId]=newW;th.style.width=newW+'px';
        tbl.querySelectorAll(`td[data-col="${colId}"]`).forEach(td=>td.style.width=newW+'px');
      };
      const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);rh.classList.remove('dragging');};
      rh.classList.add('dragging');
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
    inner.appendChild(rh);
    th.appendChild(inner);

    if(def.sortable){
      th.addEventListener('click',e=>{
        if(e.target===rh||e.target.closest('.col-resize'))return;
        if(f.sortCol===colId)S.stockFilter.sortDir*=-1;
        else{S.stockFilter.sortCol=colId;S.stockFilter.sortDir=1;}
        buildTable(wrap);
        const c=document.getElementById('stk-count');
        if(c)c.textContent=`${getFilteredStock().length.toLocaleString()} materiale`;
      });
    }

    th.setAttribute('draggable','true');
    th.addEventListener('dragstart',e=>{dragSrc=colId;th.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',colId);});
    th.addEventListener('dragend',()=>th.classList.remove('dragging'));
    th.addEventListener('dragover',e=>{e.preventDefault();th.classList.add('drag-over');});
    th.addEventListener('dragleave',()=>th.classList.remove('drag-over'));
    th.addEventListener('drop',e=>{
      e.preventDefault();th.classList.remove('drag-over');
      if(!dragSrc||dragSrc===colId)return;
      const order=S.stockFilter.colOrder;
      const fromIdx=order.indexOf(dragSrc),toIdx=order.indexOf(colId);
      if(fromIdx<0||toIdx<0)return;
      order.splice(fromIdx,1);order.splice(toIdx,0,dragSrc);
      buildTable(wrap);
    });
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  /* ── Filter row ── */
  const fr=el('tr');fr.style.cssText='position:sticky;top:34px;z-index:3';
  visCols.forEach(colId=>{
    const th=el('th');th.style.cssText='background:#fff;border-bottom:1px solid var(--border);padding:3px 5px;';
    th.style.width=(colWidths[colId]||120)+'px';
    const inp=el('input','ob-col-filter');
    inp.placeholder='...';inp.value=f.colFilters[colId]||'';
    inp.setAttribute('data-stk-filter',colId);
    inp.addEventListener('input',e=>{
      const col=e.target.getAttribute('data-stk-filter');
      const ss=e.target.selectionStart,se=e.target.selectionEnd;
      S.stockFilter.colFilters[col]=e.target.value;
      _rebuildStkBody(wrap);
      const c=document.getElementById('stk-count');
      if(c)c.textContent=`${getFilteredStock().length.toLocaleString()} materiale`;
      const restored=wrap.querySelector(`input[data-stk-filter="${col}"]`);
      if(restored){restored.focus();try{restored.setSelectionRange(ss,se);}catch(_){}}
    });
    th.appendChild(inp);fr.appendChild(th);
  });
  thead.appendChild(fr);
  tbl.appendChild(thead);
  tbl.appendChild(_buildStkTbody());
  wrap.appendChild(tbl);
  _updateStkNote(wrap);
}

/* ═══════════════════════════════════════════════════════════════
   ORDER BOOK MODULE
═══════════════════════════════════════════════════════════════ */
const OB_COLS_ALL=['Entry dt','Confirm dt','Request dt','Request_week','Confirm_week','Item_no','Alias_no','Item_name','Customer_no','Customer_name','Sales price EUR','Ordered','Allocated','Delivered','Invoiced','Open qty','Valoare de livrat EUR','Net weight','_plan'];
const OB_NUMERIC=new Set(['Sales price EUR','Ordered','Allocated','Delivered','Invoiced','Open qty','Valoare de livrat EUR','Net weight']);
const OB_DATE=new Set(['Entry dt','Confirm dt','Request dt']);

/* ── ISO week key helpers ── */
function isoWeekKey(date){
  // Returns 'YYYY-WW' matching the data format
  const d=new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));  // Thursday of the week
  const yearStart=new Date(d.getFullYear(),0,1);
  const weekNo=Math.ceil((((d-yearStart)/86400000)+1)/7);
  return `${d.getFullYear()}-${String(weekNo).padStart(2,'0')}`;
}

function weeksInFilter(filter){
  // Returns Set of week keys included in the filter (plus '0Late')
  const now=new Date();
  const keys=new Set(['0Late']);
  if(filter==='all') return null; // null means no week filter
  const curKey=isoWeekKey(now);
  keys.add(curKey);
  if(filter==='next'||filter==='2weeks'||filter==='4weeks'){
    const n1=new Date(now);n1.setDate(n1.getDate()+7);keys.add(isoWeekKey(n1));
  }
  if(filter==='2weeks'||filter==='4weeks'){
    const n2=new Date(now);n2.setDate(n2.getDate()+14);keys.add(isoWeekKey(n2));
  }
  if(filter==='4weeks'){
    const n3=new Date(now);n3.setDate(n3.getDate()+21);keys.add(isoWeekKey(n3));
    const n4=new Date(now);n4.setDate(n4.getDate()+28);keys.add(isoWeekKey(n4));
  }
  return keys;
}

function getObRows(){
  const f=S.obFilter;
  const q=(f.q||'').toLowerCase();
  const allowedWeeks=weeksInFilter(f.weekFilter||'current');
  let rows=(S.obData||[]).filter(r=>{
    // Week filter on Confirm_week
    if(allowedWeeks){
      const wk=String(r['Confirm_week']||'').trim();
      if(!allowedWeeks.has(wk)) return false;
    }
    if(q){
      const match=OB_COLS_ALL.some(c=>{
        const v=r[c];return v!=null&&String(v).toLowerCase().includes(q);
      });
      if(!match)return false;
    }
    for(const[col,fval] of Object.entries(f.colFilters||{})){
      if(!fval)continue;
      const v=r[col];
      if(v==null||!String(v).toLowerCase().includes(fval.toLowerCase()))return false;
    }
    return true;
  });
  rows=[...rows].sort((a,b)=>{
    const col=f.sortCol,dir=f.sortDir;
    const av=a[col]??'',bv=b[col]??'';
    if(OB_NUMERIC.has(col)){
      return dir*(parseFloat(String(av).replace(',','.'))||0)-(dir*(parseFloat(String(bv).replace(',','.'))||0));
    }
    return dir*String(av).localeCompare(String(bv));
  });
  return rows;
}

function fmtObDate(v){
  if(!v)return'—';
  const d=new Date(v);if(isNaN(d))return String(v);
  return d.toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function obDateClass(v, col){
  if(!v) return 'ob-date';
  // Color logic applies only to Request dt
  if(col !== 'Request dt') return 'ob-date';
  const d=new Date(v); if(isNaN(d)) return 'ob-date';
  const today=new Date(); today.setHours(0,0,0,0);
  return d < today ? 'ob-date overdue' : 'ob-date ontime';
}

function _buildObTbody(){
  const f=S.obFilter;

  const tbody=el('tbody');

          const qi=el('input','ob-plan-qty');qi.type='number';qi.min='1';
          qi.max=String(ps.openQty-ps.allocated);qi.placeholder='Cant.';
          const btn=el('button','ob-plan-btn');btn.textContent='→ Plan';
          btn.addEventListener('click',()=>{
            const qty=parseInt(qi.value)||0;
            if(!qty){qi.focus();return;}
            const res=addToPlan(itemNo,qty,row);
            if(res?.warn) alert(res.msg);
            savePlan();
            updatePlanStatsBar();
            const obWrap=document.getElementById('ob-table-wrap');
            if(obWrap) rebuildObBody(obWrap);
            const planWrap=document.getElementById('plan-table-wrap');
            if(planWrap) renderPlanPage(planWrap);
            qi.value='';
          });
          wrap2.appendChild(qi);wrap2.appendChild(btn);
        }
        td.appendChild(wrap2);
      } else if(OB_DATE.has(col)){
        td.appendChild(sp(obDateClass(v,col),fmtObDate(v)));
      } else if(col==='Request_week'||col==='Confirm_week'){
        td.appendChild(sp('ob-week',v!=null?String(v):'—'));
      } else if(col==='Item_no'||col==='Alias_no'){
        td.appendChild(sp('ob-code',v!=null?String(v):'—'));

        td.appendChild(sp(`ob-num${n>0?' pos':' zero'}`,isNaN(n)?String(v||'—'):(col==='Sales price EUR'?n.toFixed(2):Number.isInteger(n)?n.toFixed(0):n.toFixed(2))));

function _buildObFull(wrap){
  const f=S.obFilter;
  const visCols=f.colOrder.filter(c=>f.visibleCols.has(c));
  if(!visCols.length){
    wrap.appendChild(dv('',dv('',sp('','Nicio coloana selectata'))));
    return;
  }
  const rows=getObRows().slice(0,5000);
  const tbl=el('table','ob-table');tbl.style.tableLayout='fixed';

  // ── THEAD ──
  const thead=el('thead');
  // Sort/drag header row
  const hr=el('tr');
  let dragSrc=null;
  visCols.forEach(col=>{
    const w=f.colWidths[col]||120;
    const th=el('th');th.style.width=w+'px';th.setAttribute('data-col',col);

    const inner=dv('ob-th-inner');
    const lbl=sp('ob-th-label',col);
    inner.appendChild(lbl);
    if(f.sortCol===col)inner.appendChild(sp('ob-th-sort',f.sortDir===1?'↑':'↓'));

    // Sort on click
    inner.addEventListener('click',e=>{
      if(e.target.classList.contains('ob-col-rh'))return;
      if(f.sortCol===col)f.sortDir*=-1;else{f.sortCol=col;f.sortDir=1;}
      buildObTable(wrap);
      const c=document.getElementById('ob-count');
      if(c)c.textContent=`${getObRows().length.toLocaleString()} / ${(S.obData||[]).length.toLocaleString()} comenzi`;
    });

    // Resize handle
    const rh=el('div','ob-col-rh');
    rh.addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();rh.classList.add('dragging');
      const startX=e.clientX,startW=f.colWidths[col]||w;
      const onMove=ev=>{
        const nw=Math.max(50,startW+(ev.clientX-startX));
        f.colWidths[col]=nw;th.style.width=nw+'px';
        tbl.querySelectorAll(`td[data-col="${col}"]`).forEach(td=>td.style.width=nw+'px');
      };
      const onUp=()=>{rh.classList.remove('dragging');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
    inner.appendChild(rh);
    th.appendChild(inner);

    // Drag-to-reorder
    th.setAttribute('draggable','true');
    th.addEventListener('dragstart',e=>{dragSrc=col;th.classList.add('ob-dragging');e.dataTransfer.effectAllowed='move';});
    th.addEventListener('dragend',()=>th.classList.remove('ob-dragging'));
    th.addEventListener('dragover',e=>{e.preventDefault();th.classList.add('ob-drag-over');});
    th.addEventListener('dragleave',()=>th.classList.remove('ob-drag-over'));
    th.addEventListener('drop',e=>{
      e.preventDefault();th.classList.remove('ob-drag-over');
      if(!dragSrc||dragSrc===col)return;
      const order=f.colOrder;
      const fi=order.indexOf(dragSrc),ti=order.indexOf(col);
      if(fi<0||ti<0)return;
      order.splice(fi,1);order.splice(ti,0,dragSrc);
      buildObTable(wrap);
    });
    hr.appendChild(th);
  });
  thead.appendChild(hr);

  // Per-column filter row
  const fr=el('tr','ob-filter-row');
  visCols.forEach(col=>{
    const th=el('th');
    const inp=el('input','ob-col-filter');
    inp.placeholder='Filtrare...';
    inp.value=f.colFilters[col]||'';
    inp.setAttribute('data-col-filter',col);
    inp.addEventListener('input',e=>{
      // Save active column and cursor position before rebuild
      const activeCol=e.target.getAttribute('data-col-filter');
      const selStart=e.target.selectionStart;
      const selEnd=e.target.selectionEnd;
      S.obFilter.colFilters[col]=e.target.value;
      // Rebuild only tbody — keep thead intact to preserve focus
      rebuildObBody(wrap);
      const c=document.getElementById('ob-count');
      if(c)c.textContent=`${getObRows().length.toLocaleString()} / ${(S.obData||[]).length.toLocaleString()} comenzi`;
      // Restore focus and cursor
      const restored=wrap.querySelector(`input[data-col-filter="${activeCol}"]`);
      if(restored){restored.focus();try{restored.setSelectionRange(selStart,selEnd);}catch(_){}}
    });
    th.appendChild(inp);fr.appendChild(th);
  });
  thead.appendChild(fr);
  tbl.appendChild(thead);
  tbl.appendChild(_buildObTbody());
  wrap.appendChild(tbl);
  if(getObRows().length>5000){
    const note=dv('');note.style.cssText='padding:6px 12px;font-size:10px;color:var(--text3)';
    note.textContent=`Afisare primele 5000 din ${getObRows().length.toLocaleString()} — rafinati filtrele.`;
    wrap.appendChild(note);
  }
}

/* ── Calcul necesar materii prime ── */
function calcNecesarMaterii(){
  if(!S.obData||!S.bomData) return null;

  // Step 1: Get OB quantities — 0Late + next 4 weeks summed per FP
  const allowedWeeks = weeksInFilter('4weeks'); // Set including '0Late' + 4 weeks
  const fpQty = new Map(); // fpCode -> total open qty
  for(const row of S.obData){
    const wk = String(row['Confirm_week']||'').trim();
    if(!allowedWeeks.has(wk)) continue;
    const fp = str(row['Item_no']);
    const qty = parseFloat(row['Open qty'])||0;
    if(fp && qty>0) fpQty.set(fp, (fpQty.get(fp)||0)+qty);
  }

  // Step 2: For each FP, walk BOM and collect BUY materials
  // matNo -> {needed, group, itemGroup, name, unit, fps: Map<fpCode, needed>}
  const matMap = new Map();

  function collectBuy(fpCtx, compNo, parentNeed, vis){
    if(vis.has(compNo)) return;
    const vNext = new Set(vis); vNext.add(compNo);
    const rows = S.bomIdx?.get(`${fpCtx}__${compNo}`) || [];
    for(const row of rows){
      const matNo = str(row['Material no']);
      const unQty = parseFloat(row['Material qty'])||1;
      const needed = parentNeed * unQty;
      const type = str(row['Material type']);
      if(type==='BUY'){
        // BUY = raw material leaf — collect it, do NOT recurse
        if(!matMap.has(matNo)){
          matMap.set(matNo,{
            matNo,
            name: str(row['Mat. name']||row['Mat desc']||''),
            group: str(row['Mat product group']||''),
            itemGroup: str(row['Mat. item group']||''),
            unit: str(row['Mat U/M']||''),
            needed: 0,
            fps: new Map(),
          });
        }
        const m = matMap.get(matNo);
        m.needed += needed;
        m.fps.set(fpCtx, (m.fps.get(fpCtx)||0)+needed);
      } else if(type==='MAKE'){
        // MAKE = sub-assembly — recurse to find its BUY children
        collectBuy(fpCtx, matNo, needed, vNext);
      }
    }
  }

  for(const [fp, qty] of fpQty){
    if(!S.bomIdx) continue;
    collectBuy(fp, fp, qty, new Set());
  }

  // Step 3: WIP counts as available (onHand + WIP = total available)
  // Exclude materials classified as M (MAKE) in Planning Overview — not raw materials
  const result = [];
  for(const [matNo, m] of matMap){
    const stock = S.stockIdx?.get(matNo)||{onHand:0,totalWIP:0,type:''};
    if(stock.type==='M') continue;  // MAKE item — skip from raw material report
    const onHand = Math.max(0, stock.onHand);
    const wip    = Math.max(0, stock.totalWIP);
    const avail  = onHand + wip;
    const netNeeded = Math.max(0, m.needed - avail);
    result.push({
      matNo,
      name: m.name,
      group: m.group,
      itemGroup: m.itemGroup,
      unit: m.unit,
      needed: m.needed,
      onHand,
      wip,
      netNeeded,
      fps: [...m.fps.entries()].sort((a,b)=>b[1]-a[1]),
    });
  }

  return result;
}

/* ── Report state ── */
if(!S.necReport) S.necReport={
  sortCol:'group', sortDir:1,
  colFilters:{},
  groupFilter:null,
  onlyNeeded:false,  // show only materials where netNeeded > 0
  showGroups:true,
  data:null,
};

function getNecRows(){
  const rs = S.necReport;
  if(!rs.data) return [];
  let rows = rs.data.filter(r=>{
    if(rs.onlyNeeded && r.netNeeded<=0) return false;
    if(rs.groupFilter && rs.groupFilter.size>0 && !rs.groupFilter.has(r.group)) return false;
    for(const[col,fval] of Object.entries(rs.colFilters||{})){
      if(!fval||col==='group') continue;
      const v = col==='matNo'?r.matNo:col==='name'?r.name:col==='unit'?r.unit
               :col==='fps'?r.fps.map(([fp])=>fp).join(' '):col==='obs'?(S.reportObs[r.matNo]||'')
               :String(r[col]||'');
      if(!v.toLowerCase().includes(fval.toLowerCase())) return false;
    }
    return true;
  });
  rows = [...rows].sort((a,b)=>{
    const dir=rs.sortDir;
    if(rs.sortCol==='group') return dir*a.group.localeCompare(b.group)||a.matNo.localeCompare(b.matNo);
    if(rs.sortCol==='needed') return dir*(b.needed-a.needed);
    if(rs.sortCol==='netNeeded') return dir*(b.netNeeded-a.netNeeded);
    if(rs.sortCol==='onHand') return dir*(b.onHand-a.onHand);
    return dir*String(a[rs.sortCol]||'').localeCompare(String(b[rs.sortCol]||''));
  });
  return rows;
}

function fmtN2(n){return Number.isInteger(n)?n.toLocaleString('ro-RO'):n.toLocaleString('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ── Export Excel ── */
function exportNecExcel(){
  const rows = getNecRows();
  if(!rows.length){alert('Nu exista date de exportat.');return;}
  const ws_data=[['Tip material','Cod material','Denumire','U/M','Necesar total','On Hand','WIP','Necesar net (dupa stoc)','Consumat in produse finale','Observatii']];
  for(const r of rows){
    ws_data.push([
      r.group, r.matNo, r.name, r.unit,
      r.needed, r.onHand, r.wip, r.netNeeded,
      r.fps.map(([fp,q])=>`${fp}: ${Math.round(q)}`).join('; '),
      S.reportObs[r.matNo]||'',
    ]);
  }
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  // Column widths
  ws['!cols']=[{wch:28},{wch:20},{wch:30},{wch:6},{wch:14},{wch:12},{wch:12},{wch:16},{wch:50},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Necesar materii prime');
  XLSX.writeFile(wb,`Necesar_materii_prime_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function buildNecTbody(cols, NUM){
  const rs=S.necReport;
  const rows=getNecRows();
  const tbody=el('tbody');
  let lastGroup='';

  for(const r of rows){
    // Group separator row
    if(rs.sortCol==='group'&&r.group!==lastGroup){
      lastGroup=r.group;
      const gtr=el('tr','nec-group-row');
      const gtd=el('td');gtd.colSpan=cols.length;gtd.textContent=(r.group||'(neclasificat)').toUpperCase();
      gtr.appendChild(gtd);tbody.appendChild(gtr);
    }
    const tr=el('tr');
    cols.forEach(c=>{
      const td=el('td');
      if(c.key==='group') td.textContent=r.group||'';
      else if(c.key==='matNo'){td.appendChild(sp('nec-mat-code',r.matNo));}
      else if(c.key==='name') td.textContent=r.name||'';
      else if(c.key==='unit') td.textContent=r.unit||'';
      else if(NUM.has(c.key)){
        const n=r[c.key]||0;
        const cls=c.key==='netNeeded'?(n>0?'nec-num need':'nec-num ok'):'nec-num';
        td.appendChild(sp(cls,fmtN2(n)));
      }
      else if(c.key==='fps'){
        const d=dv('nec-fps');
        const top5=r.fps.slice(0,5);
        top5.forEach(([fp,q])=>{
          const line=dv('');line.textContent=`${fp}: ${Math.round(q)}`;d.appendChild(line);
        });
        if(r.fps.length>5){const m=dv('');m.style.color='var(--text4)';m.textContent=`+${r.fps.length-5} altele`;d.appendChild(m);}
        td.appendChild(d);
      }
      else if(c.key==='obs'){
        const ta=el('textarea','nec-obs');
        ta.value=S.reportObs[r.matNo]||'';
        ta.rows=1;
        ta.addEventListener('input',e=>{S.reportObs[r.matNo]=e.target.value;ta.rows=Math.max(1,e.target.value.split('\n').length);});
        td.appendChild(ta);
      }
      tr.appendChild(td);
    });

  if(!rows.length){
    const tr=el('tr');const td=el('td');td.colSpan=cols.length;td.style.cssText='text-align:center;padding:20px;color:var(--text3);font-size:12px';
    td.textContent='Niciun material gasit cu filtrele curente.';tr.appendChild(td);tbody.appendChild(tr);
  }
  return tbody;
}

function rebuildNecBody(wrap){

/* Get total planned qty for a given itemNo */
/* Returns how much of a specific OB row (by _obKey) is already planned */
function planQtyForRow(obKey){
  let total=0;
  for(const [,plan] of S.planData){
    for(const e of plan.entries){if(e._obKey===obKey)total+=e.qty;}
  }
  return total;
}

function planQty(itemNo){
  return S.planData.get(itemNo)?.totalQty||0;
}

/* Get OB rows for itemNo sorted oldest-first by Confirm dt */
function getObRowsSorted(itemNo){
  return (S.obData||[])
    .filter(r=>str(r['Item_no'])===itemNo)
    .map(r=>({...r,_dtSort:new Date(r['Confirm dt']||'9999'),_obKey:str(r['CO_no'])+'_'+str(r['CO_line'])}))
    .sort((a,b)=>a._dtSort-b._dtSort);
}

/* Per-OB-row plan status: {allocated, openQty, status:'full'|'partial'|'none'} */
function rowPlanStatus(row){
  const obKey=str(row['CO_no'])+'_'+str(row['CO_line']);
  const openQty=parseFloat(row['Open qty'])||0;
  const allocated=planQtyForRow(obKey);
  const status=allocated>=openQty?'full':allocated>0?'partial':'none';
  return{allocated,openQty,obKey,status};
}

/* Add qty to plan — allows adding to partially or unplanned rows */
function addToPlan(itemNo, qty, fromObRow){
  if(!qty||qty<=0) return{warn:false};

  const obRows=getObRowsSorted(itemNo);

  if(!S.planData.has(itemNo)) S.planData.set(itemNo,{totalQty:0,entries:[]});
  const plan=S.planData.get(itemNo);

  // ── No OB rows: manual entry (product not in Order Book) ──
  if(obRows.length===0 && !fromObRow){
    plan.entries.push({
      _obKey:null,
      confirmDt:null,requestDt:null,
      itemNo,itemName:'',customer:'',salesPrice:0,
      qty,
    });
    plan.totalQty+=qty;
    return{warn:false};
  }

  // Check availability from OB rows
  const totalAvail=obRows.reduce((s,r)=>{
    const allocated=planQtyForRow(r._obKey);
    return s+Math.max(0,(parseFloat(r['Open qty'])||0)-allocated);
  },0);

  if(totalAvail<=0){
    return{warn:true,msg:`Toate liniile de comanda pentru ${itemNo} sunt deja planificate integral.`};
  }

  const startKey=fromObRow?fromObRow._obKey:null;
  let started=!startKey;
  let remaining=qty;

  for(const row of obRows){
    if(!started){if(row._obKey===startKey)started=true;else continue;}
    if(remaining<=0) break;
    const openQty=parseFloat(row['Open qty'])||0;
    const allocated=planQtyForRow(row._obKey);
    const available=Math.max(0,openQty-allocated);
    if(available<=0) continue;
    const take=Math.min(available,remaining);
    plan.entries.push({
      _obKey:row._obKey,
      confirmDt:row['Confirm dt'],
      requestDt:row['Request dt'],
      itemNo,
      itemName:str(row['Item_name']),
      customer:str(row['Customer_name']),
      salesPrice:parseFloat(String(row['Sales price EUR']||'0').replace(',','.'))||0,
      qty:take,
    });
    remaining-=take;
    plan.totalQty+=take;
  }
  // If some quantity couldn't be allocated from OB, add remainder as manual
  if(remaining>0&&!fromObRow){
    plan.entries.push({
      _obKey:null,confirmDt:null,requestDt:null,
      itemNo,itemName:'',customer:'',salesPrice:0,qty:remaining,
    });
    plan.totalQty+=remaining;
    return{warn:false};
  }
  if(remaining>0&&qty>remaining){
    return{warn:true,msg:`Planificat ${qty-remaining} buc din ${qty} cerute (disponibil limitat).`};
  }
  return{warn:false};
}

function removePlanEntry(itemNo, idx){
  const plan=S.planData.get(itemNo);
  if(!plan) return;
  plan.totalQty-=plan.entries[idx].qty;
  plan.entries.splice(idx,1);
  if(plan.totalQty<=0) S.planData.delete(itemNo);
}

/* Import plan from Excel: Item number + quantity column */
async function importPlan(file){
  const buf=await readFileAsBuffer(file);
  const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
  // Detect columns — first column = itemNo, second = qty (any name)
  const keys=rows.length?Object.keys(rows[0]):[];
  if(keys.length<2){alert('Format invalid: trebuie cel putin 2 coloane (Item number, Cantitate).');return;}
  const itemKey=keys[0], qtyKey=keys[1];
  S.planData=new Map();
  for(const row of rows){
    const itemNo=str(row[itemKey]);
    const qty=parseFloat(row[qtyKey])||0;
    if(itemNo&&qty>0) addToPlan(itemNo,qty);
  }
  savePlan();
  render();
}

/* Export plan to Excel */
function exportPlan(){
  const rows=[];
  for(const [itemNo, plan] of S.planData){
    const first=plan.entries[0]||{};
    const customers=[...new Set(plan.entries.map(e=>e.customer).filter(Boolean))].join(', ');
    const price=getSalesPrice(itemNo,first);
    rows.push({
      'Item no': itemNo,
      'Item name': first.itemName||'',
      'Customer': customers,
      'Cantitate planificata': plan.totalQty,
      'Sales price EUR': price,
      'Valoare EUR': +(price*plan.totalQty).toFixed(2),
      'Observatii': S.planObs[itemNo]||'',
    });
  }
  if(!rows.length){alert('Planul este gol.');return;}
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:30},{wch:40},{wch:20},{wch:14},{wch:14},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Plan productie');
  XLSX.writeFile(wb,`Plan_productie_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function updatePlanStatsBar(){
  const bar=document.getElementById('plan-stats-bar');if(!bar)return;
  bar.innerHTML='';
  let totalItems=0,totalQty=0,totalVal=0;
  for(const [itemNo,plan] of S.planData){
    totalItems++;totalQty+=plan.totalQty;
    totalVal+=getSalesPrice(itemNo,plan.entries[0])*plan.totalQty;
  }
  const eff=S.eficientaPlan/100;
  // Calc total exec time across all planned items (with efficiency)
  let totalExecMin=0;
  if(S.bowIdx&&S.bomIdx){
    for(const [itemNo,plan] of S.planData){
      const et=calcTotalExecTime(itemNo,plan.totalQty);
      totalExecMin+=(et.total/eff);
    }
  }
  const addStat=(label,value,cls='')=>{
    const cell=dv('plan-stat-cell');
    cell.appendChild(sp('plan-stat-label',label));
    cell.appendChild(sp(`plan-stat-value${cls?' '+cls:''}`,value));
    bar.appendChild(cell);
  };
  addStat('Produse planificate',totalItems.toLocaleString('ro-RO'));
  addStat('Cantitate totala',totalQty.toLocaleString('ro-RO')+' buc');
  addStat('Valoare totala',totalVal.toLocaleString('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2})+' EUR','eur');
  if(S.bowIdx&&S.bomIdx&&totalExecMin>0){
    addStat('Timp executie total (cu eficienta)',fmtMin(totalExecMin));
  }
}

/* Get salesPrice for an itemNo — from plan entry or fallback to live OB data */
function getSalesPrice(itemNo, entry){
  if(entry?.salesPrice) return entry.salesPrice;
  const obRow=(S.obData||[]).find(r=>str(r['Item_no'])===itemNo);
  if(!obRow) return 0;
  const n=parseFloat(String(obRow['Sales price EUR']||'0').replace(',','.'));
  return isNaN(n)?0:n;
}

function calcPlanPct(itemNo, planQ){
  if(!S.bowIdx||!S.bomIdx||!planQ) return 0;
  const needs = S.stockIdx ? calcNeeds(itemNo, planQ) : null;
  const execTime = calcExecTime(itemNo, planQ, needs);
  const totalExecTime = calcTotalExecTime(itemNo, planQ);
  if(!totalExecTime||totalExecTime.total<=0) return 0;
  const raw = (1 - execTime.total/totalExecTime.total)*100;
  const pct = Math.min(100, Math.max(0, raw));
  // If time remaining=0 but FP not fully finished (On Hand < planQty) → 99.99%
  if(pct>=100){
    const oh=Math.max(0,S.stockIdx?.get(itemNo)?.onHand||0);
    if(oh < planQ) return 99.99;
  }
  return Math.round(pct*100)/100;  // 2 decimal precision
}

function getPlanRows(){
  const pf=S.planFilter.colFilters;
  const rpf=S.planFilter.realizarePct||'all';
  return [...S.planData.entries()]
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .filter(([itemNo,plan])=>{
      const first=plan.entries[0]||{};
      const customer=[...new Set(plan.entries.map(e=>e.customer).filter(Boolean))].join(', ');
      const price=getSalesPrice(itemNo,first);
      const valoare=price*plan.totalQty;
      // Text filters — partial match (case insensitive)
      if(pf.prio&&!(S.planPrio[itemNo]||'').toLowerCase().includes(pf.prio.toLowerCase()))return false;
      if(pf.itemNo&&!itemNo.toLowerCase().includes(pf.itemNo.toLowerCase()))return false;
      if(pf.itemName&&!(first.itemName||'').toLowerCase().includes(pf.itemName.toLowerCase()))return false;
      if(pf.customer&&!customer.toLowerCase().includes(pf.customer.toLowerCase()))return false;
      if(pf.obs&&!(S.planObs[itemNo]||'').toLowerCase().includes(pf.obs.toLowerCase()))return false;
      // Numeric filters — contains/starts-with match on formatted value
      if(pf.qty&&!plan.totalQty.toString().includes(pf.qty.replace(',','.')))return false;
      if(pf.valoare&&!valoare.toFixed(2).includes(pf.valoare.replace(',','.')))return false;
      // % Realizare filter
      if(rpf!=='all'){
        const pct=calcPlanPct(itemNo,plan.totalQty);
        if(rpf==='0-25'&&(pct<0||pct>25))return false;
        if(rpf==='26-50'&&(pct<26||pct>50))return false;
        if(rpf==='51-75'&&(pct<51||pct>75))return false;
        if(rpf==='76-99'&&(pct<76||pct>99))return false;
        if(rpf==='100'&&pct!==100)return false;
      }
      return true;
    });
}

function _rebuildPlanBody(wrap){
  const tbl=wrap.querySelector('.plan-table');if(!tbl)return;
  const oldTbody=tbl.querySelector('tbody');
  const nb=_buildPlanTbody(wrap);
  if(oldTbody)tbl.replaceChild(nb,oldTbody);else tbl.appendChild(nb);
  _updatePlanSummary(wrap);
}

function _updatePlanSummary(wrap){
  const rows=getPlanRows();
  const totalQty=rows.reduce((s,[,p])=>s+p.totalQty,0);
  const totalVal=rows.reduce((s,[itemNo,p])=>{
    return s+getSalesPrice(itemNo,p.entries[0])*p.totalQty;
  },0);
  const sumEl=wrap.querySelector('.plan-summary');
  if(sumEl) sumEl.textContent=`${rows.length} produse · ${totalQty.toLocaleString('ro-RO')} buc · ${totalVal.toLocaleString('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2})} EUR`;
}

    const valoare=price*plan.totalQty;
    const tr=el('tr');

      const td=el('td');td.style.width=(pf2.colWidths[colId]||120)+'px';td.style.overflow='hidden';td.style.boxSizing='border-box';
      if(colId==='prio'){
        const pi=el('input','plan-prio');pi.type='text';pi.maxLength=3;
        pi.placeholder='—';pi.value=S.planPrio[itemNo]||'';
        pi.title='Prioritate (ex: 1, 2, A, ...)';
        pi.addEventListener('click',e=>e.stopPropagation());
        pi.addEventListener('mousedown',e=>e.stopPropagation());
        pi.addEventListener('input',e=>{
          S.planPrio[itemNo]=e.target.value.trim();
          savePlan();
        });
        td.appendChild(pi);
      }
      else if(colId==='itemNo'){td.appendChild(sp('stk-code',itemNo));}
      else if(colId==='itemName'){td.textContent=first.itemName||'—';}
      else if(colId==='customer'){td.textContent=customer||'—';}
      else if(colId==='qty'){const s=sp('plan-num',plan.totalQty.toLocaleString('ro-RO')+' buc');s.style.cssText='font-weight:700;color:#15803d;display:block;text-align:right';td.appendChild(s);}
      else if(colId==='valoare'){td.appendChild(sp('plan-valoare',valoare.toLocaleString('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2})+' EUR'));}
      else if(colId==='realizare'){
        const eff=S.eficientaPlan/100;
        const pct=calcPlanPct(itemNo,plan.totalQty);
        const pctColor=pct>=100?'#15803d':pct>=50?'#ca8a04':pct>0?'#ea580c':'#dc2626';
        const pctDisplay=pct===100?'100%':pct.toFixed(2)+'%';
        let execRemMin=0;
        if(S.bowIdx&&S.bomIdx){
          const needs=S.stockIdx?calcNeeds(itemNo,plan.totalQty):null;

          execRemMin=execRaw.total/eff;

        td.style.cursor='pointer';
        td.title='Click pentru detaliu operatii';
        td.addEventListener('click',()=>showPlanDetail(itemNo,plan));
        const cell2=dv('plan-real-cell');
        const pctEl=sp('plan-real-pct',pctDisplay);pctEl.style.color=pctColor;
        cell2.appendChild(pctEl);
        const stockR=S.stockIdx?.get(itemNo)||{onHand:0,totalWIP:0};
        const avail=Math.min(Math.max(0,stockR.onHand)+Math.max(0,stockR.totalWIP),plan.totalQty);
        cell2.appendChild(sp('plan-real-sub',`stoc: ${Math.round(avail)} / ${plan.totalQty} buc`));
        if(execRemMin>0){const rem=sp('plan-real-sub',`ramas: ${fmtMin(execRemMin)}`);rem.style.color='#7c3aed';rem.style.fontWeight='600';cell2.appendChild(rem);}

function renderPlanPage(wrap){
  wrap.innerHTML='';
  if(!S.planData.size){
    const empty=dv('');empty.style.cssText='padding:40px;text-align:center;color:var(--text3);font-size:13px';
    empty.innerHTML='<div style="font-size:32px;margin-bottom:12px">📋</div>Planul este gol.<br>Importa un fisier Excel sau adauga linii din <b>Order Book</b>.';

  const pf2=S.planFilter;

  const COL_LABELS={prio:'Prio',itemNo:'Item no',itemName:'Denumire',customer:'Client',qty:'Cantitate',valoare:'Valoare EUR',realizare:'% Realizare',obs:'Observatii',_del:''};

  // Summary bar
  const sum=dv('plan-summary');sum.className='plan-summary';
  sum.style.cssText='padding:6px 14px;background:#f0fdf4;border-bottom:1px solid #86efac;font-size:11px;color:#15803d;font-weight:600;flex-shrink:0';

  const tbl=el('table','plan-table');tbl.style.cssText='width:max-content;min-width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed';

  // THEAD — sort/drag header row
  const thead=el('thead');
  const hr=el('tr');
  let dragSrc=null;
  visCols.forEach(colId=>{
    const w=pf2.colWidths[colId]||120;
    const th=el('th');th.style.width=w+'px';th.setAttribute('data-col',colId);
    const inner=dv('plan-th-inner');
    inner.appendChild(sp('plan-th-lbl',COL_LABELS[colId]||colId));
    // Resize handle
    const rh=el('div','plan-col-rh');
    rh.addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();rh.classList.add('dragging');
      const startX=e.clientX,startW=pf2.colWidths[colId]||w;
      const onMove=ev=>{const nw=Math.max(50,startW+(ev.clientX-startX));pf2.colWidths[colId]=nw;th.style.width=nw+'px';tbl.querySelectorAll(`td:nth-child(${visCols.indexOf(colId)+1})`).forEach(td=>td.style.width=nw+'px');};
      const onUp=()=>{rh.classList.remove('dragging');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
    inner.appendChild(rh);
    th.appendChild(inner);
    // Drag reorder
    if(colId!=='_del'){
      th.setAttribute('draggable','true');
      th.addEventListener('dragstart',e=>{dragSrc=colId;th.classList.add('plan-dragging');e.dataTransfer.effectAllowed='move';});
      th.addEventListener('dragend',()=>th.classList.remove('plan-dragging'));
      th.addEventListener('dragover',e=>{e.preventDefault();th.classList.add('plan-drag-over');});
      th.addEventListener('dragleave',()=>th.classList.remove('plan-drag-over'));
      th.addEventListener('drop',e=>{
        e.preventDefault();th.classList.remove('plan-drag-over');
        if(!dragSrc||dragSrc===colId)return;
        const o=pf2.colOrder;const fi=o.indexOf(dragSrc),ti=o.indexOf(colId);
        if(fi<0||ti<0)return;o.splice(fi,1);o.splice(ti,0,dragSrc);
        renderPlanPage(wrap);
      });
    }
    hr.appendChild(th);
  });
  thead.appendChild(hr);

  // THEAD — filter row
  const fr=el('tr','plan-filter-row');
  visCols.forEach(colId=>{
    const th=el('th');th.style.width=(pf2.colWidths[colId]||120)+'px';
    if(FILTERABLE.has(colId)){
      const inp=el('input','plan-col-filter');
      inp.placeholder='...';inp.value=pf2.colFilters[colId]||'';
      inp.setAttribute('data-plan-filter',colId);
      inp.addEventListener('input',e=>{
        const col=e.target.getAttribute('data-plan-filter');
        const ss=e.target.selectionStart,se=e.target.selectionEnd;
        pf2.colFilters[col]=e.target.value;
        _rebuildPlanBody(wrap);
        const restored=wrap.querySelector(`input[data-plan-filter="${col}"]`);
        if(restored){restored.focus();try{restored.setSelectionRange(ss,se);}catch(_){}}
      });
      th.appendChild(inp);
    } else if(colId==='realizare'){
      const pctWrap=dv('plan-pct-filters');
      const opts=[['all','Toate'],['0-25','0-25%'],['26-50','26-50%'],['51-75','51-75%'],['76-99','76-99%'],['100','100%']];
      opts.forEach(([val,lbl])=>{
        const btn=el('button',`plan-pct-btn${(pf2.realizarePct||'all')===val?' active':''}`);
        btn.textContent=lbl;
        btn.addEventListener('click',()=>{
          pf2.realizarePct=val;
          pctWrap.querySelectorAll('.plan-pct-btn').forEach((b,i)=>{b.className=`plan-pct-btn${opts[i][0]===val?' active':''}`;});
          _rebuildPlanBody(wrap);_updatePlanSummary(wrap);
        });
        pctWrap.appendChild(btn);
      });
      th.appendChild(pctWrap);
    }
    fr.appendChild(th);
  });
  thead.appendChild(fr);
  tbl.appendChild(thead);
  tbl.appendChild(_buildPlanTbody(wrap));
  scrollWrap.appendChild(tbl);
  wrap.appendChild(scrollWrap);
  _updatePlanSummary(wrap);
}

/* ═══════════════════════════════════════════════════════════════
   WC LOADING REPORT
   Aggregates exec time per workcenter for all planned products,
   applies plan efficiency, compares to user-defined available hours/week.
═══════════════════════════════════════════════════════════════ */
function calcWcLoading(){
  if(!S.planData.size||!S.bowIdx||!S.bomIdx) return new Map();
  const eff=(S.eficientaPlan||100)/100;
  const byWC=new Map(); // wcName -> {runMin,setupMin,totalMin, runMinTotal,setupMinTotal,totalMinFull, products}

  for(const [itemNo,plan] of S.planData){
    const qty=plan.totalQty;
    const needs=S.stockIdx?calcNeeds(itemNo,qty):null;
    // WIP-aware (with stock)
    const exec=calcExecTime(itemNo,qty,needs);
    // Total (no stock deduction)
    const execTotal=calcTotalExecTime(itemNo,qty);

    for(const [wc,t] of exec.byWC){
      const wipMin=(t.runMin+t.setupMin)/eff;
      const totRaw=execTotal.byWC.get(wc)||{runMin:0,setupMin:0};
      const totMin=(totRaw.runMin+totRaw.setupMin)/eff;
      if(!byWC.has(wc)) byWC.set(wc,{runMin:0,setupMin:0,totalMin:0,runMinFull:0,setupMinFull:0,totalMinFull:0,products:[]});
      const e=byWC.get(wc);
      e.runMin+=t.runMin/eff;
      e.setupMin+=t.setupMin/eff;
      e.totalMin+=wipMin;
      e.runMinFull+=totRaw.runMin/eff;
      e.setupMinFull+=totRaw.setupMin/eff;
      e.totalMinFull+=totMin;
      e.products.push({itemNo,qty,min:wipMin,minFull:totMin});
    }
    // Also include WCs that appear in total but not in WIP-aware
    for(const [wc,t] of execTotal.byWC){
      if(!exec.byWC.has(wc)){
        const totMin=(t.runMin+t.setupMin)/eff;
        if(!byWC.has(wc)) byWC.set(wc,{runMin:0,setupMin:0,totalMin:0,runMinFull:0,setupMinFull:0,totalMinFull:0,products:[]});
        const e=byWC.get(wc);
        e.runMinFull+=t.runMin/eff;
        e.setupMinFull+=t.setupMin/eff;
        e.totalMinFull+=totMin;
        e.products.push({itemNo,qty,min:0,minFull:totMin});
      }
    }
  }
  return new Map([...byWC.entries()].sort((a,b)=>b[1].totalMin-a[1].totalMin));
}

    container.appendChild(mkEmpty('Incarcare Workcentere','Incarcati fisierele BOM si BOW.'));
    return;
  }

  const wcData=calcWcLoading();
  const eff=(S.eficientaPlan||100)/100;

  // Toolbar

  tb.appendChild(sp('',`Plan: ${S.planData.size} produse · Eficienta: ${S.eficientaPlan}%`));

  // Time mode selector

  const tw=dv('wc-load-table-wrap');

  const thead=el('thead');const hr=el('tr');
  ['Workcenter','Tip','Prod Team',
    useWip?'Necesar WIP (h)':'Necesar Total (h)',
    'Run (h)','Setup (h)','Total fara stoc (h)',
    'Disponibil (h/sapt.)','Grad incarcare','Top produse'].forEach(h=>{
    const th=el('th');th.textContent=h;hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);

  const tbody=el('tbody');
  let debounceT=null;

  for(const [wc,d] of wcData){
    const needH=(useWip?d.totalMin:d.totalMinFull)/60;
    const runH=(useWip?d.runMin:d.runMinFull)/60;
    const setupH=(useWip?d.setupMin:d.setupMinFull)/60;
    const totalFullH=d.totalMinFull/60;
    const wcMeta=S.wcSetupIdx?.[wc]||null;
    const prodTeam=wcMeta?.prodTeam||0;
    const wcType=wcMeta?.wcType||'';
    const autoAvailH=prodTeam>0?8*5*prodTeam:0;
    if(prodTeam>0&&!S.wcAvailHours[wc])S.wcAvailHours[wc]=autoAvailH;
    const availH=parseFloat(S.wcAvailHours[wc])||autoAvailH;
    const pct=availH>0?Math.round((needH/availH)*100):null;
    const cls=pct===null?'':pct<=80?'ok':pct<=100?'warn':'over';

    const tr=el('tr');
    const tdName=el('td');tdName.appendChild(sp('',wc));tr.appendChild(tdName);
    const tdType=el('td');tdType.style.cssText='font-size:10px;color:var(--text3)';tdType.textContent=wcType.replace(/^\d+ /,'');tr.appendChild(tdType);
    const tdPT=el('td');tdPT.style.cssText='text-align:center;font-family:Arial,monospace;font-weight:700';tdPT.textContent=prodTeam||'—';tr.appendChild(tdPT);
    const tdNeed=el('td');tdNeed.appendChild(sp('wc-num',needH.toFixed(1)+'h'));tr.appendChild(tdNeed);
    const tdRun=el('td');tdRun.appendChild(sp('wc-num',runH.toFixed(1)+'h'));tr.appendChild(tdRun);
    const tdSetup=el('td');tdSetup.appendChild(sp('wc-num',setupH.toFixed(1)+'h'));tr.appendChild(tdSetup);
    // Total fara stoc column
    const tdFull=el('td');
    const fullSpan=sp('wc-num',totalFullH.toFixed(1)+'h');
    if(useWip&&d.totalMinFull>d.totalMin)fullSpan.style.cssText='color:var(--text3);font-size:10px';
    tdFull.appendChild(fullSpan);tr.appendChild(tdFull);

    // Disponibil input
    const tdAvail=el('td');
    const inp=el('input','wc-avail-inp');
    inp.type='number';inp.min='0';inp.step='0.5';
    inp.value=S.wcAvailHours[wc]||autoAvailH||'';
    inp.placeholder='ore/săpt.';
    if(autoAvailH>0&&!S.wcAvailHours[wc])inp.style.cssText='color:#6b7280;font-style:italic';

    inp.addEventListener('input',e=>{

      const pctLbl=sp(`wc-pct-lbl ${cls}`,pct+'%');
      wrap2.appendChild(pctLbl);
      if(pct>100){
        const over=sp('',`(+${(needH-availH).toFixed(1)}h surplus)`);
        over.style.cssText='font-size:10px;color:#dc2626;font-style:italic';
        wrap2.appendChild(over);
      }
    } else {
      wrap2.appendChild(sp('',`—`));
      const hint=sp('','(introdu ore disponibile)');hint.style.cssText='font-size:10px;color:var(--text4);font-style:italic;margin-left:4px';
      wrap2.appendChild(hint);

    tdProd.appendChild(fps);tr.appendChild(tdProd);

    tbody.appendChild(tr);
  }

  if(!wcData.size){
    const tr=el('tr');const td=el('td');td.colSpan=7;
    td.style.cssText='text-align:center;padding:20px;color:var(--text3)';
    td.textContent='Nu s-au gasit operatii BOW pentru produsele planificate.';
    tr.appendChild(td);tbody.appendChild(tr);
  }

  tbl.appendChild(tbody);tw.appendChild(tbl);container.appendChild(tw);
}

function exportWcLoad(wcData,useWip){
  const rows=[];
  for(const [wc,d] of wcData){
    const needH=(useWip?d.totalMin:d.totalMinFull)/60;
    const runH=(useWip?d.runMin:d.runMinFull)/60;
    const setupH=(useWip?d.setupMin:d.setupMinFull)/60;
    const availH=parseFloat(S.wcAvailHours[wc])||0;
    const pct=availH>0?Math.round((needH/availH)*100):null;
    rows.push({
      'Workcenter':wc,
      [useWip?'Necesar cu stoc WIP (h)':'Necesar total (h)']:+needH.toFixed(2),
      'Total fara stoc (h)':+(d.totalMinFull/60).toFixed(2),
      'Run (h)':+runH.toFixed(2),
      'Setup (h)':+setupH.toFixed(2),
      'Disponibil (h/sapt)':availH||'',
      'Grad incarcare (%)':pct!==null?pct:'',
    });
  }
  if(!rows.length){alert('Nu exista date de exportat.');return;}
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:22},{wch:20},{wch:12},{wch:12},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Incarcare WC');
  XLSX.writeFile(wb,`Incarcare_WC_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ═══════════════════════════════════════════════════════════════
   SCANNER MODULE — Barcode / QR scanning via camera
   Uses native BarcodeDetector API (Chrome/Android) with
   ZXing library as fallback for iOS Safari
═══════════════════════════════════════════════════════════════ */
let _scannerActive=false;
let _scannerStream=null;
let _scannerReader=null;
let _scanHistory=[];  // [{code, name, ts}]

function stopScanner(){
  _scannerActive=false;
  if(_scannerReader){try{_scannerReader.reset();}catch(_){}_scannerReader=null;}
  if(_scannerStream){_scannerStream.getTracks().forEach(t=>t.stop());_scannerStream=null;}
}

function lookupCode(code){
  code=code.trim().toUpperCase();
  if(!code) return null;
  // Search in stockIdx (material codes)
  if(S.stockIdx?.has(code)){
    const st=S.stockIdx.get(code);
    return{type:'material',code,name:st.name||'—',stock:st,fps:[...(st.fps||[])]};
  }
  // Search as FP code
  const fp=S.fps?.find(f=>f.code===code||f.code.toUpperCase()===code);
  if(fp){
    const st=S.stockIdx?.get(code)||{onHand:0,onMO:0,totalWIP:0,wipByWC:{}};
    return{type:'fp',code:fp.code,name:fp.drawing||fp.name||'—',stock:st,fps:[fp.code]};
  }
  // Fuzzy: partial match
  if(S.stockIdx){
    for(const[k,v] of S.stockIdx){
      if(k.includes(code)||code.includes(k)){
        return{type:'material',code:k,name:v.name||'—',stock:v,fps:[...(v.fps||[])]};
      }
    }
  }
  return null;
}

function addScanHistory(code,name){
  // Only save found products (not 'Negasit')
  if(!name||name==='Negasit')return;
  _scanHistory=_scanHistory.filter(h=>h.code!==code);
  _scanHistory.unshift({code,name,ts:new Date()});
  if(_scanHistory.length>8)_scanHistory.pop();
}

function renderScanner(){
  const page=dv('scanner-page');

  // ── Camera viewport ──
  const top=dv('scanner-top');
  const video=el('video','scanner-video');
  video.id='scanner-video';video.setAttribute('playsinline','');video.setAttribute('muted','');video.muted=true;video.autoplay=true;
  top.appendChild(video);

  const overlay=dv('scanner-overlay');
  const frame=dv('scanner-frame');
  ['tl','tr','bl','br'].forEach(c=>{const corner=dv(`scanner-corner ${c}`);frame.appendChild(corner);});
  frame.appendChild(dv('scanner-line'));
  overlay.appendChild(frame);
  overlay.appendChild(sp('scanner-hint','Aliniaza codul de bare in cadru'));
  top.appendChild(overlay);
  page.appendChild(top);

  // ── Bottom panel ──
  const bottom=dv('scanner-bottom');

  // Controls bar
  const ctrl=dv('scanner-controls');
  const camBtn=el('button','scanner-cam-btn');camBtn.id='scanner-cam-btn';camBtn.textContent='📷 Porneste camera';

  // Dedicated scan trigger button — shown after camera starts
  const scanTrigger=el('button','scanner-cam-btn');
  scanTrigger.id='scan-trigger-btn';
  scanTrigger.textContent='📷 Scaneaza';
  scanTrigger.style.cssText='background:#f59e0b;border-color:#f59e0b;font-size:15px;height:44px;padding:0 22px;display:none';

  const manualWrap=dv('scanner-manual');
  const inp=el('input','scanner-inp');inp.id='scanner-inp';inp.type='text';inp.placeholder='Cauta cod manual (ex: BTF.RERNWE0079)...';inp.autocomplete='off';
  const searchBtn=el('button','scanner-search-btn');searchBtn.textContent='↵ Cauta';
  manualWrap.appendChild(inp);manualWrap.appendChild(searchBtn);
  ctrl.appendChild(camBtn);ctrl.appendChild(scanTrigger);ctrl.appendChild(manualWrap);
  bottom.appendChild(ctrl);

  // Result area
  const resultArea=dv('');resultArea.id='scanner-result-area';
  const emptyMsg=dv('');emptyMsg.style.cssText='padding:24px;text-align:center;color:var(--text3);font-size:12px';
  emptyMsg.innerHTML='<div style="font-size:28px;margin-bottom:8px">📷</div>Porneste camera sau introdu un cod manual';
  resultArea.appendChild(emptyMsg);
  bottom.appendChild(resultArea);

  // History
  const histWrap=dv('scan-history');histWrap.id='scan-history';
  bottom.appendChild(histWrap);
  renderScanHistory(histWrap,resultArea);

  page.appendChild(bottom);

  // ── Camera start/stop ──
  camBtn.addEventListener('click',async()=>{
    if(_scannerActive){
      stopScanner();camBtn.textContent='📷 Porneste camera';camBtn.className='scanner-cam-btn';
      scanTrigger.style.display='none';
      video.srcObject=null;return;
    }
    camBtn.disabled=true;camBtn.textContent='Se initializeaza...';
    try{
      _scannerStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
      });
      video.srcObject=_scannerStream;
      await video.play();
      _scannerActive=true;
      camBtn.disabled=false;camBtn.textContent='⏹ Opreste';camBtn.className='scanner-cam-btn stop';
      scanTrigger.style.display='';  // show scan button
      overlay.querySelector('.scanner-hint').textContent='Apasa butonul galben pentru a scana';
      startBarcodeDetection(video,resultArea,histWrap,camBtn);
    }catch(e){
      camBtn.disabled=false;camBtn.textContent='📷 Porneste camera';camBtn.className='scanner-cam-btn';
      const errMsg=dv('');errMsg.style.cssText='padding:12px 16px;background:#fee2e2;color:#dc2626;font-size:12px;border-bottom:1px solid #fca5a5';
      errMsg.textContent=e.name==='NotAllowedError'?'Camera blocata — permite accesul la camera in setarile browserului.':'Camera indisponibila: '+e.message;
      bottom.insertBefore(errMsg,resultArea);setTimeout(()=>errMsg.remove(),4000);
    }
  });

  // Manual search
  const doSearch=()=>{
    const code=inp.value.trim();if(!code)return;
    showScanResult(code,resultArea,histWrap);inp.select();
  };
  searchBtn.addEventListener('click',doSearch);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

  // Stop camera when leaving tab
  const obs=new MutationObserver(()=>{if(!document.contains(page)){stopScanner();obs.disconnect();}});
  obs.observe(document.body,{childList:true,subtree:false});

  return page;
}

function flashSuccess(video){
  video.style.filter='brightness(1.5) saturate(0.5)';
  setTimeout(()=>{video.style.filter='';},120);
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector('script[src="'+src+'"]')){res();return;}
    const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

/* Scan on demand: collect votes for VOTE_WINDOW ms, pick most-frequent valid code */
let _scanPending=false;
let _scanVotes={};
const VOTE_WINDOW=900;
const MIN_VOTES=2;

function cleanBarcode(raw){
  return raw.replace(/[^\x20-\x7E]/g,'').trim().toUpperCase();
}

function commitVote(resultArea,histWrap){
  const entries=Object.entries(_scanVotes).sort((a,b)=>b[1]-a[1]);
  _scanVotes={};_scanPending=false;
  const scanBtn=document.getElementById('scan-trigger-btn');
  if(scanBtn){scanBtn.disabled=false;scanBtn.textContent='📷 Scaneaza';}
  if(!entries.length){
    const w=dv('');w.style.cssText='padding:10px 16px;background:#fef9c3;border:1px solid #fde047;color:#92400e;font-size:12px;border-radius:4px;margin:8px 16px';
    w.textContent='Niciun cod detectat. Asigura-te ca telefonul e stabil si codul e bine iluminat.';
    resultArea.innerHTML='';resultArea.appendChild(w);return;
  }
  const [code,votes]=entries[0];
  if(votes<MIN_VOTES){
    const w=dv('');w.style.cssText='padding:10px 16px;background:#fef9c3;border:1px solid #fde047;color:#92400e;font-size:12px;border-radius:4px;margin:8px 16px';
    w.textContent='Cod incert: "'+code+'" ('+votes+'/'+MIN_VOTES+' citiri). Incearca din nou cu telefonul mai stabil.';
    resultArea.innerHTML='';resultArea.appendChild(w);return;
  }
  showScanResult(code,resultArea,histWrap);
}

async function startBarcodeDetection(video,resultArea,histWrap,camBtn){
  const scanBtn=document.getElementById('scan-trigger-btn');
  const addVote=(raw)=>{
    if(!_scanPending)return;
    const code=cleanBarcode(raw);
    if(!code||code.length<4)return;
    _scanVotes[code]=(_scanVotes[code]||0)+1;
  };
  const doScan=()=>{
    if(!_scannerActive||_scanPending)return;
    _scanPending=true;_scanVotes={};
    if(scanBtn){scanBtn.disabled=true;scanBtn.textContent='⏳ Se citeste...';}
    flashSuccess(video);
    setTimeout(()=>commitVote(resultArea,histWrap),VOTE_WINDOW);
  };
  if(scanBtn)scanBtn.addEventListener('click',doScan);
  // Method 1: Native BarcodeDetector (Chrome Android)
  if('BarcodeDetector' in window){
    let formats=['code_128','code_39','ean_13','ean_8','qr_code','data_matrix','upc_a','upc_e','itf'];
    try{const sup=await BarcodeDetector.getSupportedFormats();formats=formats.filter(f=>sup.includes(f));}catch(_){}
    const detector=new BarcodeDetector({formats});
    const tick=async()=>{
      if(!_scannerActive)return;
      if(_scanPending){try{const codes=await detector.detect(video);for(const bc of codes)addVote(bc.rawValue);}catch(_){}}
      if(_scannerActive)setTimeout(()=>requestAnimationFrame(tick),50);
    };
    requestAnimationFrame(tick);return;
  }
  // Method 2: QuaggaJS (iOS Safari, Firefox)
  try{await loadScript('https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js');}
  catch(e){const msg=dv('');msg.style.cssText='padding:8px 16px;background:#fef9c3;color:#92400e;font-size:11px;border-bottom:1px solid #fde047';msg.textContent='Nu s-a putut incarca modulul. Foloseste cautarea manuala.';resultArea.before(msg);return;}
  let qDiv=document.getElementById('quagga-container');
  if(!qDiv){qDiv=document.createElement('div');qDiv.id='quagga-container';qDiv.style.cssText='position:fixed;top:-9999px;left:-9999px;width:320px;height:240px';document.body.appendChild(qDiv);}
  Quagga.init({
    inputStream:{name:'Live',type:'LiveStream',target:qDiv,constraints:{facingMode:'environment',width:{min:640},height:{min:480}}},
    locator:{patchSize:'large',halfSample:false},numOfWorkers:1,frequency:20,
    decoder:{readers:['code_128_reader','code_39_reader','ean_reader','ean_8_reader'],multiple:false},
    locate:true,
  },(err)=>{
    if(err){const msg=dv('');msg.style.cssText='padding:8px 16px;background:#fee2e2;color:#dc2626;font-size:11px';msg.textContent='Scanare auto indisponibila. Foloseste cautarea manuala.';resultArea.before(msg);return;}
    Quagga.start();_scannerReader={reset:()=>{try{Quagga.stop();}catch(_){}}};
  });
  Quagga.onDetected((result)=>{
    if(!_scannerActive)return;
    const code=result?.codeResult?.code;
    const errors=(result?.codeResult?.decodedCodes||[]).filter(d=>d.error!==undefined).map(d=>d.error);
    const avgErr=errors.length?errors.reduce((s,e)=>s+e,0)/errors.length:1;
    if(avgErr>0.22)return;  // skip low-confidence reads
    if(code)addVote(code);
  });
}
function showScanResult(rawCode,resultArea,histWrap){
  const code=rawCode.trim();
  const result=lookupCode(code);
  resultArea.innerHTML='';
  resultArea.className='scanner-result scan-beep';
  setTimeout(()=>resultArea.className='scanner-result',200);

  if(!result){
    const nf=dv('scan-not-found');
    nf.appendChild(sp('scan-product-code',code));
    const msg=dv('');msg.style.cssText='font-size:12px;color:#dc2626;margin-top:6px';msg.textContent='Codul nu a fost gasit in BOM/Stocuri.';
    nf.appendChild(msg);
    if(S.bomData){
      const tip=dv('');tip.style.cssText='font-size:11px;color:var(--text3);margin-top:8px';
      tip.textContent='Verifica daca fisierele BOM si Planning Overview sunt incarcate.';nf.appendChild(tip);
    }
    resultArea.appendChild(nf);
    // Not added to history — only found products are saved
  } else {
    addScanHistory(result.code, result.name);
    const wrap=dv('scanner-result');

    // Header
    wrap.appendChild(sp('scan-product-code',result.code));
    wrap.appendChild(sp('scan-product-name',result.name));

    // Type badge
    const badges=dv('scan-badges');
    if(result.type==='fp'){
      const b=sp('stk-type-m','PRODUS FINIT');badges.appendChild(b);
    } else {
      const st=result.stock;
      const typeCls=st.type==='M'?'stk-type-m':st.type==='P'?'stk-type-b':'stk-type-d';
      const typeLabel=st.type==='M'?'MAKE':st.type==='P'?'BUY':'DIRECT';
      badges.appendChild(sp(typeCls,typeLabel));
    }
    wrap.appendChild(badges);

    // Stock cards
    const st=result.stock;
    const grid=dv('scan-stock-grid');

    const mkCard=(label,val)=>{
      const card=dv('scan-stock-card');
      card.appendChild(sp('scan-stock-label',label));
      const cls=val>0?'pos':val<0?'neg':'zero';
      card.appendChild(sp(`scan-stock-val ${cls}`,fmtN(val)));
      return card;
    };
    grid.appendChild(mkCard('On Hand',st.onHand||0));
    grid.appendChild(mkCard('On MO',st.onMO||0));
    grid.appendChild(mkCard('Total WIP',st.totalWIP||0));

    // Available (On Hand + WIP, min 0)
    const avail=Math.max(0,st.onHand||0)+Math.max(0,st.totalWIP||0);
    const availCard=mkCard('Disponibil',avail);
    availCard.style.borderColor=avail>0?'#86efac':'#e5e7eb';
    grid.appendChild(availCard);
    wrap.appendChild(grid);

    // WIP by WC
    if(st.totalWIP>0&&Object.keys(st.wipByWC||{}).length>0){
      const wcs=dv('scan-wip-wcs');
      wcs.textContent='WIP: '+Object.entries(st.wipByWC).map(([wc,q])=>`${wcLabel(wc)}: ${fmtN(q)}`).join(' · ');
      wrap.appendChild(wcs);
    }

    // Plan info
    const planQ=planQty(result.code);
    if(planQ>0){
      const pi=dv('');pi.style.cssText='background:#fef9c3;border:1px solid #fde047;border-radius:4px;padding:7px 10px;font-size:11.5px;color:#92400e;margin-bottom:12px';
      pi.textContent=`📋 In planul de productie: ${planQ.toLocaleString('ro-RO')} buc`;
      wrap.appendChild(pi);
    }

    // FP associations
    if(result.fps?.length>0&&result.type!=='fp'){
      const fpWrap=dv('');fpWrap.style.cssText='margin-bottom:12px';
      fpWrap.appendChild(sp('scan-hist-title','Apare in produse finale:'));
      const pills=dv('');pills.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-top:4px';
      result.fps.slice(0,6).forEach(fp=>{
        const pill=sp('stk-fp-pill',fp);pill.style.cursor='pointer';
        pill.addEventListener('click',()=>{S.selFP=fp;S.tab='structura';stopScanner();render();});
        pills.appendChild(pill);
      });
      if(result.fps.length>6)pills.appendChild(sp('stk-fp-more',`+${result.fps.length-6}`));
      fpWrap.appendChild(pills);wrap.appendChild(fpWrap);
    }

    // Action buttons
    const actions=dv('scan-actions');
    if(S.bomData){
      const fpCode=result.type==='fp'?result.code:result.fps?.[0];
      if(fpCode){
        const structBtn=el('button','scan-action-btn');structBtn.textContent='🌳 Structura BOM';
        structBtn.addEventListener('click',()=>{S.selFP=fpCode;S.tab='structura';stopScanner();render();});
        actions.appendChild(structBtn);
      }
    }
    if(S.stockIdx){
      const stocBtn=el('button','scan-action-btn');stocBtn.textContent='📦 Vezi in Stocuri';
      stocBtn.addEventListener('click',()=>{S.tab='stocuri';S.stockFilter.q=result.code;stopScanner();render();});
      actions.appendChild(stocBtn);
    }
    wrap.appendChild(actions);
    resultArea.appendChild(wrap);
  }
  renderScanHistory(histWrap,resultArea);
}

function renderScanHistory(histWrap,resultArea){
  histWrap.innerHTML='';
  if(!_scanHistory.length)return;
  histWrap.appendChild(sp('scan-hist-title','Scanari recente'));
  _scanHistory.forEach(h=>{
    const item=dv('scan-hist-item');
    item.appendChild(sp('scan-hist-code',h.code));
    item.appendChild(sp('scan-hist-name',h.name));
    const now=new Date();const diff=Math.round((now-h.ts)/1000);
    const timeStr=diff<60?`${diff}s`:`${Math.round(diff/60)}min`;
    item.appendChild(sp('scan-hist-time',timeStr+' ago'));
    item.addEventListener('click',()=>showScanResult(h.code,resultArea,histWrap));
    histWrap.appendChild(item);
  });
}
