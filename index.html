<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Production Planning Suite v1.0.1</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surface:#fff;--surface2:#f8f9fb;
  --border:#e2e5ea;--border2:#edf0f3;
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --accent:#1e40af;--accent-bg:#eff6ff;
  --make:#6d28d9;--buy:#065f46;--op-red:#dc2626;
  --sans:Arial,sans-serif;--mono:Arial,monospace;
  --lc0:#16a34a;--lc1:#7c3aed;--lc2:#ea580c;--lc3:#2563eb;--lc4:#0e7490;--lc5:#be185d;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative}

/* ─── HEADER ─── */
.hdr{height:44px;background:#1a2035;display:flex;align-items:stretch;flex-shrink:0;overflow:hidden}
.hdr-logo{display:flex;align-items:center;gap:8px;padding:0 18px;border-right:1px solid rgba(255,255,255,.08);flex-shrink:0}
.logo-mark{color:#f59e0b;font-size:17px}.logo-text{font-family:var(--mono);font-size:11px;font-weight:600;color:#d1d5db;letter-spacing:.07em;white-space:nowrap}
.hdr-nav{display:flex;flex:1}
.nav-tab{display:flex;align-items:center;gap:5px;padding:0 15px;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:rgba(255,255,255,.7)}
.nav-tab.active{color:#f59e0b;border-bottom-color:#f59e0b;background:rgba(245,158,11,.06)}
.nav-tab.locked{opacity:.25;cursor:not-allowed}
.dot-ok{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e88}
.dot-no{width:7px;height:7px;border-radius:50%;background:#ef4444;box-shadow:0 0 4px #ef444488}
.hdr-right{margin-left:auto;padding:0 16px;display:flex;align-items:center;gap:7px}
.h-dot{width:6px;height:6px;border-radius:50%;background:#374151}
.h-dot.ok{background:#22c55e;box-shadow:0 0 5px #22c55e88}
.h-lbl{font-size:10.5px;font-family:var(--mono);color:rgba(255,255,255,.3)}

/* ─── BODY ─── */
.body{flex:1;display:flex;overflow:hidden}

/* ─── SIDEBAR ─── */
.sbar{width:258px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.s-wrap{padding:8px 13px;border-bottom:1px solid var(--border2);position:relative}
.s-inp{width:100%;height:30px;border:1px solid var(--border);border-radius:3px;padding:0 26px 0 8px;font-size:12px;font-family:var(--mono);color:var(--text);background:var(--surface2);outline:none;transition:border .15s}
.s-inp:focus{border-color:var(--accent);background:#fff}
.s-inp::placeholder{color:var(--text4)}
.s-ico{position:absolute;right:21px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:12px;pointer-events:none}
.s-count{padding:4px 13px;font-size:10px;font-family:var(--mono);color:var(--text4);border-bottom:1px solid var(--border2)}
.plist{flex:1;overflow-y:auto}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pitem{padding:6px 13px;cursor:pointer;border-left:3px solid transparent;transition:all .1s}
.pitem:hover{background:var(--surface2)}
.pitem.on{background:#eff6ff;border-left-color:var(--accent)}
.pitem-code{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1.3}
.pitem.on .pitem-code{color:var(--accent)}
.pitem-name{font-size:10.5px;color:var(--text3);line-height:1.3;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}

/* ─── CONTENT ─── */
.cnt{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-code{font-size:15px;font-weight:800;font-family:var(--mono);color:var(--text)}
.tb-draw{font-size:12px;color:var(--text3);font-family:var(--mono);margin-left:4px}
.tb-subcon{font-size:11px;color:#1e40af;font-style:italic;font-family:var(--sans);margin-left:6px;align-self:center}
.tb-r{margin-left:auto;display:flex;gap:5px}
.tbtn{height:25px;padding:0 10px;border:1px solid var(--border);border-radius:3px;background:#fff;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.tbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
/* Stats bar — screen: WC time strips + summary counts */
.stats{display:flex;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.st{flex:1;padding:5px 14px;border-right:1px solid var(--border2);display:flex;align-items:baseline;gap:5px;min-width:90px}
.st:last-child{border-right:none}
.stv{font-size:15px;font-weight:700;font-family:var(--mono)}
.stl{font-size:10px;color:var(--text3)}
/* WC time stats bar */
.wc-stats{display:flex;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;flex-wrap:nowrap}
.wc-stat{flex:0 0 auto;padding:5px 14px;border-right:1px solid var(--border2);display:flex;flex-direction:column;gap:1px;min-width:110px}
.wc-stat:last-child{border-right:none}
.wc-stat-name{font-size:9.5px;font-weight:700;font-family:var(--mono);color:var(--text3);letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.wc-stat-time{font-size:14px;font-weight:800;font-family:var(--mono);color:#7c3aed}
.wc-stat-sub{font-size:9px;color:var(--text4);font-family:var(--mono)}
.no-print{}
/* % Realizare cell — distinct from WC time cells */
.pct-realizare-cell{
  background:var(--surface2);
  border-right:2px solid var(--border)!important;
  min-width:120px!important;
}
.pct-val{font-size:20px!important;font-weight:900!important;}
.tree-scroll{flex:1;overflow:auto;padding:14px 18px 40px}
.tree-scroll::-webkit-scrollbar{width:5px;height:5px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── BOM TREE ─── */
.fp-hdr{margin-bottom:8px;padding-bottom:8px;border-bottom:2px solid #e5e7eb}
.fp-hdr-lbl{font-size:9px;font-weight:700;font-family:var(--mono);color:var(--text4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.fp-hdr-row{display:flex;align-items:baseline;gap:10px}
.fp-hdr-code{font-size:17px;font-weight:800;font-family:var(--mono);color:var(--text)}
.fp-hdr-draw{font-size:13px;font-family:var(--mono);color:var(--text3)}

.n-row{display:flex;align-items:center;min-height:22px;padding:1px 0;user-select:text}
.n-row.clk{cursor:pointer}
.n-row.clk:hover .n-inner{background:rgba(0,0,0,.035);border-radius:3px}

/* Vertical line spacers */
.n-sp{width:18px;flex-shrink:0;position:relative;align-self:stretch}
.n-sp.vl::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1.5px;background:var(--c,#d1d5db)}

/* Horizontal connector */
.n-hc{width:18px;flex-shrink:0;position:relative}
.n-hc::before{content:'';position:absolute;left:0;top:50%;height:1.5px;width:100%;background:var(--c,#d1d5db)}

/* Toggle — not selectable so clicking it doesn't accidentally select text */
.n-tog{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;color:#9ca3af;transition:transform .18s;margin-right:3px;user-select:none;cursor:pointer}
.n-tog.open{transform:rotate(90deg)}
.n-tog.leaf{visibility:hidden;cursor:default}

/* Node content */
.n-inner{flex:1;display:flex;align-items:baseline;flex-wrap:wrap;padding:1px 3px;line-height:1.6}
.n-code{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--text);white-space:nowrap}
.n-code.buy-style{color:var(--text2);font-weight:600}
.n-arr{font-size:11.5px;color:var(--text3);padding:0 4px;white-space:nowrap}
.n-draw{font-family:var(--mono);font-size:11.5px;color:var(--text3);white-space:nowrap}
.n-desc{font-size:11.5px;color:var(--text2);padding-left:2px}
.n-qty{font-size:11px;color:var(--text3);font-style:italic;margin-left:6px;white-space:nowrap}
.n-tag{font-size:8.5px;font-weight:700;font-family:var(--mono);border-radius:2px;padding:0 4px;margin-left:5px;line-height:1.7;white-space:nowrap;align-self:center;border:1px solid}
.n-tag.make{color:var(--make);background:rgba(109,40,217,.08);border-color:rgba(109,40,217,.22)}
.n-tag.buy{color:var(--buy);background:rgba(6,95,70,.08);border-color:rgba(6,95,70,.2)}

/* Children wrapper */
.n-kids{position:relative}
.n-kids::before{content:'';position:absolute;left:var(--kl,8px);top:0;bottom:8px;width:1.5px;background:var(--c,#d1d5db)}

/* Operation row */
.op-row{display:flex;align-items:center;min-height:20px;padding:1px 0}
.op-tri{width:0;height:0;border-top:5.5px solid transparent;border-bottom:5.5px solid transparent;border-left:8px solid var(--op-red);flex-shrink:0;margin-right:5px}
.op-name{font-size:12px;font-weight:600;color:var(--text)}
.op-time{font-size:11px;color:var(--op-red);font-style:italic;margin-left:10px;white-space:nowrap}
.op-time b{font-style:normal;font-weight:600}

/* Ops group — collapsible header */
.ops-group{}
.ops-group-badge{
  font-size:11px;font-weight:600;font-family:var(--mono);
  color:var(--op-red);
  background:rgba(220,38,38,.07);
  border:1px solid rgba(220,38,38,.2);
  border-radius:3px;
  padding:1px 7px;
  letter-spacing:.01em;
}
.n-row.clk:hover .ops-group-badge{background:rgba(220,38,38,.13);}
.ops-list{}

/* Empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--text3)}
.empty-ico{font-size:38px;opacity:.2}
.empty-h{font-size:15px;font-weight:700;color:var(--text2)}
.empty-p{font-size:12.5px;text-align:center;max-width:380px;line-height:1.8}
.leg{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.leg-make{width:8px;height:8px;border-radius:1px;background:rgba(109,40,217,.5)}
.leg-buy{width:8px;height:8px;border-radius:1px;background:rgba(6,95,70,.5)}
.leg-op{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid var(--op-red)}

/* ─── FISIERE TAB ─── */
.files-page{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:24px;background:var(--bg)}
.files-page-title{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--text)}
.files-page-sub{font-size:12.5px;color:var(--text3);margin-top:3px;line-height:1.6}
.file-cards{display:flex;gap:16px;flex-wrap:wrap}
.file-card{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:20px;width:320px;display:flex;flex-direction:column;gap:14px;transition:box-shadow .2s}
.file-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.file-card.loaded{border-color:#86efac}
.fc-header{display:flex;align-items:flex-start;gap:12px}
.fc-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.fc-info{flex:1;min-width:0}
.fc-title{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1.3}
.fc-desc{font-size:11px;color:var(--text3);margin-top:2px}
.fc-badge{font-size:9px;font-weight:700;font-family:var(--mono);padding:2px 6px;border-radius:3px}
.fc-badge.ok{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.fc-badge.no{background:#f3f4f6;color:var(--text4);border:1px solid var(--border)}
.fc-stats{display:flex;gap:16px;padding:10px 0;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2)}
.fc-stat{display:flex;flex-direction:column;gap:1px}
.fc-stat-val{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text)}
.fc-stat-lbl{font-size:10px;color:var(--text3)}
.fc-upload-area{display:flex;flex-direction:column;gap:6px}
.fc-timestamp{display:flex;align-items:center;gap:5px;font-size:10.5px;font-family:var(--mono);color:var(--text3)}
.fc-timestamp.ok{color:#16a34a}
.upbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:34px;border:1.5px dashed var(--border);border-radius:4px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;background:var(--surface2)}
.upbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.upbtn.ok{border-style:solid;border-color:#86efac;background:#f0fdf4;color:#15803d}
.upbtn input{display:none}

/* ── Execution time panel ── */
.exec-panel{margin-top:8px;border:1px solid rgba(124,58,237,.2);border-radius:5px;overflow:hidden;background:rgba(124,58,237,.03)}
.exec-panel-hdr{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;user-select:none;transition:background .12s}
.exec-panel-hdr:hover{background:rgba(124,58,237,.07)}
.exec-tog{font-size:8px;color:#7c3aed;flex-shrink:0;width:12px}
.exec-panel-title{font-size:12px;font-weight:600;color:var(--text2)}
.exec-total-time{font-size:13px;font-weight:800;font-family:var(--mono);color:#7c3aed}
.exec-sub-times{font-size:11px;color:var(--text3);font-style:italic}
.exec-panel-body{padding:6px 10px 8px;border-top:1px solid rgba(124,58,237,.15);display:flex;flex-direction:column;gap:4px}
.exec-wc-row{display:grid;grid-template-columns:180px 90px 90px 80px 1fr;align-items:center;gap:8px;padding:3px 0}
.exec-wc-name{font-size:11.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exec-wc-run{font-size:10.5px;font-family:var(--mono);color:var(--text3)}
.exec-wc-setup{font-size:10.5px;font-family:var(--mono);color:var(--text3)}
.exec-wc-total{font-size:11.5px;font-weight:700;font-family:var(--mono);color:#7c3aed;text-align:right}
.exec-bar{height:6px;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:3px;min-width:2px;transition:width .3s}
.stock-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-left:4px}
.stk-badge{font-size:9.5px;font-family:var(--mono);font-weight:600;padding:1px 5px;border-radius:2px;border:1px solid;white-space:nowrap;line-height:1.6}
.stk-oh{color:#0369a1;background:#e0f2fe;border-color:#7dd3fc}       /* on hand */
.stk-wip{color:#92400e;background:#fef3c7;border-color:#fcd34d}      /* WIP */
.stk-need-ok{color:#14532d;background:#dcfce7;border-color:#86efac}  /* need covered */
.stk-need-partial{color:#92400e;background:#fef9c3;border-color:#fde047} /* partial */
.stk-need-miss{color:#7f1d1d;background:#fee2e2;border-color:#fca5a5}
.stk-neg-stock{
  color:#fff;
  background:#dc2626;
  border-color:#b91c1c;
  font-weight:700;
  outline:2px solid #dc2626;
  outline-offset:1px;
  border-radius:4px;
} /* missing */
.wip-wc-list{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;padding-left:4px}
.wip-wc-badge{font-size:9px;font-family:var(--mono);padding:0 5px;border-radius:2px;background:#fef3c7;border:1px solid #fcd34d;color:#92400e}

/* ── Qty Input in toolbar ── */
.qty-wrap{display:flex;align-items:center;gap:6px;padding:0 12px;border-left:1px solid var(--border);margin-left:6px}
.qty-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.qty-inp{width:72px;height:25px;border:1px solid var(--border);border-radius:3px;padding:0 6px;font-size:13px;font-family:var(--mono);font-weight:600;color:var(--accent);text-align:right;outline:none;background:#fff;transition:border .15s}
.qty-inp:focus{border-color:var(--accent)}
.qty-unit{font-size:11px;color:var(--text3);font-family:var(--mono)}
.eff-wrap{display:flex;align-items:center;gap:6px;padding:0 12px;border-left:1px solid var(--border);flex-shrink:0}
.eff-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.eff-inp{width:52px;height:25px;border:1px solid var(--border);border-radius:3px;padding:0 6px;font-size:13px;font-weight:600;color:#d97706;text-align:right;outline:none;background:#fff;transition:border .15s}
.eff-inp:focus{border-color:#d97706}
.eff-unit{font-size:11px;color:var(--text3)}

/* ── STOCURI TAB ── */
.stocuri-page{flex:1;display:flex;flex-direction:column;overflow:hidden}
.stk-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:white;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.stk-search{flex:1;min-width:160px;max-width:280px;height:30px;border:1px solid var(--border);border-radius:3px;padding:0 8px;font-size:12px;font-family:var(--mono);outline:none;transition:border .15s}
.stk-search:focus{border-color:var(--accent)}
.stk-sel{height:30px;border:1px solid var(--border);border-radius:3px;padding:0 6px;font-size:12px;font-family:var(--sans);outline:none;background:#fff;color:var(--text);cursor:pointer}
.stk-toggle{height:30px;padding:0 10px;border:1px solid var(--border);border-radius:3px;font-size:11.5px;cursor:pointer;background:#fff;color:var(--text2);transition:all .15s;white-space:nowrap}
.stk-toggle.on{background:#fef3c7;border-color:#fcd34d;color:#92400e;font-weight:600}
.stk-count{font-size:11px;font-family:var(--mono);color:var(--text3);margin-left:auto;white-space:nowrap}
.stk-table-wrap{flex:1;overflow:auto}
.stk-table-wrap::-webkit-scrollbar{width:5px;height:5px}
.stk-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.stk-table{width:100%;border-collapse:collapse;font-size:12px}
.stk-table th{position:sticky;top:0;background:#f8f9fb;border-bottom:2px solid var(--border);padding:6px 10px;text-align:left;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--text3);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;z-index:2}
.stk-table th:hover{color:var(--accent)}
.stk-table th.sort-asc::after{content:' ↑';color:var(--accent)}
.stk-table th.sort-desc::after{content:' ↓';color:var(--accent)}
.stk-table td{padding:5px 10px;border-bottom:1px solid var(--border2);vertical-align:middle;white-space:nowrap}
.stk-table tr:hover td{background:#f8f9fb}
.stk-code{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--text)}
.stk-name{font-size:11.5px;color:var(--text2);max-width:260px;overflow:hidden;text-overflow:ellipsis}
.stk-type-m{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(109,40,217,.08);color:var(--make);border:1px solid rgba(109,40,217,.2)}
.stk-type-b{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(6,95,70,.08);color:var(--buy);border:1px solid rgba(6,95,70,.2)}
.stk-type-d{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(30,64,175,.08);color:var(--accent);border:1px solid rgba(30,64,175,.2)}
.stk-num{font-family:var(--mono);font-size:12px;text-align:right}
.stk-num.pos{color:#15803d;font-weight:600}
.stk-num.zero{color:var(--text4)}
.stk-num.neg{
  color:#dc2626;font-weight:700;
  display:inline-block;
  outline:2px solid #dc2626;
  outline-offset:2px;
  border-radius:50%;
  padding:0 4px;
  min-width:1.6em;
  text-align:center;

/* ── BOOTSTRAP INTEGRATION & MOBILE RESPONSIVE ── */

/* Reset Bootstrap conflicts with our custom styles */
*, *::before, *::after { box-sizing: border-box; }
button { font-family: var(--sans); }

/* Header becomes Bootstrap navbar on mobile */
@media (max-width: 768px) {
  html,body { font-size: 12px; }

  /* App layout adapts */
  #app { height: 100dvh; }

  /* Header */
  .hdr { height: auto; min-height: 52px; flex-wrap: wrap; padding: 0; }
  .hdr-logo { padding: 10px 14px; border-right: none; border-bottom: 1px solid rgba(255,255,255,.08); width: 100%; justify-content: space-between; }
  .logo-text { display: block !important; font-size: 12px; }
  .mob-menu-btn { display: flex; order: -1; }

  /* Nav tabs scroll horizontally */
  .hdr-nav { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .hdr-nav::-webkit-scrollbar { display: none; }
  .nav-tab { padding: 10px 12px; font-size: 11px; white-space: nowrap; min-height: 44px; }
  .hdr-right { display: none; }

  /* Sidebar — Bootstrap offcanvas-style drawer */
  .sbar {
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 1050;
    width: min(280px, 85vw) !important;
    transform: translateX(-100%); transition: transform .25s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,.25);
    padding-top: 0;
  }
  .sbar.open { transform: translateX(0); }
  .sbar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1040; backdrop-filter: blur(2px); }
  .sbar-overlay.show { display: block; }

  /* Body */
  .body { height: calc(100dvh - 96px); /* header height */ }

  /* Toolbars wrap nicely */
  .tb { flex-wrap: wrap; height: auto; padding: 8px; gap: 6px; }
  .tb-r { flex-wrap: wrap; margin-left: 0 !important; width: 100%; justify-content: flex-end; }
  .qty-wrap { padding: 0; border-left: none; margin-left: 0; flex-wrap: wrap; }
  .eff-wrap { border-left: none; padding: 0; }

  /* WC stats bar */
  .wc-stats { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
  .wc-stat { min-width: 100px; }

  /* Tree — bigger touch targets */
  .n-row { min-height: 32px; }
  .n-tog { width: 20px; height: 20px; }
  .stock-row { margin-top: 4px; flex-wrap: wrap; }
  .bom-node { touch-action: manipulation; }

  /* Stocuri */
  .stk-toolbar { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .stk-search { min-width: 0; flex: 1; max-width: 100%; }
  .stk-table-wrap { -webkit-overflow-scrolling: touch; }

  /* Order Book */
  .ob-toolbar { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .ob-search { min-width: 0; flex: 1; }
  .ob-week-filters { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
  .ob-wf-btn { font-size: 10px; padding: 0 8px; }
  .ob-subtotal-bar { flex-wrap: wrap; gap: 8px; }
  .ob-table-wrap { -webkit-overflow-scrolling: touch; }

  /* Files */
  .files-page { padding: 12px; }
  .file-cards { flex-direction: column; gap: 12px; }
  .file-card { width: 100% !important; }

  /* Plan */
  .plan-toolbar { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .plan-eff-wrap { border-left: none; padding: 0; }
  .plan-stats-bar { flex-wrap: wrap; }
  .plan-stat-cell { padding: 6px 12px; min-width: 120px; }
  .plan-table-wrap { -webkit-overflow-scrolling: touch; }

  /* Rapoarte */
  .rep-selector { flex-wrap: wrap; gap: 8px; padding: 12px; }
  .nec-toolbar { flex-wrap: wrap; gap: 6px; padding: 8px; }

  /* Zoom controls */
  .zoom-ctrl { gap: 4px; }
  .zoom-pct { min-width: 32px; font-size: 10px; }

  /* Buttons — bigger touch targets */
  .tbtn, .sync-btn, .ob-col-picker-btn, .ob-wf-btn { min-height: 36px; }
  .ob-plan-btn, .plan-del-btn { min-height: 30px; }

  /* Dropdowns stay on screen */
  .ob-col-picker, .nec-group-dropdown { max-width: min(240px, 90vw); right: 8px !important; left: auto !important; }

  /* WC loading */
  .wc-load-toolbar { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .wc-load-table-wrap { -webkit-overflow-scrolling: touch; }
  .wc-bar-wrap { width: 100px !important; }
}

/* Small phones */
@media (max-width: 480px) {
  .nav-tab { padding: 10px 8px; font-size: 10px; }
  .tb-code { font-size: 13px; }
  .wc-stats { display: none; } /* too cramped on very small screens */
  .plan-stats-bar .plan-stat-cell:nth-child(n+4) { display: none; } /* show only first 3 stats */
}

.plan-modal{background:#fff;border-radius:10px;width:100%;max-width:700px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.plan-modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.plan-modal-title{font-size:16px;font-weight:800;color:var(--text);font-family:Arial,monospace}
.plan-modal-sub{font-size:11px;color:var(--text3);margin-top:2px}
.plan-modal-close{width:28px;height:28px;border:none;background:#f1f5f9;border-radius:4px;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px}
.plan-modal-close:hover{background:#fee2e2;color:#dc2626}
.plan-modal-body{flex:1;overflow-y:auto;padding:16px 20px}
/* Realizare summary bar */
.pdm-real-bar{display:flex;align-items:center;gap:14px;padding:12px 16px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.pdm-real-pct{font-size:34px;font-weight:900;font-family:Arial,monospace;line-height:1}
.pdm-real-info{flex:1;min-width:120px}
.pdm-real-label{font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.pdm-real-val{font-size:13px;font-weight:600;color:var(--text)}
/* WC table */
.pdm-section-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 7px;border-bottom:1px solid var(--border2);padding-bottom:4px}
.pdm-wc-table{width:100%;border-collapse:collapse;font-size:12px}
.pdm-wc-table th{background:#f8f9fb;border-bottom:2px solid var(--border);padding:5px 10px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;text-align:left;white-space:nowrap}
.pdm-wc-table td{padding:5px 10px;border-bottom:1px solid var(--border2);vertical-align:middle}
.pdm-bar-cell{width:140px}
.pdm-bar-bg{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden}
.pdm-bar-fill{height:100%;border-radius:5px}
.pdm-bar-fill.ok{background:#16a34a}
.pdm-bar-fill.warn{background:#d97706}
.pdm-bar-fill.over{background:#dc2626}
.pdm-wc-table tr:hover td{background:#f8f9fb}
.pdm-num{font-family:Arial,monospace;font-size:12px}
.pdm-num.rem{color:#7c3aed;font-weight:700}
.pdm-done{color:#15803d;font-size:10px;font-style:italic}
.pdm-op-row{cursor:pointer;user-select:none;background:#f8f9fb}
.pdm-op-row:hover td{background:#eff6ff!important}
.pdm-op-toggle{display:inline-block;width:14px;font-size:9px;color:var(--text3);transition:transform .15s;transform-origin:50% 50%}
.pdm-op-toggle.open{transform:rotate(90deg)}
.pdm-sub-tbody{display:none}
.pdm-sub-tbody.open{display:table-row-group}
.pdm-sub-row td{background:#fafbfc;padding:4px 10px 4px 30px;font-size:11px;border-bottom:1px solid var(--border2)}
.pdm-sub-row:hover td{background:#eff6ff!important}
.pdm-sub-matno{font-family:Arial,monospace;font-size:10.5px;color:var(--text3)}
.pdm-print-btn{height:28px;padding:0 12px;border:1px solid var(--border);border-radius:4px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;margin-left:auto}
.pdm-print-btn:hover{border-color:var(--accent);color:var(--accent)}
/* Print ONLY modal — hide everything else */
.printing-modal body>*{display:none!important}
.printing-modal #plan-detail-overlay{display:flex!important;position:fixed!important;inset:0!important;background:#fff!important;padding:20px!important;z-index:99999!important;align-items:flex-start!important;justify-content:center!important}
.printing-modal .plan-modal{box-shadow:none!important;max-height:none!important;border-radius:0!important;width:100%!important;overflow:visible!important}
.printing-modal .plan-modal-close,.printing-modal .pdm-print-btn{display:none!important}
.printing-modal .pdm-sub-tbody{display:table-row-group!important}
.printing-modal .pdm-op-toggle{display:none!important}
.printing-modal .plan-modal-body{overflow:visible!important;max-height:none!important}

@media(max-width:600px){
  .plan-modal{max-height:96vh;border-radius:8px 8px 0 0;align-self:flex-end}
  .plan-modal-overlay{align-items:flex-end;padding:0}
  .pdm-bar-cell{width:80px}
}
/* ── PROGRAMARE WORKCENTER ── */
.pwc-page{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pwc-toolbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.pwc-body{flex:1;display:flex;overflow:hidden}
/* Left panel - 20% - source cards */
.pwc-cards-panel{width:20%;min-width:180px;max-width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:#f8f9fb}
.pwc-cards-title{padding:8px 10px 4px;font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;flex-shrink:0;border-bottom:1px solid var(--border2)}
.pwc-cards-scroll{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;align-content:start}
.pwc-comp-card{background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:6px 8px;cursor:grab;user-select:none;transition:all .15s;font-size:11px}
.pwc-comp-card:hover{border-color:var(--accent);background:#eff6ff;transform:translateY(-1px);box-shadow:0 2px 8px rgba(30,64,175,.12)}
.pwc-comp-card:active{cursor:grabbing;transform:translateY(0)}
.pwc-comp-card.in-plan{opacity:.45;background:#f0fdf4;border-color:#86efac;cursor:default}
.pwc-card-code{font-family:Arial,monospace;font-size:10px;font-weight:700;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pwc-card-fp{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.pwc-card-qty{font-size:10px;font-weight:700;color:#dc2626;margin-top:2px}
.pwc-card-time{font-size:9px;color:#7c3aed;font-weight:600}
/* Right panel - 80% */
.pwc-plan-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pwc-plan-header{padding:8px 14px;background:#f0f4ff;border-bottom:2px solid var(--accent);flex-shrink:0;display:flex;align-items:center;gap:12px}
.pwc-plan-title{font-size:13px;font-weight:800;color:var(--accent)}
.pwc-plan-meta{font-size:11px;color:#1d4ed8}
/* Progress bar */
.pwc-prog-wrap{position:relative;height:22px;background:#e2e8f0;border-radius:4px;overflow:hidden;flex:1;max-width:320px}
.pwc-prog-fill{height:100%;border-radius:4px;transition:width .4s,background .3s}
.pwc-prog-lbl{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4)}
/* Drop zone */
.pwc-drop-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.pwc-drop-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:13px;pointer-events:none;opacity:.5}
.pwc-drop-hint.hidden{display:none}
.pwc-drop-zone.drag-over{background:#eff6ff}
/* Plan table */
.pwc-plan-table-wrap{flex:1;overflow:auto}
.pwc-plan-table{width:100%;border-collapse:collapse;font-size:12px}
.pwc-plan-table thead{position:sticky;top:0;z-index:4}
.pwc-plan-table th{background:#f0f4ff;border-bottom:2px solid var(--accent);border-right:1px solid var(--border2);padding:5px 8px;font-size:9px;font-weight:700;color:#1d4ed8;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.pwc-plan-table td{padding:5px 8px;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2);vertical-align:middle;white-space:nowrap}
.pwc-plan-table tr:hover td{background:#f0f4ff}
.pwc-plan-table tr.pwc-grp-sep td{background:#f0f4ff;font-weight:700;font-size:10px;color:#1d4ed8;padding:3px 8px;border-bottom:1px solid var(--accent)}
.pwc-remove-row{cursor:pointer;color:#dc2626;font-weight:700;padding:0 4px;border:none;background:none;font-size:14px}
.pwc-draggable{cursor:grab}
@media print{
  .pwc-cards-panel,.pwc-toolbar{display:none!important}
  .pwc-plan-panel{width:100%!important}
}
.vs-inp{width:100%;height:28px;border:1px solid var(--border);border-radius:3px;padding:0 6px;font-size:12px;outline:none;background:#fffbeb;transition:border .15s}
.vs-inp:focus{border-color:var(--accent);background:#fff}
.vs-obs{width:100%;min-height:28px;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;outline:none;background:#fffbeb;resize:vertical;font-family:inherit;line-height:1.4}
.vs-obs:focus{border-color:var(--accent);background:#fff}
.vs-diff-pos{color:#dc2626;font-weight:700;font-family:Arial,monospace}
.vs-diff-neg{color:#15803d;font-weight:700;font-family:Arial,monospace}
.vs-diff-zero{color:var(--text3);font-family:Arial,monospace}
.scanner-page{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0f1624}
.scanner-top{flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;height:45vw;max-height:320px;min-height:200px}
.scanner-video{width:100%;height:100%;object-fit:cover;display:block}
.scanner-overlay{position:absolute;inset:0;pointer-events:none}
.scanner-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(280px,75vw);height:min(160px,42vw);border:2px solid rgba(255,255,255,.15);border-radius:8px}
.scanner-corner{position:absolute;width:24px;height:24px;border-color:#f59e0b;border-style:solid}
.scanner-corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scanner-corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scanner-corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scanner-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scanner-line{position:absolute;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,#f59e0b,transparent);animation:scanLine 2s linear infinite}
@keyframes scanLine{0%{top:10%}100%{top:88%}}
.scanner-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap}
.scanner-bottom{background:#fff;flex:1;overflow-y:auto}
.scanner-controls{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.scanner-cam-btn{height:34px;padding:0 14px;border:1.5px solid var(--accent);border-radius:5px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.scanner-cam-btn.stop{background:#dc2626;border-color:#dc2626}
.scanner-manual{display:flex;gap:6px;flex:1;min-width:200px}
.scanner-inp{flex:1;height:34px;border:1.5px solid var(--border);border-radius:5px;padding:0 10px;font-size:13px;font-family:Arial,monospace;outline:none;transition:border .15s}
.scanner-inp:focus{border-color:var(--accent)}
.scanner-search-btn{height:34px;padding:0 12px;border:1.5px solid var(--accent);border-radius:5px;background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer}
.scanner-result{padding:14px 16px}
.scan-product-code{font-size:18px;font-weight:800;font-family:Arial,monospace;color:var(--text);margin-bottom:2px}
.scan-product-name{font-size:12px;color:var(--text3);margin-bottom:12px}
.scan-stock-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.scan-stock-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.scan-stock-label{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.scan-stock-val{font-size:22px;font-weight:900;font-family:Arial,monospace}
.scan-stock-val.pos{color:#15803d}
.scan-stock-val.zero{color:var(--text4)}
.scan-stock-val.neg{color:#dc2626}
.scan-wip-wcs{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.5}
.scan-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.scan-action-btn{height:30px;padding:0 12px;border:1.5px solid var(--border);border-radius:4px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;font-weight:500}
.scan-action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.scan-history{border-top:1px solid var(--border2);padding:10px 16px}
.scan-hist-title{font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.scan-hist-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border2);cursor:pointer}
.scan-hist-item:hover .scan-hist-code{color:var(--accent)}
.scan-hist-code{font-family:Arial,monospace;font-size:12px;font-weight:700;color:var(--text);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scan-hist-name{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scan-hist-time{font-size:10px;color:var(--text4);flex-shrink:0}
.scan-not-found{padding:24px 16px;text-align:center}
.scan-beep{animation:scanBeep .15s ease}
@keyframes scanBeep{0%,100%{background:#fff}50%{background:#fef9c3}}
/* ── WC Loading report ── */
.wc-load-page{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.wc-load-toolbar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;font-size:12px;color:var(--text3)}
.wc-load-table-wrap{flex:1;overflow:auto}
.wc-load-table{width:100%;border-collapse:collapse;font-size:12px}
.wc-load-table thead{position:sticky;top:0;z-index:3}
.wc-load-table th{background:#f8f9fb;border-bottom:2px solid var(--border);border-right:1px solid var(--border2);padding:7px 12px;font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;text-align:left}
.wc-load-table td{padding:6px 12px;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2);vertical-align:middle}
.wc-load-table tr:hover td{background:#f8f9fb}
.wc-avail-inp{width:72px;height:26px;border:1px solid var(--border);border-radius:3px;padding:0 6px;font-size:12px;font-family:Arial,monospace;text-align:right;outline:none;background:#fff;transition:border .15s}
.wc-avail-inp:focus{border-color:var(--accent)}
.wc-bar-wrap{width:180px;height:14px;background:#e5e7eb;border-radius:7px;overflow:hidden;position:relative;display:inline-block}
.wc-bar-fill{height:100%;border-radius:7px;transition:width .3s}
.wc-bar-fill.ok{background:#16a34a}
.wc-bar-fill.warn{background:#d97706}
.wc-bar-fill.over{background:#dc2626}
.wc-pct-lbl{font-size:12px;font-weight:700;font-family:Arial,monospace;min-width:48px;text-align:right;display:inline-block}
.wc-pct-lbl.ok{color:#16a34a}
.wc-pct-lbl.warn{color:#d97706}
.wc-pct-lbl.over{color:#dc2626}
.wc-num{font-family:Arial,monospace;font-size:12px}
.rep-selector{display:flex;gap:12px;padding:16px 20px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center}
.rep-sel-title{font-size:13px;font-weight:700;color:var(--text);margin-right:4px}
.rep-btn{height:32px;padding:0 14px;border:1.5px solid var(--border);border-radius:4px;background:#fff;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.rep-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.rep-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
/* Necesarul raport */
.nec-toolbar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.nec-export-btn{height:28px;padding:0 12px;border:1px solid #15803d;border-radius:3px;background:#f0fdf4;font-size:11px;font-weight:600;color:#15803d;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.nec-export-btn:hover{background:#dcfce7}
.nec-print-btn{height:28px;padding:0 12px;border:1px solid var(--border);border-radius:3px;background:#fff;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s}
.nec-print-btn:hover{border-color:var(--accent);color:var(--accent)}
.nec-info{font-size:11px;color:var(--text3);flex:1}
.nec-table-wrap{flex:1;overflow:auto}
.nec-table-wrap::-webkit-scrollbar{width:5px;height:5px}
.nec-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.nec-table{width:100%;border-collapse:collapse;font-size:12px}
.nec-table thead{position:sticky;top:0;z-index:4}
.nec-table th{background:#f8f9fb;border-bottom:2px solid var(--border);border-right:1px solid var(--border2);padding:0;height:32px;white-space:nowrap;user-select:none;position:relative}
.nec-th-inner{display:flex;align-items:center;gap:4px;padding:0 8px;height:100%;cursor:pointer}
.nec-th-inner:hover{background:rgba(30,64,175,.06)}
.nec-th-lbl{font-size:9.5px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;flex:1}
.nec-th-sort{font-size:9px;color:var(--accent)}
.nec-filter-row th{background:#fff;border-bottom:1px solid var(--border);padding:3px 5px;position:sticky;top:32px;z-index:3}
.nec-col-filter{width:100%;height:22px;border:1px solid var(--border2);border-radius:2px;padding:0 5px;font-size:11px;outline:none;background:var(--surface2);transition:border .15s}
.nec-col-filter:focus{border-color:var(--accent);background:#fff}
.nec-table td{padding:4px 8px;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2);vertical-align:top}
.nec-group-row td{background:#e5e7eb;font-weight:700;font-size:11px;color:var(--text2);letter-spacing:.04em;padding:3px 8px}
.nec-table tr:hover td{background:#f8f9fb}
.nec-table tr.nec-group-row:hover td{background:#d1d5db}
.nec-mat-code{font-family:Arial,monospace;font-size:11px;font-weight:600;color:var(--text)}
.nec-num{font-family:Arial,monospace;font-size:12px;text-align:right;display:block;white-space:nowrap}
.nec-num.need{color:#dc2626;font-weight:700}
.nec-num.ok{color:#15803d}
.nec-num.warn{color:#d97706;font-weight:600}
.nec-fps{font-size:10.5px;color:var(--text3);line-height:1.5}
.nec-group-filter-wrap{position:relative;width:100%}
.nec-group-filter-btn{width:100%;height:22px;border:1px solid var(--border2);border-radius:2px;padding:0 5px;font-size:11px;outline:none;background:var(--surface2);text-align:left;cursor:pointer;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:border .15s}
.nec-group-filter-btn:hover,.nec-group-filter-btn.open{border-color:var(--accent);background:#fff}
.nec-group-dropdown{position:fixed;background:#fff;border:1px solid var(--border);border-radius:5px;box-shadow:0 8px 24px rgba(0,0,0,.13);z-index:999;padding:6px 0;min-width:220px;max-height:320px;overflow-y:auto}
.nec-group-dropdown::-webkit-scrollbar{width:4px}
.nec-group-dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ngd-all{padding:5px 12px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border2);display:flex;gap:6px;align-items:center}
.ngd-all:hover{background:var(--accent-bg)}
.ngd-item{display:flex;align-items:center;gap:8px;padding:4px 12px;cursor:pointer;font-size:11.5px;color:var(--text2);user-select:none}
.ngd-item:hover{background:var(--surface2)}
.ngd-item input[type=checkbox]{cursor:pointer;width:13px;height:13px;accent-color:var(--accent);flex-shrink:0}border-radius:2px;padding:2px 4px;font-size:11.5px;font-family:Arial,sans-serif;background:transparent;resize:none;outline:none;min-height:20px;transition:border .15s;color:var(--text)}
.nec-obs:focus{border-color:var(--accent);background:#fff}
/* Print */
@media print{
  .rep-selector,.nec-toolbar,.zoom-ctrl{display:none!important}
  .nec-table{font-size:8pt!important}
  .nec-table th,.nec-table td{padding:2px 5px!important;font-size:8pt!important;border:1px solid #ccc!important}

/* ═══════════════════════════════════════════════════════════════
   GITHUB SYNC — cross-device data persistence
   Architecture:
   • index.html on GitHub Pages (public repo)
   • Data in a separate PRIVATE repo via GitHub API + PAT
   • Files filtered to essential columns → ~25MB base64 each
   • Large files fetched via raw.githubusercontent.com + auth

/* ── Crypto ── */
async function sha256(text){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ═══════════════════════════════════════════════════════════════
   SUPABASE STORAGE SYNC
   • cfg = {url, key, bucket}
   • All files stored as JSON in the bucket
   • Large files (BOM/BOW) stored gzip-compressed as text
   • CORS works natively — no server needed
═══════════════════════════════════════════════════════════════ */

function sbHeaders(cfg){
  return{'Authorization':'Bearer '+cfg.key,'apikey':cfg.key,'Content-Type':'application/json'};
}

async function sbUpload(cfg,path,data){
  const json=JSON.stringify(data);
  const blob=new Blob([json],{type:'application/json'});
  const url=`${cfg.url}/storage/v1/object/${cfg.bucket}/${path}`;
  const r=await fetch(url,{
    method:'POST',
    headers:{'Authorization':'Bearer '+cfg.key,'apikey':cfg.key,'x-upsert':'true','Content-Type':'application/json'},
    body:blob
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`Supabase upload ${path}: ${r.status} ${e.error||e.message||''}`);}
  return true;
}

async function sbDownload(cfg,path){
  const url=`${cfg.url}/storage/v1/object/${cfg.bucket}/${path}`;
  const r=await fetch(url,{headers:{'Authorization':'Bearer '+cfg.key,'apikey':cfg.key}});
  if(r.status===404||r.status===400)return null;
  if(!r.ok)throw new Error(`Supabase download ${path}: ${r.status}`);
  return await r.json();
}

async function sbTestConnection(cfg){
  // Try to list objects in bucket — confirms URL + key + bucket all work
  const url=`${cfg.url}/storage/v1/object/list/${cfg.bucket}`;
  const r=await fetch(url,{
    method:'POST',
    headers:{'Authorization':'Bearer '+cfg.key,'apikey':cfg.key,'Content-Type':'application/json'},
    body:JSON.stringify({limit:1,offset:0,prefix:''})
  });
  if(r.status===400){const e=await r.json().catch(()=>({}));
    if(e.error==='Bucket not found')throw new Error(`Bucket "${cfg.bucket}" inexistent — creeaza-l in Supabase Storage.`);
    throw new Error(`Supabase: ${e.error||e.message||r.status}`);
  }
  if(r.status===401||r.status===403)throw new Error('Cheie API invalida. Verifica "anon public" key din Supabase → Settings → API.');
  if(!r.ok)throw new Error(`Supabase test: ${r.status}`);
  return true;
}

/* ── User management (stored as users.json in bucket) ── */
async function sbGetUsers(){
  const cfg=S.sbCfg;if(!cfg)return{users:[]};
  const data=await sbDownload(cfg,'users.json');
  if(!data){
    const init=[{username:'admin',passwordHash:INITIAL_ADMIN_HASH,role:'admin',createdAt:new Date().toISOString()}];
    await sbUpload(cfg,'users.json',init);
    return{users:init};
  }
  return{users:Array.isArray(data)?data:[]};
}

async function sbLogin(username,password){
  const cfg=S.sbCfg;if(!cfg)throw new Error('Supabase neconfigurat');
  const hash=await sha256(password);
  const{users}=await sbGetUsers();
  const user=users.find(u=>u.username===username&&u.passwordHash===hash);
  if(!user)throw new Error('Utilizator sau parola incorecta');
  return{username:user.username,role:user.role};
}

async function sbCreateUser(username,password,role){
  if(!S.session||S.session.role!=='admin')throw new Error('Acces interzis');
  const{users}=await sbGetUsers();
  if(users.find(u=>u.username===username))throw new Error('Utilizatorul exista deja');
  users.push({username,passwordHash:await sha256(password),role:role||'user',createdAt:new Date().toISOString()});
  await sbUpload(S.sbCfg,'users.json',users);
  return users;
}

async function sbChangePassword(targetUser,newPassword){
  if(!S.session)throw new Error('Neautentificat');
  if(S.session.role!=='admin'&&S.session.username!==targetUser)throw new Error('Acces interzis');
  const{users}=await sbGetUsers();
  const u=users.find(u=>u.username===targetUser);if(!u)throw new Error('User inexistent');
  u.passwordHash=await sha256(newPassword);

const yieldFrame=()=>new Promise(res=>setTimeout(res,0));

/* ── DATA ── */
const str=v=>v==null?'':String(v).trim();

/*
  BOM INDEX — composite key: "FinalProduct__CompNo"
  This ensures that when we recurse into component X within FP context A,
  we only see X's children that were defined under FP A — not those from FP B, C, etc.
  
  Why this works:
    Row: FP=ACI.GHS1EX0092C, Comp no.=ACI.GHS1PA0078, Material no=ACI.GHS1WE0057
    → stored under key "ACI.GHS1EX0092C__ACI.GHS1PA0078"
    
    When building tree for ACI.GHS1EX0092C, we always pass the FP context,
    so lookups stay within that FP's BOM definition.
*/
function applyWcSetup(rows,ts){
  S.wcSetupData=rows;
  const idx={};
  for(const r of rows){
    const wcNo=String(r['Workcenter']||'').trim();
    const wcName=String(r['Workcenter name']||'').trim();
    const prodTeam=parseFloat(r['Prod Team'])||0;
    const wcType=String(r['Workcenter Type']||'').trim();
    const wcGroup=String(r['Workcenter Group']||r['Workcenter Type']||'').trim();
    if(wcName){idx[wcName]={wcNo,prodTeam,wcType,wcGroup};}
  }
  S.wcSetupIdx=idx;
  // Pre-populate wcAvailHours from prodTeam (8h * 5 days * prodTeam)
  for(const [wcName,d] of Object.entries(idx)){
    if(d.prodTeam>0&&!S.wcAvailHours[wcName]){
      S.wcAvailHours[wcName]=8*5*d.prodTeam;
    }
  }
}

function applyInTransit(rows,ts){
  S.inTransitData=rows;
  S.inTransitData._ts=ts;
  const idx={};
  for(const r of rows){
    const item=String(r['Item']||'').trim();
    const qty=parseFloat(r['Qty']);
    if(!item||item==='Total'||isNaN(qty)||qty<=0)continue;
    idx[item]=(idx[item]||0)+qty;
  }
  S.inTransitIdx=idx;
  // Apply corrections to stockIdx if already loaded
  applyInTransitToStock();
}

function applyInTransitToStock(){
  if(!S.stockIdx||!S.inTransitIdx)return;
  // Apply transit deductions to onHand — store original if not already stored
  for(const [itemNo,transitQty] of Object.entries(S.inTransitIdx)){
    const st=S.stockIdx.get(itemNo);
    if(!st)continue;
    // Store the original onHand (from PO) only once
    if(st._origOnHand===undefined)st._origOnHand=st.onHand;
    st.onHand=st._origOnHand-transitQty;
  }
}

function buildBomIdx(rows){
  const m=new Map();
  for(const r of rows){
    const fp=str(r['Final product']);
    const comp=str(r['Comp no.']);
    if(!fp||!comp)continue;
    const k=`${fp}__${comp}`;
    if(!m.has(k))m.set(k,[]);
    m.get(k).push(r);
  }
  return m;
}

/*
  BOW INDEX — keyed by "FinalProduct__ProductNo"
  Same reasoning: operations for a ProductNo must stay within their FP context.
*/
function buildBowIdx(rows){
  const m=new Map();
  for(const r of rows){
    const fp=str(r['Final product']);
    const pno=str(r['Product no']);
    if(!fp||!pno)continue;
    const k=`${fp}__${pno}`;
    if(!m.has(k))m.set(k,[]);
    m.get(k).push(r);
  }
  // Deduplicate by (Ope seq, Operation no) within each key
  for(const[k,ops]of m.entries()){
    const seen=new Set();
    m.set(k,ops.filter(o=>{
      const key=`${o['Ope seq']}_${str(o['Operation no'])}`;
      if(seen.has(key))return false;seen.add(key);return true;
    }));
  }
  return m;
}

function extractFPs(rows){
  const m=new Map();
  for(const r of rows){
    const c=str(r['Final product']);if(!c)continue;
    if(!m.has(c))m.set(c,{code:c,name:str(r['FP name']),drawing:str(r['FP drawing'])});
  }
  return[...m.values()].sort((a,b)=>a.code.localeCompare(b.code));
}

function applyBom(rows,ts){S.bomData=rows;S.bomIdx=buildBomIdx(rows);S.fps=extractFPs(rows);S.meta.bom={rows:rows.length,ts};}
function applyBow(rows,ts){S.bowData=rows;S.bowIdx=buildBowIdx(rows);S.meta.bow={rows:rows.length,ts};}
function applyPo(rows,ts){
  S.poData=rows;
  S.meta.po={rows:rows.length,ts};
  // Build stock index keyed by clean material code.
  // Stock values (On Hand, WIP) are global — identical across all FP rows → take first.
  // FP list is the SET of all Final Products this material belongs to.
  const idx=new Map();
  for(const r of rows){
    const raw=String(r['MATERIAL']||'').trim();
    const code=raw.replace(/^[> ]+/,'').trim();
    if(!code)continue;
    const fp=String(r['FP']||'').trim();

    if(!idx.has(code)){
      // First occurrence — capture stock values
      const wipByWC={};
      let totalWIP=0;
      for(const wc of WIP_COLS){
        const v=parseFloat(r[wc]);
        if(!isNaN(v)&&v>0){wipByWC[wc]=v;totalWIP+=v;}
      }
      const tvRaw=parseFloat(r['Total WIP']);
      if(!isNaN(tvRaw)&&tvRaw>totalWIP)totalWIP=tvRaw;
      idx.set(code,{
        onHand:parseFloat(r['On Hand'])||0,
        onMO:parseFloat(r['On MO Not Started'])||0,
        totalWIP,
        name:String(r['NAME']||'').trim(),
        type:String(r['M/B/D']||'').trim(),
        wipByWC,
        fps: fp ? new Set([fp]) : new Set(),
      });
    } else {
      // Subsequent occurrence — just add the FP to the set
      if(fp) idx.get(code).fps.add(fp);
    }
  }
  S.stockIdx=idx;
  // Apply any already-loaded transit corrections
  applyInTransitToStock();
}

function applyOb(rows,ts){
  // Normalize date columns to sortable strings
  S.obData=rows.map(r=>{
    const out={...r};
    // Confirm dt and Request dt may come as ISO strings or timestamps
    for(const col of['Confirm dt','Request dt']){
      if(out[col]){
        const v=out[col];
        if(typeof v==='number'){// Excel serial date
          const d=new Date(Math.round((v-25569)*86400000));
          out[col]=d.toISOString().slice(0,10);
        } else {
          const d=new Date(v);
          if(!isNaN(d))out[col]=d.toISOString().slice(0,10);
        }
      }
    }
    // Net weight: normalize comma decimals
    if(out['Net weight'])out['Net weight']=String(out['Net weight']).replace(',','.');
    // Computed: Sales price EUR × Open qty
    const price=parseFloat(String(out['Sales price EUR']||'0').replace(',','.'));
    const openQty=parseFloat(String(out['Open qty']||'0').replace(',','.'));
    out['Valoare de livrat EUR']=isNaN(price)||isNaN(openQty)?0:price*openQty;
    return out;
  });
  S.meta.ob={rows:rows.length,ts};
}

/* ── TREE BUILD ── */
function fmtQty(qty,unit){
  if(qty===''||qty==null)return'';
  const n=parseFloat(qty);
  const q=isNaN(n)?str(qty):(n%1===0?n.toFixed(0):parseFloat(n.toFixed(5)));
  return`(Un Qty = ${q}${unit?' '+unit:''})`;
}
function fmtT(v){
  if(v===''||v==null)return'0';
  const n=parseFloat(String(v).replace(',','.'));
  return isNaN(n)?str(v):(n%1===0?n.toFixed(0):String(parseFloat(n.toFixed(2))));
}

/*
  Build tree for a given FP context.
  - fpContext: the root Final Product code (stays constant through recursion)
  - compNo: current component whose children we're fetching
  - depth: current nesting level
  - vis: visited set to prevent infinite cycles
*/
function buildTree(fpContext,compNo,depth,vis){
  depth=depth||0;vis=vis||new Set();
  if(vis.has(compNo))return[];
  const v2=new Set(vis);v2.add(compNo);

  // KEY FIX: use composite key scoped to the FP context
  const rows=S.bomIdx.get(`${fpContext}__${compNo}`)||[];

  return rows.map(row=>{
    const matNo=str(row['Material no']);
    const matType=str(row['Material type']).toUpperCase();
    // Check if matNo has BOM children under this FP context
    const hasSub=!v2.has(matNo)&&(S.bomIdx.get(`${fpContext}__${matNo}`)||[]).length>0;
    // Get operations scoped to this FP
    const ops=S.bowIdx?(S.bowIdx.get(`${fpContext}__${matNo}`)||[]):[];
    return{
      id:`${fpContext}__${compNo}__${matNo}__${str(row['Seq'])}__${depth}`,
      fpContext,compNo,matNo,
      matName:str(row['Mat. name']||row['Mat desc']),
      matDraw:str(row['Mat. drawing']),
      matType,isMake:matType==='MAKE',
      qty:row['Material qty'],unit:str(row['Mat U/M']),
      depth,
      children:hasSub?buildTree(fpContext,matNo,depth+1,v2):[],
      ops,
    };
  });
}

function expandAll(nodes){
  for(const n of nodes){
    if(n.children.length>0||n.ops.length>0){
      S.exp.add(n.id);
      if(n.ops.length>0) S.expOps.add('ops__'+n.id);
      expandAll(n.children);
    }
  }
  // Also expand FP root ops
  if(S.selFP) S.expOps.add('ops__fp__'+S.selFP);
}

/* ── REQUIREMENT CALCULATION ──────────────────────────────────────────
   calcNeeds(fpCode, inputQty) -> Map<matNo, {needed, onHand, totalWIP, net, covered}>
   net = max(0, needed - onHand - totalWIP)
   covered = onHand + totalWIP >= needed
────────────────────────────────────────────────────────────────────── */
function calcNeeds(fpCode, inputQty){
  const needs = new Map();
  const fpStock = S.stockIdx?.get(fpCode)||{onHand:0,totalWIP:0};
  // Negative stock treated as 0 for calculation
  const fpAvail = Math.max(0, fpStock.onHand) + Math.max(0, fpStock.totalWIP);
  const fpNeed = Math.max(0, inputQty - fpAvail);
  _calcNodeNeeds(fpCode, fpCode, fpNeed, needs);
  return needs;
}

function _calcNodeNeeds(fpCtx, compNo, parentNeed, needs){
  const rows = S.bomIdx?.get(`${fpCtx}__${compNo}`) || [];
  for(const row of rows){
    const matNo = str(row['Material no']);
    const unQty = parseFloat(row['Material qty']) || 1;
    const needed = parentNeed * unQty;
    const stock = S.stockIdx?.get(matNo) || {onHand:0,totalWIP:0};
    // Negative stock = treat as 0 for calculation purposes (shown in red in UI but not subtracted)
    const onHand = Math.max(0, stock.onHand);
    const totalWIP = Math.max(0, stock.totalWIP);
    const avail = onHand + totalWIP;
    const net = Math.max(0, needed - avail);
    needs.set(matNo, {needed, onHand:stock.onHand, totalWIP:stock.totalWIP, net, avail});
    const childParentNeed = net;
    if(childParentNeed > 0 && (S.bomIdx?.get(`${fpCtx}__${matNo}`) || []).length > 0){
      _calcNodeNeeds(fpCtx, matNo, childParentNeed, needs);
    }
  }
}

/* ── EXECUTION TIME CALCULATION (WIP-AWARE) ──────────────────────────
   Correct algorithm per operation at index i:
     pieces_needing_op_i = max(0, unitsNeeded
                               - onHand               (fully done)
                               - Σ WIP at seqIdx > i  (already past op i))
   Setup counted ONCE per operation, run_time multiplied by pieces_needing.
   This matches manual calculation:
     Laser(i=0):        50 - 0(OH) - 5(WIP@Bend) - 1(WIP@Paint) = 44 pcs
     Bending(i=1):      50 - 0(OH) - 1(WIP@Paint)               = 49 pcs
     PowderPaint(i=2):  50 - 0(OH)                               = 50 pcs
────────────────────────────────────────────────────────────────────── */
function calcExecTime(fpCode, inputQty, needs){
  const byWC = new Map(); // wcName → {runMin, setupMin}

  function acc(wcName, units, runT, setupT){
    if(!byWC.has(wcName)) byWC.set(wcName,{runMin:0,setupMin:0});
    const e=byWC.get(wcName);
    e.runMin   += units * runT;
    e.setupMin += setupT;
  }

  function addOpsForComponent(fpCtxCode, matNo, unitsNeeded){
    const rawOps = S.bowIdx?.get(`${fpCtxCode}__${matNo}`) || [];
    if(!rawOps.length) return;

    const ops = rawOps.map(op=>({
      seq:    parseFloat(String(op['Ope seq']||'0').replace(',','.')) || 0,
      wcName: str(op['Ope name']||op['Ope descr']||'?'),
      runT:   parseFloat(String(op['Run time']||'0').replace(',','.')) || 0,
      setupT: parseFloat(String(op['Setup time']||'0').replace(',','.')) || 0,
    })).sort((a,b)=>a.seq-b.seq);

    const stock  = S.stockIdx?.get(matNo) || {onHand:0,wipByWC:{}};
    const onHand = Math.max(0, stock.onHand);
    const wipByWC = stock.wipByWC || {};

    // Map: opIndex → qty of WIP pieces that are AT (or past) this op index
    // WIP at seqIdx X means the piece has completed ops 0..X-1 and is currently at X
    const wipAtIdx = new Map(); // opIndex → qty
    for(const [poCol, wipQty] of Object.entries(wipByWC)){
      if(!wipQty || wipQty<=0) continue;
      const wcNamePO = wcLabel(poCol).toLowerCase();
      // Find the HIGHEST seq op matching this WC (most advanced stage)
      let bestIdx = -1;
      for(let i=ops.length-1;i>=0;i--){
        if(ops[i].wcName.toLowerCase()===wcNamePO){bestIdx=i;break;}
      }
      if(bestIdx<0) continue;
      wipAtIdx.set(bestIdx,(wipAtIdx.get(bestIdx)||0)+wipQty);
    }

    // For each operation i: pieces_needing = total - onHand - Σ WIP at seqIdx > i
    for(let i=0; i<ops.length; i++){
      let alreadyDone = onHand;
      for(const [seqIdx, qty] of wipAtIdx){
        if(seqIdx > i) alreadyDone += qty;
      }
      const needing = Math.max(0, unitsNeeded - alreadyDone);
      if(needing > 0) acc(ops[i].wcName, needing, ops[i].runT, ops[i].setupT);
    }
  }

  // Process FP itself
  addOpsForComponent(fpCode, fpCode, inputQty);

  // Process each component
  if(needs){
    for(const [matNo, need] of needs){
      addOpsForComponent(fpCode, matNo, need.needed);
    }
  }

  let totalRun=0, totalSetup=0;
  for(const v of byWC.values()){totalRun+=v.runMin; totalSetup+=v.setupMin;}
  return {totalRun, totalSetup, total:totalRun+totalSetup, byWC};
}

function fmtMin(min){
  if(min<=0) return '0 min';
  const h = Math.floor(min/60), m = Math.round(min%60);
  if(h===0) return `${m} min`;
  return m>0 ? `${h}h ${m}min` : `${h}h`;
}

/* ── TOTAL EXECUTION TIME (ignores stock — full inputQty for all components) ──
   Used to compute % Realizare = 1 - (execTime.total / totalExecTime.total)
   Meaning: what fraction of the work is already covered by stock.
────────────────────────────────────────────────────────────────────── */
function calcTotalExecTime(fpCode, inputQty){
  const byWC = new Map();

  function addOps(matNo, qty){
    const ops = S.bowIdx?.get(`${fpCode}__${matNo}`) || [];
    for(const op of ops){
      const wcName = str(op['Ope name']||op['Ope descr']||'?');
      const runT = parseFloat(String(op['Run time']||'0').replace(',','.')) || 0;
      const setupT = parseFloat(String(op['Setup time']||'0').replace(',','.')) || 0;
      if(!byWC.has(wcName)) byWC.set(wcName,{runMin:0,setupMin:0});
      const e = byWC.get(wcName);
      e.runMin   += qty * runT;
      e.setupMin += setupT;
    }
  }

  // FP own ops — full inputQty regardless of stock
  addOps(fpCode, inputQty);

  // All BOM components — full needed qty (inputQty × unQty, no stock deduction)
  function walkBom(compNo, parentQty, vis){
    if(vis.has(compNo)) return;
    const v2 = new Set(vis); v2.add(compNo);
    const rows = S.bomIdx?.get(`${fpCode}__${compNo}`) || [];
    for(const row of rows){
      const matNo = str(row['Material no']);
      const unQty = parseFloat(row['Material qty']) || 1;
      const qty = parentQty * unQty;
      addOps(matNo, qty);
      if((S.bomIdx?.get(`${fpCode}__${matNo}`) || []).length > 0)
        walkBom(matNo, qty, v2);
    }
  }
  walkBom(fpCode, inputQty, new Set());

  let totalRun = 0, totalSetup = 0;
  for(const v of byWC.values()){totalRun+=v.runMin; totalSetup+=v.setupMin;}
  return {totalRun, totalSetup, total:totalRun+totalSetup, byWC};
}

/*
  mkOpsGroup — renders a collapsible operations block.
  opsId: unique key used in S.expOps to track expand state
  ops:   array of operation rows
  depth: visual indent depth (same as the sibling BOM children)
  color: connector color at this depth
*/
function mkOpsGroup(opsId, ops, depth, color, matNo){
  const groupWrap = el('div','ops-group');
  const hrow = el('div','n-row clk');
  for(let i=0;i<depth;i++){const sp2=el('div','n-sp vl');sp2.style.setProperty('--c',lc(i));hrow.appendChild(sp2);}
  const hc=el('div','n-hc');hc.style.setProperty('--c',color);hrow.appendChild(hc);
  const isExpOps=S.expOps.has(opsId);
  const tog=el('div',`n-tog${isExpOps?' open':''}`);tog.textContent='▶';hrow.appendChild(tog);
  const inner=el('div','n-inner');
  const badge=el('span','ops-group-badge');badge.textContent=`⚙ ${ops.length} operat${ops.length===1?'ie':'ii'}`;inner.appendChild(badge);
  const stock=S.stockIdx?.get(matNo);
  if(stock&&stock.totalWIP>0){const wb=sp('stk-badge stk-wip',`WIP ${fmtN(stock.totalWIP)}`);wb.style.marginLeft='8px';inner.appendChild(wb);}
  hrow.appendChild(inner);
  hrow.addEventListener('click',()=>{S.expOps.has(opsId)?S.expOps.delete(opsId):S.expOps.add(opsId);reTree();});
  groupWrap.appendChild(hrow);
  if(isExpOps){
    const opsList=el('div','ops-list');
    const opChildDepth=depth+1;

    // Pre-compute WIP-aware needing per operation (same logic as calcExecTime)
    const unitsNeeded=matNo===S.selFP ? S.qtyInput : Math.max(0,_needs?.get(matNo)?.needed??0);
    const eff2=(S.efficienta||100)/100;
    const sortedOps=[...ops].map(op=>({
      seq:parseFloat(String(op['Ope seq']||'0').replace(',','.'))||0,
      runT:parseFloat(String(op['Run time']||'0').replace(',','.'))||0,
      setupT:parseFloat(String(op['Setup time']||'0').replace(',','.'))||0,
      wcName:str(op['Ope name']||op['Ope descr']||''),
      _orig:op,
    })).sort((a,b)=>a.seq-b.seq);
    const wipAtIdx=new Map();
    if(stock){
      for(const [poCol,wipQty] of Object.entries(stock.wipByWC||{})){
        if(!wipQty||wipQty<=0)continue;
        const wcNP=wcLabel(poCol).toLowerCase();
        let bestIdx=-1;
        for(let i=sortedOps.length-1;i>=0;i--){if(sortedOps[i].wcName.toLowerCase()===wcNP){bestIdx=i;break;}}
        if(bestIdx>=0)wipAtIdx.set(bestIdx,(wipAtIdx.get(bestIdx)||0)+wipQty);
      }
    }
    const needingPerOp=sortedOps.map((_,i)=>{
      let done=Math.max(0,stock?.onHand||0);
      for(const [si,wq] of wipAtIdx){if(si>i)done+=wq;}
      return Math.max(0,unitsNeeded-done);
    });

    for(let oi=0;oi<ops.length;oi++){
      const op=ops[oi];
      // find this op in sortedOps
      const si=sortedOps.findIndex(s=>s._orig===op);
      const needing=si>=0?needingPerOp[si]:0;
      const runT=parseFloat(String(op['Run time']||'0').replace(',','.'))||0;
      const setupT=parseFloat(String(op['Setup time']||'0').replace(',','.'))||0;
      const totalMin=(unitsNeeded*runT+setupT)/eff2;
      const remMin=needing>0?(needing*runT+setupT)/eff2:0;

      const row=el('div','op-row');
      for(let i=0;i<opChildDepth;i++){const s2=el('div','');s2.style.cssText='width:18px;flex-shrink:0';row.appendChild(s2);}
      const hcS=el('div','');hcS.style.cssText='width:18px;flex-shrink:0';row.appendChild(hcS);
      const tS=el('div','');tS.style.cssText='width:14px;flex-shrink:0;margin-right:3px';row.appendChild(tS);
      const body=el('div','n-inner');
      body.appendChild(el('div','op-tri'));
      body.appendChild(sp('op-name',str(op['Ope name']||op['Ope descr']||'—')));
      const ot=el('span','op-time');
      ot.innerHTML=`Run tm: <b>${fmtT(op['Run time'])}</b> min,&nbsp;Setup: <b>${fmtT(op['Setup time'])}</b> min`;
      body.appendChild(ot);
      // Add total and remaining time after Run/Setup
      if(unitsNeeded>0){
        const timePart=el('span','op-time');timePart.style.cssText='margin-left:10px;font-size:10px';
        const totStr=`<span style="color:var(--text3)">total: <b>${fmtMin(totalMin)}</b></span>`;
        const remStr=remMin>0?`&nbsp;·&nbsp;<span style="color:#7c3aed;font-weight:700">ramas: <b>${fmtMin(remMin)}</b></span>`
          :`&nbsp;·&nbsp;<span style="color:#15803d;font-weight:700">✓ finalizat</span>`;
        timePart.innerHTML=totStr+remStr;
        body.appendChild(timePart);
      }
      if(stock){
        const opeName=str(op['Ope name']||op['Ope descr']||'');
        const matchedWC=WIP_COLS.find(wc=>wcLabel(wc).toLowerCase()===opeName.toLowerCase());
        const wcQty=matchedWC?(stock.wipByWC[matchedWC]||0):0;
        if(wcQty>0){const wb=sp('wip-wc-badge',`WIP: ${fmtN(wcQty)}`);wb.style.marginLeft='8px';body.appendChild(wb);}
      }
      row.appendChild(body);opsList.appendChild(row);
    }
    groupWrap.appendChild(opsList);
  }
  return groupWrap;
}

// cache of calcNeeds result, refreshed in reTree
let _needs = null;
const fmtN=v=>v==null?'0':(Number.isInteger(v)?String(v):parseFloat(v.toFixed(4)).toString());

/* ── BOM NODE RENDER ── */
function mkNode(node){
  const wrap=el('div','bom-node');
  const isExp=S.exp.has(node.id);
  const hasCh=node.children.length>0||node.ops.length>0;
  const color=lc(node.depth);

  const row=el('div',`n-row${hasCh?' clk':''}`);
  for(let i=0;i<node.depth;i++){const sp2=el('div','n-sp vl');sp2.style.setProperty('--c',lc(i));row.appendChild(sp2);}
  const hc=el('div','n-hc');hc.style.setProperty('--c',color);row.appendChild(hc);
  const tog=el('div',`n-tog${hasCh?(isExp?' open':''):' leaf'}`);
  if(hasCh)tog.textContent='▶';
  row.appendChild(tog);

  const inner=el('div','n-inner');
  inner.appendChild(sp(`n-code${node.isMake?'':' buy-style'}`,node.matNo));
  inner.appendChild(sp('n-arr',' ⇒ '));
  if(node.matDraw){inner.appendChild(sp('n-draw',node.matDraw));inner.appendChild(sp('n-arr',' ⇒ '));}
  if(node.matName)inner.appendChild(sp('n-desc',node.matName));
  const q=fmtQty(node.qty,node.unit);
  if(q)inner.appendChild(sp('n-qty',' '+q));
  inner.appendChild(sp(`n-tag ${node.isMake?'make':'buy'}`,node.matType||'BUY'));

  // ── Stock + Requirement badges ──
  if(S.stockIdx){
    const stock=S.stockIdx.get(node.matNo);
    const need=_needs?.get(node.matNo);
    const srow=el('div','stock-row');
    const oh=stock?.onHand??0;
    const wip=stock?.totalWIP??0;
    const ohBadge=sp(`stk-badge ${oh<0?'stk-neg-stock':'stk-oh'}`,`📦 On Hand: ${fmtN(oh)}`);
    srow.appendChild(ohBadge);
    if(wip!==0){
      const wipBadge=sp(`stk-badge ${wip<0?'stk-neg-stock':'stk-wip'}`,`🔄 WIP: ${fmtN(wip)}`);
      srow.appendChild(wipBadge);
    }
    if(need){
      const cls=need.net===0?'stk-need-ok':(need.net<need.needed?'stk-need-partial':'stk-need-miss');
      const label=need.net===0?`✓ Acoperit`:`⚠ Necesar: ${fmtN(need.needed)} | Lipsă: ${fmtN(need.net)}`;
      srow.appendChild(sp(`stk-badge ${cls}`,label));
    }
    inner.appendChild(srow);
  }
  row.appendChild(inner);

  if(hasCh){
    row.addEventListener('click',()=>{
      S.exp.has(node.id)?S.exp.delete(node.id):S.exp.add(node.id);
      reTree();
    });
  }
  wrap.appendChild(row);

  if(hasCh&&isExp){
    const childDepth=node.depth+1;
    const childColor=lc(childDepth);
    const kids=el('div','n-kids');
    kids.style.setProperty('--c',childColor);
    const ll=childDepth*18+18+14+4;
    kids.style.setProperty('--kl',ll+'px');
    kids.style.paddingLeft=(ll+2)+'px';
    if(node.ops.length>0){
      kids.appendChild(mkOpsGroup('ops__'+node.id,node.ops,childDepth,childColor,node.matNo));
    }
    for(const child of node.children)kids.appendChild(mkNode(child));
    wrap.appendChild(kids);
  }
  return wrap;
}

let _tree=null;
function reTree(){
  if(!_tree||!S.selFP)return;
  _tree.innerHTML='';
  const fp=S.fps.find(f=>f.code===S.selFP);
  const tree=buildTree(S.selFP,S.selFP);
  const fpOps=S.bowIdx?(S.bowIdx.get(`${S.selFP}__${S.selFP}`)||[]):[];

  // Recompute requirements and exec time
  _needs = S.stockIdx ? calcNeeds(S.selFP, S.qtyInput) : null;
  const execTimeRaw = S.bowIdx ? calcExecTime(S.selFP, S.qtyInput, _needs) : null;
  const totalExecTimeRaw = S.bowIdx ? calcTotalExecTime(S.selFP, S.qtyInput) : null;

  // Apply efficiency: divide total times by (efficienta/100)
  // Efficiency only affects display totals, not individual operation times in the tree
  const eff = (S.efficienta||100) / 100;
  const execTime = execTimeRaw ? {
    ...execTimeRaw,
    total: execTimeRaw.total / eff,
    totalRun: execTimeRaw.totalRun / eff,
    totalSetup: execTimeRaw.totalSetup / eff,
    byWC: new Map([...execTimeRaw.byWC.entries()].map(([wc,t])=>[wc,{runMin:t.runMin/eff,setupMin:t.setupMin/eff}]))
  } : null;
  const totalExecTime = totalExecTimeRaw ? {
    ...totalExecTimeRaw,
    total: totalExecTimeRaw.total / eff,
    totalRun: totalExecTimeRaw.totalRun / eff,
    totalSetup: totalExecTimeRaw.totalSetup / eff
  } : null;

  // Count stats
  let mk=0,by=0,ops=fpOps.length;
  function ct(ns){for(const n of ns){n.isMake?mk++:by++;ops+=n.ops.length;ct(n.children);}}
  ct(tree);
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('smk',mk);set('sby',by);set('sop',ops);
  set('tbcode',S.selFP);set('tbdraw',fp?.drawing||'');
  set('sexec', execTime&&execTime.total>0 ? fmtMin(execTime.total) : '—');

  // Subcontracting Text_line1 — shown in toolbar next to product code
  const subTexts=new Set();
  if(S.bowIdx&&S.selFP){
    for(const[k,ops2] of S.bowIdx.entries()){
      if(!k.startsWith(S.selFP+'__')) continue;
      for(const op of ops2){
        if(str(op['Ope name']).toLowerCase()==='subcontracting'){
          const t=str(op['Text_line1']).trim();
          if(t) subTexts.add(t);
        }
      }
    }
  }
  const tbSubEl=document.getElementById('tb-subcon');
  if(tbSubEl) tbSubEl.textContent=subTexts.size>0 ? '🔧 '+[...subTexts].join(' · ') : '';

  // ── WC time bar (max 8 workcenter-uri, sorted by total time desc) ──
  const wcBar=document.getElementById('wc-stats-bar');
  if(wcBar){
    wcBar.innerHTML='';
    wcBar.style.display='';

    // % Realizare cell — always first
    const pctCell=dv('wc-stat pct-realizare-cell');
    let pct = (totalExecTime&&totalExecTime.total>0&&execTime)
      ? Math.min(100, Math.max(0,(1 - execTime.total/totalExecTime.total)*100))
      : null;
    // Cap at 99.99% if not fully in stock
    if(pct!==null&&pct>=100){
      const oh=Math.max(0,S.stockIdx?.get(S.selFP)?.onHand||0);
      if(oh < S.qtyInput) pct=99.99;
    }
    const pctDisplay=pct!==null?(pct===100?'100%':pct.toFixed(2)+'%'):'—';
    pctCell.appendChild(sp('wc-stat-name','% Realizare'));
    const pctVal=sp('wc-stat-time pct-val', pctDisplay);
    if(pct!==null){
      pctVal.style.color = pct>=80?'#15803d':pct>=40?'#d97706':'#dc2626';
    }
    pctCell.appendChild(pctVal);
    if(pct!==null&&totalExecTime&&execTime){
      // Line 1: stock coverage
      pctCell.appendChild(sp('wc-stat-sub',
        `stoc: ${fmtMin(totalExecTime.total-execTime.total)} din ${fmtMin(totalExecTime.total)}`));
      // Line 2: remaining production time (what still needs to be done)
      if(execTime.total>0){
        const remEl=sp('wc-stat-sub',`ramas: ${fmtMin(execTime.total)}`);
        remEl.style.color='#7c3aed';remEl.style.fontWeight='600';
        pctCell.appendChild(remEl);
      }
    }
    wcBar.appendChild(pctCell);

    if(execTime&&execTime.total>0){
      const sorted=[...execTime.byWC.entries()]
        .map(([wc,t])=>({wc,total:t.runMin+t.setupMin,run:t.runMin,setup:t.setupMin}))
        .filter(r=>r.total>0)
        .sort((a,b)=>b.total-a.total)
        .slice(0,8);
      for(const row of sorted){
        const cell=dv('wc-stat');
        cell.appendChild(sp('wc-stat-name',row.wc));
        cell.appendChild(sp('wc-stat-time',fmtMin(row.total)));
        cell.appendChild(sp('wc-stat-sub',`run: ${fmtMin(row.run)} · setup: ${fmtMin(row.setup)}`));
        wcBar.appendChild(cell);
      }
    } else {
      const ph=dv('wc-stat');
      ph.appendChild(sp('wc-stat-name','Timp executie'));
      ph.appendChild(sp('wc-stat-time','—'));
      ph.appendChild(sp('wc-stat-sub','Incarcati BOW si Planning Overview'));
      wcBar.appendChild(ph);
    }
  }

  // ── FP Header ──
  const fph=dv('fp-hdr');
  fph.appendChild(sp('fp-hdr-lbl','Final product'));
  const fpr=el('div','fp-hdr-row');
  fpr.appendChild(sp('fp-hdr-code',S.selFP));
  if(fp?.drawing)fpr.appendChild(sp('fp-hdr-draw',fp.drawing));
  fph.appendChild(fpr);

  // Stock row
  if(S.stockIdx){
    const fpStock=S.stockIdx.get(S.selFP)||{onHand:0,totalWIP:0};
    const fpNet=Math.max(0,S.qtyInput - Math.max(0,fpStock.onHand) - Math.max(0,fpStock.totalWIP));
    const srow=el('div','stock-row');srow.style.marginTop='4px';
    srow.appendChild(sp(`stk-badge ${fpStock.onHand<0?'stk-neg-stock':'stk-oh'}`,`📦 On Hand: ${fmtN(fpStock.onHand)}`));
    if(fpStock.totalWIP!==0) srow.appendChild(sp(`stk-badge ${fpStock.totalWIP<0?'stk-neg-stock':'stk-wip'}`,`🔄 WIP: ${fmtN(fpStock.totalWIP)}`));
    if(S.qtyInput>0){
      const cls=fpNet===0?'stk-need-ok':'stk-need-miss';
      srow.appendChild(sp(`stk-badge ${cls}`,fpNet===0?`✓ Stoc suficient pentru ${S.qtyInput} buc`:`⚠ De produs: ${fmtN(fpNet)} buc (din ${S.qtyInput} cerut)`));
    }
    fph.appendChild(srow);
    if(fpStock.totalWIP>0&&Object.keys(fpStock.wipByWC||{}).length>0){
      const wcRow=el('div','wip-wc-list');wcRow.style.marginTop='3px';
      for(const [wc,qty] of Object.entries(fpStock.wipByWC)) wcRow.appendChild(sp('wip-wc-badge',`${wcLabel(wc)}: ${fmtN(qty)}`));
      fph.appendChild(wcRow);
    }
  }

  // ── Execution time breakdown panel ──
  if(execTime&&execTime.total>0){
    const expId='exec-panel__'+S.selFP;
    const isExp=S.expOps.has(expId);
    const epWrap=dv('exec-panel');

    const epHdr=dv('exec-panel-hdr');
    epHdr.appendChild(sp('exec-tog',isExp?'▼':'▶'));
    epHdr.appendChild(sp('exec-panel-title','⏱ Timp executie estimat: '));
    epHdr.appendChild(sp('exec-total-time',fmtMin(execTime.total)));
    epHdr.appendChild(sp('exec-sub-times',` (run: ${fmtMin(execTime.totalRun)} · setup: ${fmtMin(execTime.totalSetup)})`));
    epHdr.addEventListener('click',()=>{
      S.expOps.has(expId)?S.expOps.delete(expId):S.expOps.add(expId);
      reTree();
    });
    epWrap.appendChild(epHdr);

    if(isExp){
      const sorted=[...execTime.byWC.entries()]
        .map(([wc,t])=>({wc,total:t.runMin+t.setupMin,run:t.runMin,setup:t.setupMin}))
        .filter(r=>r.total>0)
        .sort((a,b)=>b.total-a.total);
      const maxT=sorted[0]?.total||1;
      const epBody=dv('exec-panel-body');
      for(const row of sorted){
        const r=dv('exec-wc-row');
        r.appendChild(sp('exec-wc-name',row.wc));
        r.appendChild(sp('exec-wc-run',`run: ${fmtMin(row.run)}`));
        r.appendChild(sp('exec-wc-setup',`setup: ${fmtMin(row.setup)}`));
        r.appendChild(sp('exec-wc-total',fmtMin(row.total)));
        const bar=dv('exec-bar');bar.style.width=Math.round((row.total/maxT)*100)+'%';
        r.appendChild(bar);
        epBody.appendChild(r);
      }
      epWrap.appendChild(epBody);
    }
    fph.appendChild(epWrap);
  }

  _tree.appendChild(fph);

  // FP root ops + children
  if(fpOps.length>0){
    const fpWrap=el('div','n-kids');
    fpWrap.style.setProperty('--c',lc(0));
    const ll0=0*18+18+14+4;
    fpWrap.style.setProperty('--kl',ll0+'px');
    fpWrap.style.paddingLeft=(ll0+2)+'px';
    fpWrap.appendChild(mkOpsGroup('ops__fp__'+S.selFP,fpOps,0,lc(0),S.selFP));
    for(const n of tree)fpWrap.appendChild(mkNode(n));
    _tree.appendChild(fpWrap);
  } else {
    for(const n of tree)_tree.appendChild(mkNode(n));
  }
}

  if(!S.sbCfg){

    l.addEventListener('click',()=>{S.authScreen='setup';render();});card.appendChild(l);

    l.addEventListener('click',()=>{S.authScreen='setup';render();});card.appendChild(l);
  }
  wrap.appendChild(card);return wrap;
